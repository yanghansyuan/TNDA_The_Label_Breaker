<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interactive Night Cursor</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1b1f24;
      cursor: none;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* 50 層毛玻璃共用樣式 */
    .glassLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;

      opacity: 0;
      transition: opacity 120ms ease;

      /* 微微玻璃底色 */
      background: rgba(255,255,255,0.03);

      /* mask 挖洞：洞內清晰、洞外模糊（每層 cut 半徑不同） */
      --x: 50vw;
      --y: 50vh;
      --cut: 200px;

      -webkit-mask-image: radial-gradient(
        circle at var(--x) var(--y),
        transparent 0 var(--cut),
        rgba(0,0,0,1) calc(var(--cut) + 2px)
      );
      mask-image: radial-gradient(
        circle at var(--x) var(--y),
        transparent 0 var(--cut),
        rgba(0,0,0,1) calc(var(--cut) + 2px)
      );
    }
    .glassLayer.on { opacity: 1; }

    * { user-select: none; }
  </style>
</head>

<body>
  <canvas id="c"></canvas>

  <script>
    // ===== Canvas setup (retina friendly) =====
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== Stars =====
    const STAR_COUNT = 90;
    const stars = [];
    const rand = (min, max) => Math.random() * (max - min) + min;

    function initStars() {
      stars.length = 0;
      for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({
          x: rand(0, window.innerWidth),
          y: rand(0, window.innerHeight),
          r: rand(0.6, 1.8),
          baseA: rand(0.12, 0.5),
          tw: rand(0.8, 2.2),
          ph: rand(0, Math.PI * 2)
        });
      }
    }
    initStars();
    window.addEventListener('resize', initStars);

    function drawBackground() {
      const g = ctx.createRadialGradient(
        window.innerWidth * 0.5, window.innerHeight * 0.35, 50,
        window.innerWidth * 0.5, window.innerHeight * 0.35, Math.max(window.innerWidth, window.innerHeight)
      );
      g.addColorStop(0, '#20262c');
      g.addColorStop(1, '#161a1f');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      const t = performance.now() * 0.001;
      for (const s of stars) {
        const a = s.baseA + 0.18 * Math.sin(t * s.tw + s.ph);
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0, a)})`;
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ===== 50-layer glass =====
    const LAYERS = 50;
    const glassLayers = [];

    // 你之前要求模糊圈離球體遠一點，這裡保留：洞外開始模糊的間距 = 50
    const HOLE_GAP = 50;

    // blur 與 cut 範圍（想更誇張就把 maxBlur / maxCut 拉大）
    const minBlur = 2;
    const maxBlur = 30;

    // cut 從 baseCut 一路往外擴，讓「越遠越糊」
    // 50 層下，這個範圍已經很順
    const cutSpan = 900; // 洞外到最外層覆蓋範圍

    for (let i = 0; i < LAYERS; i++) {
      const layer = document.createElement('div');
      layer.className = 'glassLayer';
      // blur 線性遞增
      const blur = minBlur + (maxBlur - minBlur) * (i / (LAYERS - 1));
      layer.style.backdropFilter = `blur(${blur}px) saturate(140%)`;
      layer.style.webkitBackdropFilter = `blur(${blur}px) saturate(140%)`;

      // 越外層底色稍微更淡一點點，避免整片白霧
      const a = 0.028 + 0.02 * (i / (LAYERS - 1));
      layer.style.background = `rgba(255,255,255,${a})`;

      document.body.appendChild(layer);
      glassLayers.push(layer);
    }

    function setGlassOn(on) {
      for (const el of glassLayers) {
        el.classList.toggle('on', on);
      }
    }

    function updateGlassMasks(x, y, sphereR) {
      const baseCut = sphereR + HOLE_GAP; // 洞 = 球半徑 + 50
      for (let i = 0; i < LAYERS; i++) {
        const t = i / (LAYERS - 1);
        const cut = baseCut + cutSpan * t;

        const el = glassLayers[i];
        el.style.setProperty('--x', x + 'px');
        el.style.setProperty('--y', y + 'px');
        el.style.setProperty('--cut', cut + 'px');
      }
    }

    // ===== Cursor / Press growth =====
    let mouseX = window.innerWidth * 0.5;
    let mouseY = window.innerHeight * 0.5;

    let isDown = false;
    let pressStart = 0;

    // 目前尺寸（你之前的球半徑）
    const R_FULL = 120;
    // 非點擊：1/3
    const R_IDLE = R_FULL / 3;

    // 為了讓放大更順：用一個 currentR 做平滑追趕
    let currentR = R_IDLE;

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    }, { passive: true });

    window.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDown = true;
      pressStart = performance.now();
      setGlassOn(true);
    });

    window.addEventListener('mouseup', (e) => {
      if (e.button !== 0) return;
      isDown = false;
      setGlassOn(false);
    });

    const clamp01 = (v) => Math.max(0, Math.min(1, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

    function drawSphere(x, y, r, pressed) {
      ctx.save();
      ctx.translate(x, y);

      if (!pressed) {
        // 暗橘色（未點擊）
        const g = ctx.createRadialGradient(-r*0.35, -r*0.35, r*0.2, 0, 0, r*1.25);
        g.addColorStop(0, '#d8842a');
        g.addColorStop(0.45, '#b15a12');
        g.addColorStop(1, '#6d2f06');

        ctx.beginPath();
        ctx.fillStyle = g;
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.ellipse(-r*0.25, -r*0.28, r*0.22, r*0.15, -0.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(0,0,0,0.28)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        // 點擊後亮度提升至「目前的 2 倍」：更亮的漸層 + 更強 glow
        ctx.shadowColor = 'rgba(255, 190, 70, 1)';
        ctx.shadowBlur = 70; // 比之前更強，視覺上亮度明顯翻倍

        const g = ctx.createRadialGradient(-r*0.35, -r*0.35, r*0.2, 0, 0, r*1.55);
        g.addColorStop(0, '#ffffff');
        g.addColorStop(0.18, '#fff2c8');
        g.addColorStop(0.45, '#ffd37a');
        g.addColorStop(1, '#ff7a12');

        ctx.beginPath();
        ctx.fillStyle = g;
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 0.34;
        for (let i = -4; i <= 4; i++) {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(255,255,255,0.9)';
          ctx.lineWidth = 1.4;
          ctx.arc(0, 0, r*0.92, (i*0.22) + 0.12, (i*0.22) + 0.48);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        ctx.strokeStyle = 'rgba(255, 245, 225, 0.55)';
        ctx.lineWidth = 1.7;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    // ===== Main loop =====
    function tick() {
      drawBackground();

      // 長按 1 秒內膨脹到 full
      let targetR = R_IDLE;
      if (isDown) {
        const p = clamp01((performance.now() - pressStart) / 1000);
        targetR = lerp(R_IDLE, R_FULL, easeOutCubic(p));
      }

      // 放開時回到 R_IDLE，但不要瞬間縮，稍微平滑一下
      currentR = lerp(currentR, targetR, isDown ? 0.22 : 0.18);

      // 更新 50 層毛玻璃 mask（洞以 currentR 為準）
      updateGlassMasks(mouseX, mouseY, currentR);

      // 畫球（沒有圓錐了）
      drawSphere(mouseX, mouseY, currentR, isDown);

      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
