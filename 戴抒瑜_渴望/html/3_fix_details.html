<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interactive Night Cursor</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1b1f24;
      cursor: none;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* 三層毛玻璃，越外層 blur 越高，疊加後達成「越遠越糊」 */
    .glass {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 120ms ease;
      background: rgba(255,255,255,0.05);

      --x: 50vw;
      --y: 50vh;
      --cut: 200px;
      -webkit-mask-image: radial-gradient(circle at var(--x) var(--y),
        transparent 0 var(--cut),
        rgba(0,0,0,1) calc(var(--cut) + 2px)
      );
      mask-image: radial-gradient(circle at var(--x) var(--y),
        transparent 0 var(--cut),
        rgba(0,0,0,1) calc(var(--cut) + 2px)
      );
    }
    .glass.on { opacity: 1; }

    /* 近：最輕微模糊 */
    .g1 {
      backdrop-filter: blur(8px) saturate(130%);
      -webkit-backdrop-filter: blur(8px) saturate(130%);
    }
    /* 中：更糊 */
    .g2 {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
    }
    /* 遠：最糊 */
    .g3 {
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(26px) saturate(150%);
      -webkit-backdrop-filter: blur(26px) saturate(150%);
    }

    * { user-select: none; }
  </style>
</head>

<body>
  <canvas id="c"></canvas>

  <!-- 疊三層：外層會同時吃到 g1+g2+g3，所以最遠最糊 -->
  <div id="g1" class="glass g1"></div>
  <div id="g2" class="glass g2"></div>
  <div id="g3" class="glass g3"></div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const g1 = document.getElementById('g1');
    const g2 = document.getElementById('g2');
    const g3 = document.getElementById('g3');

    function resize() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== Stars =====
    const STAR_COUNT = 90;
    const stars = [];
    const rand = (min, max) => Math.random() * (max - min) + min;

    function initStars() {
      stars.length = 0;
      for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({
          x: rand(0, window.innerWidth),
          y: rand(0, window.innerHeight),
          r: rand(0.6, 1.8),
          baseA: rand(0.12, 0.5),
          tw: rand(0.8, 2.2),
          ph: rand(0, Math.PI * 2)
        });
      }
    }
    initStars();
    window.addEventListener('resize', initStars);

    // ===== Cursor State =====
    let mouseX = window.innerWidth * 0.5;
    let mouseY = window.innerHeight * 0.5;
    let prevX = mouseX, prevY = mouseY;

    let isDown = false;
    let speed = 0;
    let moveEnergy = 0;
    let ringAngle = 0;

    // 球體放大 5 倍（24 -> 120）
    const SPHERE_R = 120;

    // 你指定：把原本 hole 邏輯改成 50 的間距
    const HOLE_GAP = 50;

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    }, { passive: true });

    window.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDown = true;
      g1.classList.add('on');
      g2.classList.add('on');
      g3.classList.add('on');
    });

    window.addEventListener('mouseup', (e) => {
      if (e.button !== 0) return;
      isDown = false;
      g1.classList.remove('on');
      g2.classList.remove('on');
      g3.classList.remove('on');
    });

    // 「越遠越糊」：用三層 cut 半徑做階梯式漸強
    function updateGlassMasks() {
      const baseCut = SPHERE_R + HOLE_GAP; // 這裡就是你要的「50」拉開距離

      // g1：從 baseCut 開始就模糊一點
      // g2：再外面才開始疊第二層
      // g3：最外圈再疊第三層
      const cut1 = baseCut;
      const cut2 = baseCut + 170;
      const cut3 = baseCut + 360;

      for (const el of [g1, g2, g3]) {
        el.style.setProperty('--x', mouseX + 'px');
        el.style.setProperty('--y', mouseY + 'px');
      }
      g1.style.setProperty('--cut', cut1 + 'px');
      g2.style.setProperty('--cut', cut2 + 'px');
      g3.style.setProperty('--cut', cut3 + 'px');
    }

    // ===== Drawing =====
    function drawBackground() {
      const g = ctx.createRadialGradient(
        window.innerWidth * 0.5, window.innerHeight * 0.35, 50,
        window.innerWidth * 0.5, window.innerHeight * 0.35, Math.max(window.innerWidth, window.innerHeight)
      );
      g.addColorStop(0, '#20262c');
      g.addColorStop(1, '#161a1f');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      const t = performance.now() * 0.001;
      for (const s of stars) {
        const a = s.baseA + 0.18 * Math.sin(t * s.tw + s.ph);
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0, a)})`;
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawSphere(x, y, r, pressed) {
      ctx.save();
      ctx.translate(x, y);

      if (!pressed) {
        const g = ctx.createRadialGradient(-r*0.35, -r*0.35, r*0.2, 0, 0, r*1.25);
        g.addColorStop(0, '#ffe67a');
        g.addColorStop(0.45, '#f5c443');
        g.addColorStop(1, '#c98a12');

        ctx.beginPath();
        ctx.fillStyle = g;
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.ellipse(-r*0.25, -r*0.28, r*0.22, r*0.15, -0.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(0,0,0,0.22)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        // 按下：更明亮更發光
        ctx.shadowColor = 'rgba(255, 170, 40, 0.98)';
        ctx.shadowBlur = 42;

        const g = ctx.createRadialGradient(-r*0.35, -r*0.35, r*0.2, 0, 0, r*1.5);
        g.addColorStop(0, '#fffbe8');
        g.addColorStop(0.18, '#ffe8a6');
        g.addColorStop(0.48, '#ffb84f');
        g.addColorStop(1, '#a84c00');

        ctx.beginPath();
        ctx.fillStyle = g;
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 0.30;
        for (let i = -4; i <= 4; i++) {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(255,255,255,0.85)';
          ctx.lineWidth = 1.2;
          ctx.arc(0, 0, r*0.92, (i*0.22) + 0.15, (i*0.22) + 0.46);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        ctx.strokeStyle = 'rgba(255, 240, 210, 0.46)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawConesRing(x, y, r, pressed, energy, angle) {
      // 你指定：12 顆
      const count = 12;

      const ringR = r * 1.05;
      const tilt = 0.62;

      const coneLen = r * 0.33;
      const coneHalfW = r * 0.12;

      const alpha = 0.58 + 0.22 * energy;

      ctx.save();
      ctx.translate(x, y);

      // 你指定：自轉角度傾斜 45 度
      ctx.rotate(Math.PI / 4);

      ctx.globalAlpha = alpha;

      for (let i = 0; i < count; i++) {
        const a = angle + (i / count) * Math.PI * 2;

        const tipX = Math.cos(a) * ringR;
        const tipY = Math.sin(a) * ringR * tilt;

        const rot = Math.atan2(tipY, tipX);

        ctx.save();
        ctx.translate(tipX, tipY);
        ctx.rotate(rot);

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-coneLen, -coneHalfW);
        ctx.lineTo(-coneLen,  coneHalfW);
        ctx.closePath();

        const fill = pressed ? 'rgba(255, 205, 120, 0.92)' : 'rgba(195, 120, 25, 0.9)';
        const edge = pressed ? 'rgba(255, 245, 220, 0.85)' : 'rgba(40, 22, 6, 0.65)';

        ctx.fillStyle = fill;
        ctx.fill();

        ctx.lineWidth = 2;
        ctx.strokeStyle = edge;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-coneLen, 0);
        ctx.strokeStyle = pressed ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 1.2;
        ctx.stroke();

        ctx.restore();
      }

      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function tick() {
      const dx = mouseX - prevX;
      const dy = mouseY - prevY;
      const instSpeed = Math.sqrt(dx*dx + dy*dy);

      speed = speed * 0.85 + instSpeed * 0.15;

      const add = Math.min(1, speed / 22);
      moveEnergy = Math.max(0, Math.min(1, moveEnergy * 0.92 + add * 0.22));

      // 你指定：自轉速度降為目前的 1/3
      const baseSpin = 0.02 / 3;
      const energySpin = (0.20 / 3);
      ringAngle += baseSpin + moveEnergy * energySpin;

      prevX = mouseX; prevY = mouseY;

      drawBackground();
      drawConesRing(mouseX, mouseY, SPHERE_R, isDown, moveEnergy, ringAngle);
      drawSphere(mouseX, mouseY, SPHERE_R, isDown);

      updateGlassMasks();

      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
