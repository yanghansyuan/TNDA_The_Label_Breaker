<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCONSOLABLE - Final Version</title>
    <style>
        :root {
            /* 整體低飽和藍紫灰黑調 */
            --bg-start: #2c3e50; /* 較深的藍灰 */
            --bg-end: #1a1a2e;   /* 更接近純黑的深紫 */
            --mist-color: rgba(40, 48, 64, 0.6); /* 迷霧感 */
            --line-color: rgba(150, 160, 180, 0.4); /* 歪斜線條 */
            --dot-color: rgba(200, 210, 230, 0.5);  /* 點的顏色 */
            --circle-stroke-color: rgba(180, 190, 210, 0.6);
            --interaction-glow: rgba(100, 110, 130, 0.5); /* 滑鼠互動時的輝光 */
            --click-circle-base-color-hue: 210; /* 藍色的色相 */
            --click-circle-base-color-saturation-min: 10%;
            --click-circle-base-color-saturation-max: 30%;
            --click-circle-base-color-lightness-min: 0%;
            --click-circle-base-color-lightness-max: 40%;
            --added-circle-color-hue: 210;
            --added-circle-color-saturation-min: 10%;
            --added-circle-color-saturation-max: 30%;
            --added-circle-color-lightness-min: 60%;
            --added-circle-color-lightness-max: 100%;
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* 隱藏滾動條 */
            height: 100vh; /* 佔滿整個視窗高度 */
            background: linear-gradient(to bottom, var(--bg-start), var(--bg-end));
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%2396A0B4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>'), auto; /* 基礎游標 */
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* 讓canvas在最底層 */
        }

        .content {
            display: none; /* 刪除畫面中的文字 */
        }
    </style>
</head>
<body>

    <canvas id="emotionCanvas"></canvas>

    <div class="content" id="introText"></div>

    <script>
        const canvas = document.getElementById("emotionCanvas");
        const ctx = canvas.getContext("2d");

        let dots = [];
        let lines = [];
        let circles = []; // 點擊生成的可互動圓
        let addedCircle = null; // 新增的實心圓
        let mousePos = { x: -100, y: -100 }; // 初始化滑鼠位置到畫布外
        let isDragging = false; // 標記是否正在拖動
        let dragLine = null; // 拖動時產生的線條
        let lastMousePos = { x: -100, y: -100 }; // 記錄上一次滑鼠位置，用於繪製拖動線條

        // --- 顏色生成函數 ---
        function generateClickCircleColor() {
            const lightness = Math.random() * 40; // 0% to 40%
            const hue = 210; // Blue hue
            const saturation = 10 + Math.random() * 20; // 10% to 30%
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        function generateAddedCircleColor() {
            const lightness = 60 + Math.random() * 40; // 60% to 100%
            const hue = 210; // Blue hue
            const saturation = 10 + Math.random() * 20; // 10% to 30%
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }
        // --- 顏色生成函數結束 ---

        // 獲取平均細線下落速度，用於新圓的進場速度
        let averageLineSpeedY = 0;
        function calculateAverageLineSpeed() {
            if (lines.length > 0) {
                const sumSpeed = lines.reduce((sum, line) => sum + line.speedY, 0);
                averageLineSpeedY = sumSpeed / lines.length;
            } else {
                averageLineSpeedY = 0.25; // 預設值，如果沒有線條則使用一個平均值
            }
        }

        // 1. 自適應畫布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createDots();
            createLines();
            calculateAverageLineSpeed(); // 計算平均速度
            if (!addedCircle) {
                createAddedCircle();
            } else {
                // 調整 addedCircle 位置，使其在畫布中央
                const oldProgress = addedCircle.movementProgress; // 保存進度
                addedCircle.x = canvas.width / 2;
                addedCircle.y = canvas.height / 2;
                addedCircle.initialY = canvas.height / 2;
                addedCircle.targetX = canvas.width / 2;
                addedCircle.targetY = canvas.height / 2;
                // 重新計算 Spawn 位置，使其在角落外面
                addedCircle.spawnX = Math.random() < 0.5 ? -100 - Math.random() * 50 : canvas.width + 100 + Math.random() * 50;
                addedCircle.spawnY = -100 - Math.random() * 50;
                addedCircle.movementProgress = oldProgress; // 恢復進度
            }
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas(); // 初始調用

        // 2. 受重力影響的點（雨滴）
        function createDots() {
            dots = [];
            const numberOfDots = Math.max(200, Math.floor(canvas.width * canvas.height / 2000));
            for (let i = 0; i < numberOfDots; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: 0.5 + Math.random() * 1.0,
                    size: 1.5 + Math.random() * 1.5,
                    density: Math.random()
                });
            }
            dots.sort((a, b) => a.density - b.density);
        }

        // 3. 垂直方向的細線，隨機旋轉
        function createLines() {
            lines = [];
            const numberOfLines = Math.max(30, Math.floor(canvas.width / 20));
            for (let i = 0; i < numberOfLines; i++) {
                const startX = Math.random() * canvas.width;
                const startY = Math.random() * canvas.height;
                const length = 50 + Math.random() * 100;
                const angleVariation = (Math.random() * 30 - 15) * Math.PI / 180;
                const baseAngle = -Math.PI / 2; // 基礎為垂直向下
                const angle = baseAngle + angleVariation;

                const endX = startX + length * Math.cos(angle);
                const endY = startY + length * Math.sin(angle);

                lines.push({
                    x1: startX,
                    y1: startY,
                    x2: endX,
                    y2: endY,
                    speedY: 0.2 + Math.random() * 0.3,
                    opacity: 0.3 + Math.random() * 0.3,
                    width: 0.5 + Math.random() * 0.5,
                    initialAngle: angle,
                    color: "rgba(150, 160, 180, 0.4)" // 預設顏色
                });
            }
        }

        // 4. 點擊時出現的圓
        canvas.addEventListener("click", (event) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;

            circles.push({
                x: clickX,
                y: clickY,
                initialY: clickY,
                radius: 30,
                fallSpeed: 0.5,
                stretchFactor: 0,
                alpha: 1.0, // 初始透明度為 1.0 (不透明)
                color: generateClickCircleColor(),
                creationTime: Date.now() // 記錄創建時間，用於淡出
            });
        });

        // 5. 新增的實心圓 (中心) - 帶有重置和重新生成邏輯
        function createAddedCircle() {
            const spawnX = Math.random() < 0.5 ? -100 - Math.random() * 50 : canvas.width + 100 + Math.random() * 50;
            const spawnY = -100 - Math.random() * 50;

            addedCircle = {
                x: canvas.width / 2,
                y: canvas.height / 2,
                initialY: canvas.height / 2,
                spawnX: spawnX,
                spawnY: spawnY,
                currentX: spawnX,
                currentY: spawnY,
                targetX: canvas.width / 2,
                targetY: canvas.height / 2,
                radius: Math.min(canvas.width, canvas.height) / 5,
                fallSpeed: averageLineSpeedY * 0.5, // 速度與細線接近 (取平均速度的一半作為初始進場速度)
                baseFallSpeed: averageLineSpeedY * 0.5, // 記錄基礎下沉速度
                stretchFactor: 0,
                alpha: 0.7,
                color: generateAddedCircleColor(),
                distortion: 0,
                wormyFactor: 0,
                movementProgress: 0, // 0: 從角落進場, 1: 到達中心並開始下沉
                creationTime: Date.now() // 記錄生成時間，用於重置
            };
        }

        function moveAddedCircleToCenter() {
            if (!addedCircle) return;

            const entrySpeedFactor = 0.03; // 控制進場速度的因子，比之前慢，更粘膩
            addedCircle.movementProgress = Math.min(1, addedCircle.movementProgress + entrySpeedFactor);

            // 根據進度進行插值 (Lerp)
            addedCircle.currentX = addedCircle.spawnX + (addedCircle.targetX - addedCircle.spawnX) * addedCircle.movementProgress;
            addedCircle.currentY = addedCircle.spawnY + (addedCircle.targetY - addedCircle.spawnY) * addedCircle.movementProgress;

            // 當圓進入畫面中心後，才開始模擬下沉和變形
            if (addedCircle.movementProgress >= 1) {
                // 模擬下沉和拉長
                addedCircle.y += addedCircle.fallSpeed;
                addedCircle.fallSpeed += 0.003; // 重力加速
                addedCircle.stretchFactor = Math.min(1, (addedCircle.y - addedCircle.initialY) / (canvas.height * 0.8));

                // 模擬滑鼠互動時的變形 (油水分離般避開)
                const dxAdded = mousePos.x - addedCircle.currentX;
                const dyAdded = mousePos.y - addedCircle.currentY;
                const distanceAdded = Math.sqrt(dxAdded * dxAdded + dyAdded * dyAdded);
                const mouseInfluenceRadiusAdded = addedCircle.radius * 1.5; // 影響範圍

                if (distanceAdded < mouseInfluenceRadiusAdded) {
                    // 距離越近，避開效果越強
                    const avoidanceStrength = (mouseInfluenceRadiusAdded - distanceAdded) / mouseInfluenceRadiusAdded * 15; // 避開強度
                    // 計算滑鼠方向的向量，並反向推動圓
                    const angleToMouse = Math.atan2(dyAdded, dxAdded);
                    addedCircle.currentX -= Math.cos(angleToMouse) * avoidanceStrength;
                    addedCircle.currentY -= Math.sin(angleToMouse) * avoidanceStrength;

                    addedCircle.distortion = avoidanceStrength * 0.5; // 保持變形參數，用於後續繪製
                } else {
                    addedCircle.distortion *= 0.9; // 緩慢恢復
                }

                // 模擬蟲狀變形
                addedCircle.wormyFactor = Math.min(1, Math.abs(addedCircle.fallSpeed * 20));
                const wormyIntensity = addedCircle.wormyFactor * 15;

                 // 繪製時使用 currentX/currentY 作為中心位置
                drawAddedCircle(addedCircle.currentX, addedCircle.currentY, addedCircle.radius, addedCircle.color, addedCircle.stretchFactor, addedCircle.distortion, wormyIntensity, addedCircle.alpha);

            } else {
                // 進場階段，只繪製移動中的圓
                drawAddedCircle(addedCircle.currentX, addedCircle.currentY, addedCircle.radius, addedCircle.color, 0, 0, 0, addedCircle.alpha);
            }


            // 如果圓離開畫面，則重置
            if (addedCircle.y > canvas.height + addedCircle.radius * 2) {
                createAddedCircle(); // 重新生成
            }
        }

        // 繪製 addedCircle 的函數，分離繪製邏輯
        function drawAddedCircle(cx, cy, radius, color, stretch, distortion, wormy, alpha) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.strokeStyle = `rgba(200, 210, 230, ${alpha})`;
            ctx.lineWidth = 1.5 + stretch * 3;

            const path = new Path2D();
            const currentRadius = radius * (1 + stretch * 0.7);
            const segments = 60;
            const waveIntensity = wormy * 1.5; // 調整蟲狀的強度

            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                let segmentRadius = currentRadius;

                // 蟲狀變形
                const waveOffset = Math.sin(angle * 5 + cy * 0.02) * waveIntensity * Math.sin(i / segments * Math.PI);
                segmentRadius += waveOffset;

                // 油水分離般避開滑鼠：在滑鼠方向上縮小半徑
                const angleToMouse = Math.atan2(cy - mousePos.y, cx - mousePos.x);
                const distToMouse = Math.sqrt((cx - mousePos.x)**2 + (cy - mousePos.y)**2);
                const mouseInfluenceRadius = radius * 1.5; // 這裡的 mouseInfluenceRadius 應該與 moveAddedCircleToCenter 中的一致，或者更精確地傳入

                // 確保只有在滑鼠靠近且圓在受到影響時才進行凹陷
                if (distToMouse < mouseInfluenceRadius + distortion) { // 加上 distortion 讓邊緣看起來更自然
                    const pushAmount = (mouseInfluenceRadius - distToMouse) / mouseInfluenceRadius * distortion;
                    segmentRadius -= pushAmount;
                }

                const x = cx + segmentRadius * Math.cos(angle);
                const y = cy + segmentRadius * Math.sin(angle);

                if (i === 0) {
                    path.moveTo(x, y);
                } else {
                    path.lineTo(x, y);
                }
            }
            path.closePath();

            ctx.fill(path);
            ctx.stroke(path);
            ctx.restore();
        }


        // 6. 拖動時繪製線條
        canvas.addEventListener("mousedown", (event) => {
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            lastMousePos = { x: event.clientX - rect.left, y: event.clientY - rect.top };
            mousePos = { x: event.clientX - rect.left, y: event.clientY - rect.top };
            dragLine = {
                startX: lastMousePos.x,
                startY: lastMousePos.y,
                endX: lastMousePos.x,
                endY: lastMousePos.y,
                color: "rgba(180, 190, 210, 0.4)",
                width: 1,
                opacity: 0.6,
                length: 0,
                creationTime: Date.now()
            };
            lines.push(dragLine);
        });

        canvas.addEventListener("mousemove", (event) => {
            const rect = canvas.getBoundingClientRect();
            mousePos = { x: event.clientX - rect.left, y: event.clientY - rect.top };

            if (isDragging && dragLine) {
                dragLine.endX = mousePos.x;
                dragLine.endY = mousePos.y;
                dragLine.length = Math.sqrt(Math.pow(dragLine.endX - dragLine.startX, 2) + Math.pow(dragLine.endY - dragLine.startY, 2));
                dragLine.width = 1 + Math.min(5, dragLine.length / 50);
                dragLine.opacity = 0.5 + Math.min(0.5, dragLine.length / 150);
            }
        });

        canvas.addEventListener("mouseup", () => {
            isDragging = false;
            if (dragLine) {
                dragLine = null;
            }
        });

        canvas.addEventListener("mouseout", () => {
            isDragging = false;
            mousePos = { x: -100, y: -100 };
            if (dragLine) {
                dragLine = null;
            }
        });

        // 動畫循環
        function animate() {
            ctx.fillStyle = "rgba(46, 52, 64, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 點 (雨滴)
            ctx.fillStyle = "var(--dot-color)";
            dots.forEach(d => {
                d.y += d.speed;
                d.speed += d.density * 0.005;
                if (d.y > canvas.height) {
                    d.y = -d.size * 2;
                    d.x = Math.random() * canvas.width;
                    d.speed = 0.5 + Math.random() * 1.0;
                    d.density = Math.random();
                }
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // 細線 (包括靜態和拖動生成的)
            for (let i = lines.length - 1; i >= 0; i--) {
                const line = lines[i];

                // 處理靜態線條的移動
                if (line !== dragLine) {
                    line.y1 += line.speedY;
                    line.y2 += line.speedY;

                    if (line.y1 > canvas.height && line.y2 > canvas.height) {
                        // 重置靜態線條
                        const startX = Math.random() * canvas.width;
                        const startY = -50 - Math.random() * 50;
                        const length = 50 + Math.random() * 100;
                        const angleVariation = (Math.random() * 30 - 15) * Math.PI / 180;
                        const baseAngle = -Math.PI / 2;
                        const angle = baseAngle + angleVariation;

                        line.x1 = startX;
                        line.y1 = startY;
                        line.x2 = startX + length * Math.cos(angle);
                        line.y2 = startY + length * Math.sin(angle);
                        line.speedY = 0.2 + Math.random() * 0.3;
                        line.opacity = 0.3 + Math.random() * 0.3;
                        line.width = 0.5 + Math.random() * 0.5;
                    }
                } else {
                    // 處理拖動線條的淡出效果
                    const timeSinceCreation = Date.now() - line.creationTime;
                    const fadeOutDelay = 2000; // 線條消失前的延遲
                    const maxVisibleTime = 5000; // 線條總共在畫面上停留的時間

                    if (timeSinceCreation > maxVisibleTime) {
                        lines.splice(i, 1);
                        continue;
                    } else if (timeSinceCreation > fadeOutDelay) {
                        const fadeProgress = (timeSinceCreation - fadeOutDelay) / (maxVisibleTime - fadeOutDelay);
                        line.opacity = line.opacity * (1 - fadeProgress);
                        line.width = line.width * (1 - fadeProgress * 0.5);
                    }
                }

                ctx.globalAlpha = line.opacity;
                ctx.strokeStyle = line.color;
                ctx.lineWidth = line.width;
                ctx.beginPath();
                ctx.moveTo(line.x1, line.y1);
                ctx.lineTo(line.x2, line.y2);
                ctx.stroke();
            }
            ctx.globalAlpha = 1.0; // 重置透明度
            ctx.lineWidth = 0.8; // 重置線寬
            ctx.strokeStyle = "var(--line-color)"; // 重置線條顏色

            // 點擊時出現的圓 (處理殘影淡出)
            for (let i = circles.length - 1; i >= 0; i--) {
                const circle = circles[i];

                circle.y += circle.fallSpeed;
                circle.fallSpeed += 0.005;
                circle.stretchFactor = Math.min(1, (circle.y - circle.initialY) / (canvas.height * 0.5));

                // 殘影淡出效果
                const timeSinceCreation = Date.now() - circle.creationTime;
                const fadeOutStartDelay = 1500; // 開始淡出的延遲
                const maxVisibleDuration = 4000; // 圓的總生命週期
                let alpha = circle.alpha;

                if (timeSinceCreation > maxVisibleDuration) {
                    circles.splice(i, 1); // 超過生命週期移除
                    continue;
                } else if (timeSinceCreation > fadeOutStartDelay) {
                    const fadeProgress = (timeSinceCreation - fadeOutStartDelay) / (maxVisibleDuration - fadeOutStartDelay);
                    alpha = circle.alpha * (1 - fadeProgress); // 淡出
                }

                const dx = mousePos.x - circle.x;
                const dy = mousePos.y - circle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const mouseInfluenceRadius = circle.radius * 3;

                let isThisCircleNearMouse = false;
                if (distance < mouseInfluenceRadius) {
                    isThisCircleNearMouse = true;
                    // 模擬滑鼠靠近時邊緣向內縮
                    ctx.save();
                    const shape = new Path2D();
                    shape.ellipse(circle.x, circle.y + circle.radius * circle.stretchFactor * 0.8, circle.radius, circle.radius * (1 + circle.stretchFactor * 0.5), 0, 0, Math.PI * 2);
                    ctx.clip(shape);
                    ctx.strokeStyle = "var(--interaction-glow)";
                    ctx.lineWidth = 3;
                    const inwardPush = (mouseInfluenceRadius - distance) / mouseInfluenceRadius * 8;
                    ctx.beginPath();
                    ctx.arc(circle.x, circle.y, circle.radius + circle.radius * circle.stretchFactor * 0.5, 0, Math.PI * 2);
                    ctx.lineWidth = 3 + inwardPush;
                    ctx.stroke();
                    ctx.restore();
                }

                ctx.beginPath();
                ctx.ellipse(
                    circle.x,
                    circle.y + circle.radius * circle.stretchFactor * 0.8,
                    circle.radius,
                    circle.radius * (1 + circle.stretchFactor * 0.5),
                    0, 0, Math.PI * 2
                );
                ctx.fillStyle = circle.color;
                ctx.fill();

                ctx.strokeStyle = `rgba(200, 210, 230, ${alpha})`; // 使用淡出的 alpha
                ctx.lineWidth = 1.5 + circle.stretchFactor * 2;
                ctx.stroke();
            }

            // 新增的實心圓 (中心)
            moveAddedCircleToCenter();

            // 判斷是否有任何圓（點擊生成或中心圓）被滑鼠靠近
            let anyCircleNearMouse = circles.some(circle => {
                const dx = mousePos.x - circle.x;
                const dy = mousePos.y - circle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const mouseInfluenceRadius = circle.radius * 3;
                return distance < mouseInfluenceRadius;
            }) || (addedCircle && addedCircle.movementProgress >= 1 && Math.sqrt(Math.pow(mousePos.x - addedCircle.currentX, 2) + Math.pow(mousePos.y - addedCircle.currentY, 2)) < addedCircle.radius * 1.5);


            if (anyCircleNearMouse) {
                canvas.style.cursor = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23E0E0E0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9 15l6-6M15 9l-6 6"></path></svg>'), pointer`;
            } else {
                 canvas.style.cursor = `url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%2396A0B4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>'), auto`;
            }

            requestAnimationFrame(animate);
        }

        // 初始生成點和線
        createDots();
        createLines();
        calculateAverageLineSpeed(); // 計算一次初始平均速度

        // 開始動畫
        animate();

    </script>

</body>
</html>
