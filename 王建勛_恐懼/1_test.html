<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>看不見的色彩：光下的滲出</title>
  <style>
    :root{
      --bg1:#0b0f17;
      --bg2:#0f1a2b;
      --paper:#f3f1eb;
      --ink: rgba(255,255,255,.85);

      /* 情緒色 */
      --calm:#7fd1ff;   /* 冷靜 */
      --warm:#ffb85c;   /* 光/甜 */
      --stress:#ff5fa2; /* 壓力滲出 */
      --shadow:#2b2f3a;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family: ui-sans-serif, system-ui, -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif; }
    body{
      overflow:hidden;
      background: radial-gradient(1200px 900px at 20% 10%, rgba(255,255,255,.08), transparent 55%),
                  radial-gradient(900px 700px at 80% 40%, rgba(255,184,92,.12), transparent 60%),
                  linear-gradient(160deg, var(--bg1), var(--bg2));
      color: var(--ink);
    }

    /* 舞台 */
    .stage{
      position:relative;
      height:100%;
      width:100%;
      isolation:isolate;
    }

    /* 光束（像窗光） */
    .light{
      position:absolute;
      inset:-20%;
      pointer-events:none;
      z-index:0;
      filter: blur(0px);
      opacity:.9;
      transform: rotate(-12deg);
      background:
        linear-gradient(90deg,
          transparent 0%,
          rgba(255,248,220,.08) 10%,
          rgba(255,248,220,.22) 18%,
          rgba(255,248,220,.06) 26%,
          transparent 34%,
          transparent 44%,
          rgba(255,204,140,.10) 52%,
          rgba(255,204,140,.20) 60%,
          rgba(255,204,140,.06) 68%,
          transparent 76%,
          rgba(180,210,255,.06) 86%,
          transparent 100%);
      animation: drift 10s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }
    @keyframes drift{
      from{ transform: rotate(-12deg) translate3d(-2vw,-1vh,0) scale(1.02); }
      to  { transform: rotate(-10deg) translate3d( 2vw, 1vh,0) scale(1.05); }
    }

    /* UI：小標題 + 提示 */
    .hud{
      position:absolute;
      inset: 0;
      padding: clamp(14px, 2.2vw, 28px);
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      pointer-events:none;
      z-index:4;
    }
    .title{
      pointer-events:none;
      max-width:min(520px, 70vw);
    }
    .title h1{
      margin:0 0 8px 0;
      font-size: clamp(18px, 2.2vw, 28px);
      letter-spacing:.04em;
      font-weight:700;
    }
    .title p{
      margin:0;
      line-height:1.6;
      font-size: clamp(12px, 1.35vw, 14px);
      opacity:.8;
    }
    .tip{
      text-align:right;
      font-size: clamp(12px, 1.35vw, 14px);
      opacity:.75;
    }
    .tip b{ opacity:.95; }

    /* 情緒層 */
    .field{
      position:absolute;
      inset:0;
      z-index:1;
    }

    /* 形狀基本 */
    .shape{
      position:absolute;
      left: var(--x);
      top:  var(--y);
      width: var(--s);
      height: var(--s);
      transform: translate(-50%,-50%) rotate(var(--r));
      opacity: var(--o);
      filter: blur(var(--b));
      transition: transform .35s ease, filter .35s ease, opacity .35s ease;
      animation: float var(--t) ease-in-out infinite alternate;
      will-change: transform;
      mix-blend-mode: screen;
    }
    @keyframes float{
      from { transform: translate(-50%,-50%) rotate(var(--r)) translate3d(-0.8vw,-0.6vh,0); }
      to   { transform: translate(-50%,-50%) rotate(calc(var(--r) + 12deg)) translate3d(0.8vw,0.6vh,0); }
    }

    /* 圓（點） */
    .dot{
      border-radius: 999px;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,.05) 55%, transparent 70%),
                  radial-gradient(circle at 60% 70%, color-mix(in srgb, var(--c) 65%, transparent), transparent 60%);
      box-shadow:
        0 0 0.8rem color-mix(in srgb, var(--c) 40%, transparent),
        0 0 2.2rem color-mix(in srgb, var(--c) 22%, transparent);
    }

    /* 線（線段） */
    .line{
      width: calc(var(--s) * 1.9);
      height: max(2px, calc(var(--s) * 0.08));
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--c) 70%, transparent), transparent);
      box-shadow: 0 0 2rem color-mix(in srgb, var(--c) 18%, transparent);
      filter: blur(calc(var(--b) * 0.9));
    }

    /* 面（三角形） */
    .tri{
      width:0; height:0;
      border-left:  calc(var(--s) * 0.62) solid transparent;
      border-right: calc(var(--s) * 0.62) solid transparent;
      border-bottom: var(--s) solid color-mix(in srgb, var(--c) 55%, transparent);
      filter: drop-shadow(0 0 1.6rem color-mix(in srgb, var(--c) 22%, transparent));
      opacity: calc(var(--o) * .9);
    }

    /* hover：情緒被碰到 -> 緊繃/擴散/變亮 */
    .shape:hover{
      transform: translate(-50%,-50%) rotate(calc(var(--r) - 10deg)) scale(1.12);
      filter: blur(calc(var(--b) * .7));
      opacity: min(1, calc(var(--o) + .25));
    }

    /* 右側：像一杯琥珀的容器（情緒被裝著） */
    .glass{
      position:absolute;
      right: clamp(14px, 2vw, 22px);
      top: 50%;
      transform: translateY(-50%);
      width: min(240px, 34vw);
      height: min(380px, 54vw);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        radial-gradient(140px 120px at 70% 20%, rgba(255,255,255,.18), transparent 55%),
        radial-gradient(140px 140px at 30% 85%, rgba(255,184,92,.10), transparent 60%);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      overflow:hidden;
      z-index:3;
      backdrop-filter: blur(8px);
    }
    .glass::before{
      content:"";
      position:absolute;
      inset: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      opacity:.8;
      pointer-events:none;
    }
    .liquid{
      position:absolute;
      left: 10px;
      right:10px;
      bottom:10px;
      height: 52%;
      border-radius: 16px;
      background:
        radial-gradient(120px 80px at 60% 10%, rgba(255,255,255,.22), transparent 60%),
        linear-gradient(180deg, rgba(255,184,92,.78), rgba(255,120,40,.48));
      box-shadow: inset 0 0 30px rgba(0,0,0,.18);
      opacity:.88;
    }
    .ice{
      position:absolute;
      width: 46px; height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,.28), rgba(255,255,255,.06));
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 25px rgba(0,0,0,.22);
      transform: rotate(18deg);
      opacity:.9;
      filter: blur(.1px);
    }
    .ice.i1{ left: 26px; top: 54px; }
    .ice.i2{ left: 78px; top: 92px; transform: rotate(-10deg); }
    .ice.i3{ left: 140px; top: 66px; transform: rotate(28deg); }

    /* 點擊掉落的「壓力泡泡」 */
    .drop{
      position:absolute;
      width: 14px; height:14px;
      border-radius:999px;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.65), rgba(255,95,162,.55) 40%, rgba(255,95,162,.05) 70%);
      box-shadow: 0 0 18px rgba(255,95,162,.25);
      transform: translate(-50%,-50%);
      pointer-events:none;
      z-index:2;
      animation: fall 1.2s ease-in forwards;
    }
    @keyframes fall{
      0%   { opacity:0; transform: translate(-50%,-50%) scale(.6); }
      15%  { opacity:1; }
      100% { opacity:0; transform: translate(-50%, calc(-50% + 52vh)) scale(1.0); filter: blur(1px); }
    }

    /* 小螢幕：把杯子縮小，不擋畫面 */
    @media (max-width: 720px){
      .glass{
        top:auto;
        bottom: 14px;
        right: 14px;
        transform:none;
        width: 44vw;
        height: 34vh;
        border-radius: 18px;
      }
      .ice{ display:none; }
      .title p{ max-width: 62vw; }
    }
  </style>
</head>

<body>
  <div class="stage" id="stage">
    <div class="light"></div>

    <div class="hud">
      <div class="title">
        <h1>光下的滲出</h1>
        <p>有些情緒看起來像安靜，但只要被碰到，就會用很小的方式擴散。</p>
      </div>
      <div class="tip">
        <div>滑過形狀：<b>緊繃 / 變亮</b></div>
        <div>點一下畫面：<b>丟一顆壓力泡泡</b></div>
      </div>
    </div>

    <div class="field" id="field" aria-hidden="true"></div>

    <aside class="glass" aria-label="情緒容器">
      <div class="ice i1"></div>
      <div class="ice i2"></div>
      <div class="ice i3"></div>
      <div class="liquid"></div>
    </aside>
  </div>

  <script>
    const field = document.getElementById('field');
    const stage = document.getElementById('stage');

    // 依螢幕大小決定形狀數量（自適應）
    const count = Math.round(Math.max(16, Math.min(42, window.innerWidth / 28)));

    // 三種情緒層：冷靜(藍) / 光(橘) / 壓力滲出(粉)
    const palette = [
      { c: getCSS('--calm'),   w: 0.44 },
      { c: getCSS('--warm'),   w: 0.38 },
      { c: getCSS('--stress'), w: 0.18 },
    ];

    function getCSS(v){
      return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
    }

    function pickColor(){
      const r = Math.random();
      let acc = 0;
      for (const p of palette){
        acc += p.w;
        if (r <= acc) return p.c;
      }
      return palette[0].c;
    }

    function rnd(min,max){ return min + Math.random()*(max-min); }

    function makeShape(i){
      const typeRoll = Math.random();
      const el = document.createElement('div');
      el.classList.add('shape');

      if (typeRoll < 0.5) el.classList.add('dot');
      else if (typeRoll < 0.78) el.classList.add('line');
      else el.classList.add('tri');

      const s = rnd(16, 64) * (window.innerWidth < 720 ? 0.85 : 1);
      const x = rnd(6, 84);             // 留右邊杯子空間
      const y = rnd(10, 92);
      const r = rnd(-28, 28) + 'deg';
      const o = rnd(0.25, 0.85).toFixed(2);
      const b = rnd(0.0, 1.6).toFixed(2) + 'px';
      const t = rnd(3.2, 8.5).toFixed(2) + 's';
      const c = pickColor();

      el.style.setProperty('--s', s + 'px');
      el.style.setProperty('--x', x + 'vw');
      el.style.setProperty('--y', y + 'vh');
      el.style.setProperty('--r', r);
      el.style.setProperty('--o', o);
      el.style.setProperty('--b', b);
      el.style.setProperty('--t', t);
      el.style.setProperty('--c', c);

      // 小小的互動：滑過時，讓「壓力色」更容易被看見
      el.addEventListener('mouseenter', () => {
        if (Math.random() < 0.22) el.style.setProperty('--c', getCSS('--stress'));
      });

      return el;
    }

    function seed(){
      field.innerHTML = '';
      for(let i=0;i<count;i++){
        field.appendChild(makeShape(i));
      }
    }

    // 點擊：丟一顆「壓力泡泡」往下沉
    stage.addEventListener('pointerdown', (e) => {
      const d = document.createElement('div');
      d.className = 'drop';
      d.style.left = e.clientX + 'px';
      d.style.top  = e.clientY + 'px';
      stage.appendChild(d);
      d.addEventListener('animationend', ()=> d.remove());
    });

    // 視窗改變：重排（自適應）
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(seed, 160);
    });

    seed();
  </script>
</body>
</html>
