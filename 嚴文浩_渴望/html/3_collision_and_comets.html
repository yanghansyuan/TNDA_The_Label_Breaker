<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渴望 - 3_collision_and_comets</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1c; /* 為了讓光暈和彗星更明顯，背景調暗一點，帶點深空宇宙感 */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="artCanvas"></canvas>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const colors = ['#3a86ff', '#f4a261', '#e63946', '#80ed99'];

        // --- 輔助函數：計算兩點距離 ---
        function getDistance(x1, y1, x2, y2) {
            const xDist = x2 - x1;
            const yDist = y2 - y1;
            return Math.sqrt(Math.pow(xDist, 2) + Math.pow(yDist, 2));
        }

        // --- 1. 浮游物件類別 (加入碰撞偵測標籤) ---
        class FloatingShape {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.angle = Math.random() * Math.PI * 2;
                this.vAngle = (Math.random() - 0.5) * 0.02;
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.size = Math.random() * 20 + 15; // 稍微放大一點點
                this.type = Math.floor(Math.random() * 4); 
                
                // 碰撞冷卻時間，避免黏在一起無限觸發特效
                this.collisionCooldown = 0; 
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.vAngle;

                if (this.collisionCooldown > 0) this.collisionCooldown--;

                // 邊界環繞
                if (this.x > canvas.width + 50) this.x = -50;
                if (this.x < -50) this.x = canvas.width + 50;
                if (this.y > canvas.height + 50) this.y = -50;
                if (this.y < -50) this.y = canvas.height + 50;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;

                ctx.beginPath();
                if (this.type === 0) { // 圓形 (可碰撞)
                    // 如果剛碰撞過，畫一個微微的光暈
                    if(this.collisionCooldown > 0) {
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = this.color;
                    }
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0; // 重置光暈
                } else if (this.type === 1) { // 鏤空三角形
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size, this.size);
                    ctx.lineTo(-this.size, this.size);
                    ctx.closePath();
                    ctx.stroke();
                } else if (this.type === 2) { // 實心矩形
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size * 1.5);
                } else if (this.type === 3) { // 帶尾巴的線條
                    ctx.arc(0, 0, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(-this.size * 3, 0);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        // --- 2. 線條狀粒子特效 (碰撞時產生) ---
        class LineParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.length = Math.random() * 15 + 5;
                this.life = 1.0;
                this.decay = Math.random() * 0.05 + 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                // 畫出速度方向的線條
                ctx.lineTo(this.x - this.vx * 2, this.y - this.vy * 2); 
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- 3. 彗星/隕石類別 (實心三角形 + 拖曳粒子) ---
        class Comet {
            constructor() {
                // 從畫面邊緣隨機產生
                if(Math.random() < 0.5) {
                    this.x = Math.random() < 0.5 ? -50 : canvas.width + 50;
                    this.y = Math.random() * canvas.height;
                } else {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() < 0.5 ? -50 : canvas.height + 50;
                }
                
                // 瞄準畫面中央區域飛行，速度較快
                const targetX = canvas.width / 2 + (Math.random() - 0.5) * 300;
                const targetY = canvas.height / 2 + (Math.random() - 0.5) * 300;
                const angle = Math.atan2(targetY - this.y, targetX - this.x);
                const speed = Math.random() * 4 + 6; // 速度 6~10
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = '#fff'; // 彗星主體白色或極淺黃
                this.tailColor = colors[Math.floor(Math.random() * colors.length)];
                this.size = Math.random() * 5 + 5;
                this.angle = angle; // 飛行方向就是三角形的指向
                this.active = true;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // 飛出畫面太遠就標記為不活躍，等待清除
                if (this.x < -100 || this.x > canvas.width + 100 || 
                    this.y < -100 || this.y > canvas.height + 100) {
                    this.active = false;
                }

                // 邊飛邊產生尾巴粒子
                for(let i=0; i<2; i++){
                    particles.push(new CometTrail(this.x, this.y, this.tailColor));
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = this.color;
                
                // 畫實心三角形 (指向右邊，也就是飛行方向)
                ctx.beginPath();
                ctx.moveTo(this.size * 2, 0);
                ctx.lineTo(-this.size, this.size);
                ctx.lineTo(-this.size, -this.size);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // 彗星尾巴的點狀粒子
        class CometTrail {
            constructor(x, y, color) {
                this.x = x + (Math.random() - 0.5) * 10;
                this.y = y + (Math.random() - 0.5) * 10;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.life = 1.0;
                this.decay = Math.random() * 0.03 + 0.01;
            }
            update() {
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 儲存陣列
        const shapes = [];
        const particles = [];
        const comets = [];

        // 初始散落物件 (增加數量讓碰撞更容易發生)
        for(let i = 0; i < 25; i++) {
            shapes.push(new FloatingShape());
        }

        // 點擊互動保留 (產生新物件與點狀粒子)
        window.addEventListener('mousedown', function(event) {
            if (event.button === 0) {
                const burstColor = colors[Math.floor(Math.random() * colors.length)];
                for(let i = 0; i < 15; i++) {
                    // 為了跟線條區分，這裡偷懶用 CometTrail 當作點狀粒子
                    let p = new CometTrail(event.clientX, event.clientY, burstColor);
                    p.x = event.clientX; p.y = event.clientY; // 重置位置
                    p.vx = (Math.random() - 0.5) * 10; p.vy = (Math.random() - 0.5) * 10;
                    p.update = function() { this.x+=this.vx; this.y+=this.vy; this.life-=this.decay; }
                    particles.push(p);
                }
                shapes.push(new FloatingShape(event.clientX, event.clientY));
            }
        });

        // --- 處理圓形之間的碰撞 ---
        function handleCollisions() {
            // 只篩選出圓形 (type === 0)
            const circles = shapes.filter(s => s.type === 0);
            
            for (let i = 0; i < circles.length; i++) {
                for (let j = i + 1; j < circles.length; j++) {
                    const c1 = circles[i];
                    const c2 = circles[j];
                    
                    // 確保兩者都不在冷卻時間內
                    if(c1.collisionCooldown > 0 || c2.collisionCooldown > 0) continue;

                    const dist = getDistance(c1.x, c1.y, c2.x, c2.y);
                    // 如果距離小於兩者半徑之和，代表撞到了！
                    if (dist < (c1.size / 2 + c2.size / 2)) {
                        
                        // 1. 物理反應：交換速度 (簡單的反彈效果)
                        const tempVx = c1.vx;
                        const tempVy = c1.vy;
                        c1.vx = c2.vx;
                        c1.vy = c2.vy;
                        c2.vx = tempVx;
                        c2.vy = tempVy;

                        // 2. 視覺效果：在碰撞中心點產生線條狀光芒
                        const midX = (c1.x + c2.x) / 2;
                        const midY = (c1.y + c2.y) / 2;
                        const burstColor = Math.random() < 0.5 ? c1.color : c2.color;
                        
                        for(let k = 0; k < 8; k++) {
                            particles.push(new LineParticle(midX, midY, burstColor));
                        }

                        // 3. 設定冷卻時間 (大約 30 幀內不再重複觸發碰撞)
                        c1.collisionCooldown = 30;
                        c2.collisionCooldown = 30;
                    }
                }
            }
        }

        // 動畫主迴圈
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 隨機產生彗星 (大約每 100 幀有機會產生一顆)
            if(Math.random() < 0.01) {
                comets.push(new Comet());
            }

            // 2. 執行碰撞偵測
            handleCollisions();

            // 3. 更新與繪製物件
            shapes.forEach(shape => {
                shape.update();
                shape.draw();
            });

            // 4. 更新與繪製彗星
            for (let i = comets.length - 1; i >= 0; i--) {
                const c = comets[i];
                c.update();
                if (!c.active) {
                    comets.splice(i, 1);
                } else {
                    c.draw();
                }
            }

            // 5. 更新與繪製所有粒子 (線條碰撞、點擊爆發、彗星尾巴)
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    p.draw();
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
