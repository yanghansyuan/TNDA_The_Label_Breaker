<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Happy Memory World</title>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family: "Noto Sans TC", sans-serif;
    background:#fff7e8;
}

/* UI */
#ui{
    position:fixed;
    top:24px;
    left:24px;
    background:rgba(255,255,255,0.85);
    padding:18px 22px;
    border-radius:14px;
    backdrop-filter: blur(8px);
    box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

button{
    padding:12px 18px;
    border:none;
    background:#ffb347;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

/* 記憶文字 */
.memoryPopup{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px 36px;
    border-radius:18px;
    font-size:24px;
    line-height:1.6;
    max-width:500px;
    box-shadow:0 20px 60px rgba(0,0,0,0.15);
    text-align:center;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="ui">
    <button onclick="addMemory()">加入一段快樂</button>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width,height;
let blobs = [];
let particles = [];

function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();


// 統一暖橘色系
const palette = [
    "#ffb347",
    "#ffd36e",
    "#ff9f68",
    "#ffc87c",
    "#ffe3a3"
];


// 初始記憶
let memories = JSON.parse(localStorage.getItem("happyMemories") || "[]");

const baseMemories = [
    "被擁抱的一瞬間",
    "陽光灑進房間",
    "和朋友笑到停不下來",
    "一個人安心散步",
    "想到未來時的期待"
];

memories = baseMemories.concat(memories);


// 不規則形 blob
function createBlobs(){
    blobs = memories.map(text => ({
        x: Math.random()*width,
        y: Math.random()*height,
        size: 70 + Math.random()*50,
        color: palette[Math.floor(Math.random()*palette.length)],
        text,
        seed: Math.random()*1000
    }));
}
createBlobs();


// 點擊互動
canvas.addEventListener("mousedown", e=>{
    if(e.button!==0) return;

    blobs.forEach(blob=>{
        const dx = e.clientX - blob.x;
        const dy = e.clientY - blob.y;
        if(Math.sqrt(dx*dx+dy*dy) < blob.size){
            showMemory(blob.text);
            createParticles(blob.x,blob.y,blob.color);
        }
    });
});


// 記憶顯示
function showMemory(text){
    const div = document.createElement("div");
    div.className="memoryPopup";
    div.innerText=text;

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),2600);
}


// 使用者加入記憶（系統自動配色）
function addMemory(){
    const text = prompt("寫下一個讓你快樂的畫面");
    if(!text) return;

    memories.push(text);
    localStorage.setItem("happyMemories",JSON.stringify(memories.slice(5)));

    createBlobs();
}


// 粒子
function createParticles(x,y,color){
    for(let i=0;i<24;i++){
        particles.push({
            x,y,
            vx:(Math.random()-0.5)*4,
            vy:(Math.random()-0.5)*4,
            life:100,
            color
        });
    }
}


// blob繪製
function drawBlob(blob){

    ctx.beginPath();

    const points = 8;
    for(let i=0;i<=points;i++){
        const angle = (Math.PI*2/points)*i;
        const radius = blob.size + Math.sin(Date.now()/700 + blob.seed + i)*12;
        const x = blob.x + Math.cos(angle)*radius;
        const y = blob.y + Math.sin(angle)*radius;
        ctx.lineTo(x,y);
    }

    ctx.closePath();
    ctx.fillStyle = blob.color;
    ctx.fill();
}


// 動畫
function animate(){

    // 世界亮度隨記憶增加
    let light = Math.min(memories.length*3,30);
    ctx.fillStyle=`hsl(35,100%,${94-light}%)`;
    ctx.fillRect(0,0,width,height);

    // blob漂浮
    blobs.forEach(blob=>{
        blob.x += Math.sin(Date.now()/1500 + blob.seed)*0.3;
        blob.y += Math.cos(Date.now()/1700 + blob.seed)*0.3;
        drawBlob(blob);
    });

    // 粒子
    particles.forEach((p,i)=>{
        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;

        ctx.globalAlpha=p.life/100;
        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.arc(p.x,p.y,6,0,Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
