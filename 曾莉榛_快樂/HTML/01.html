<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快樂的形狀</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 隱藏卷軸 */
            background-color: #fff3c2;
            /* 明亮的黃色背景 */
            cursor: pointer;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <canvas id="happyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('happyCanvas');
        const ctx = canvas.getContext('2d');

        // 調色盤：對應你畫作中的柔和色彩
        const colors = ['#FFB3BA', '#FFDFBA', '#BAE1FF', '#E2CBF7'];

        let blobs = [];
        let particles = [];

        // 設定畫布自適應大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 圓潤多邊形 (Blob) 的類別
        class Blob {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseY = y; // 紀錄初始高度，用來做 up & down
                this.radius = Math.random() * 50 + 40; // 大小
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.numWaves = Math.floor(Math.random() * 3) + 4; // 4 到 6 個波浪（花瓣）
                this.amplitude = Math.random() * 20 + 10; // 波浪的深度

                // 動態屬性
                this.phase = Math.random() * Math.PI * 2; // Up & down 的相位
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.01;

                // 決定是填滿還是外框 (模擬你的畫風)
                this.isStroke = Math.random() > 0.3;
                this.lineWidth = Math.random() * 10 + 5;
            }

            update(time) {
                // 有動態感的 up & down
                this.y = this.baseY + Math.sin(time * 0.002 + this.phase) * 30;
                this.rotation += this.rotationSpeed;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.beginPath();

                // 利用極座標和 sin 函數畫出圓潤的多邊形
                for (let i = 0; i <= Math.PI * 2 + 0.1; i += 0.1) {
                    let r = this.radius + Math.sin(i * this.numWaves) * this.amplitude;
                    let px = r * Math.cos(i);
                    let py = r * Math.sin(i);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();

                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                if (this.isStroke) {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = this.lineWidth;
                    ctx.stroke();

                    // 畫內部淡淡的一層模擬疊加效果
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                    ctx.lineWidth = this.lineWidth / 2;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // 放射狀小點點的類別
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 6 + 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0; // 生命週期
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02; // 逐漸消失
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // 初始化畫面上的一些圖形
        for (let i = 0; i < 5; i++) {
            blobs.push(new Blob(Math.random() * canvas.width, Math.random() * canvas.height));
        }

        // 滑鼠點擊事件：生成新圖形與放射狀特效
        window.addEventListener('mousedown', (e) => {
            // 新增一個花朵圖形
            const newBlob = new Blob(e.clientX, e.clientY);
            blobs.push(newBlob);

            // 新增放射狀小點點 (滿足、高漲的感覺)
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(e.clientX, e.clientY, newBlob.color));
            }

            // 避免畫面過度擁擠，保留最新的 20 個大圖形
            if (blobs.length > 20) {
                blobs.shift();
            }
        });

        // 動畫迴圈
        function animate(time) {
            // 清除畫布，並保留一點殘影效果來增加溫柔感
            ctx.fillStyle = 'rgba(255, 225, 105, 0.6)'; // 背景色帶有透明度
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 更新並繪製 Blob
            blobs.forEach(blob => {
                blob.update(time);
                blob.draw(ctx);
            });

            // 更新並繪製 Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // 啟動動畫
        requestAnimationFrame(animate);

    </script>
</body>

</html>
