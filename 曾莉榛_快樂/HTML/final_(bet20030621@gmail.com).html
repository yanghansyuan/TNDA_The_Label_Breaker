<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快樂的形狀</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 隱藏卷軸 */
            background-color: #fff3c2;
            /* 背景色 */
            cursor: pointer;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <canvas id="happyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('happyCanvas');
        const ctx = canvas.getContext('2d');

        // 調色盤
        const colors = ['#FFB3BA', '#FFDFBA', '#BAE1FF', '#E2CBF7', '#FFABAB', '#85E3FF', '#B9F6CA', '#FFFFAA'];

        let blobs = [];
        let particles = [];
        let starbursts = [];

        // 設定畫布自適應大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // =========================================
        // 1. 圓潤多邊形 (花朵 Blob) 類別
        // =========================================
        class Blob {
            constructor(x, y, isInitial = false) {
                this.radius = Math.random() * 80 + 30;

                // 【修改 1】：邊界防護，確保花朵和它的浮動範圍 (約35px) 不會超出螢幕
                const padding = this.radius + 35;
                this.x = Math.max(padding, Math.min(x, canvas.width - padding));
                this.y = Math.max(padding, Math.min(y, canvas.height - padding));
                this.baseY = this.y;

                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.numWaves = Math.floor(Math.random() * 5) + 4;
                this.amplitude = Math.random() * this.radius * 0.3 + 10;

                this.phase = Math.random() * Math.PI * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;

                if (!isInitial) {
                    this.gravity = 0.7;

                    // 【修改 2】：智慧跳躍力，計算距離頂部的安全距離，避免衝破天際
                    let safeDistanceToTop = this.y - padding;
                    if (safeDistanceToTop < 0) safeDistanceToTop = 0;

                    // 利用物理公式 (v = sqrt(2gh)) 計算不超出頂部的最大初速度
                    let maxVy = -Math.sqrt(2 * this.gravity * safeDistanceToTop);
                    let wantedVy = -Math.random() * 15 - 8; // 原本預期的隨機速度

                    // 取兩者之間比較溫和（數值較大/接近 0）的那個速度
                    this.vy = Math.max(wantedVy, maxVy);
                } else {
                    this.vy = 0;
                    this.gravity = 0;
                }

                this.isStroke = Math.random() > 0.3;
                this.lineWidth = Math.random() * 10 + 5;
            }

            update(time) {
                if (this.vy !== 0 || this.gravity !== 0) {
                    this.y += this.vy;
                    this.vy += this.gravity;
                    this.baseY = this.y;
                    if (this.vy > 0 && this.gravity > 0) {
                        this.gravity = 0;
                        this.vy = 0;
                    }
                }
                // 浮動效果
                this.y = this.baseY + Math.sin(time * 0.002 + this.phase) * 30;
                this.rotation += this.rotationSpeed;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.beginPath();
                for (let i = 0; i <= Math.PI * 2 + 0.1; i += 0.1) {
                    let r = this.radius + Math.sin(i * this.numWaves) * this.amplitude;
                    ctx.lineTo(r * Math.cos(i), r * Math.sin(i));
                }
                ctx.closePath();
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                if (this.isStroke) {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = this.lineWidth;
                    ctx.stroke();
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = this.lineWidth / 2;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // =========================================
        // 2. 放射狀小點點 (Particle) 類別
        // =========================================
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 8 + 3;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // =========================================
        // 3. 不規則放射星芒 (Starburst) 類別
        // =========================================
        class Starburst {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.numLines = Math.floor(Math.random() * 8) + 10;
                this.innerRadius = Math.random() * 20 + 10;
                this.maxOuterRadius = Math.random() * 100 + 150;
                this.currentOuterRadius = this.innerRadius;
                this.growSpeed = Math.random() * 15 + 10;
                this.life = 1.0;
                this.decay = 0.03;

                this.lines = [];
                for (let i = 0; i < this.numLines; i++) {
                    const angle = (Math.PI * 2 / this.numLines) * i + (Math.random() - 0.5) * 0.2;
                    const lengthVariance = Math.random() * 0.4 + 0.8;
                    const cpOffset = (Math.random() - 0.5) * 30;
                    this.lines.push({ angle, lengthVariance, cpOffset });
                }
            }

            update() {
                if (this.currentOuterRadius < this.maxOuterRadius) {
                    this.currentOuterRadius += this.growSpeed;
                }
                this.life -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';

                this.lines.forEach(line => {
                    const ix = Math.cos(line.angle) * this.innerRadius;
                    const iy = Math.sin(line.angle) * this.innerRadius;
                    const currentLength = this.currentOuterRadius * line.lengthVariance;
                    const ox = Math.cos(line.angle) * currentLength;
                    const oy = Math.sin(line.angle) * currentLength;

                    const midX = (ix + ox) / 2;
                    const midY = (iy + oy) / 2;
                    const perpAngle = line.angle + Math.PI / 2;
                    const cpx = midX + Math.cos(perpAngle) * line.cpOffset;
                    const cpy = midY + Math.sin(perpAngle) * line.cpOffset;

                    ctx.beginPath();
                    ctx.moveTo(ix, iy);
                    ctx.quadraticCurveTo(cpx, cpy, ox, oy);
                    ctx.stroke();
                });
                ctx.restore();
            }
        }


        // 初始化畫面上的圖形
        for (let i = 0; i < 7; i++) {
            blobs.push(new Blob(Math.random() * canvas.width, Math.random() * canvas.height, true));
        }

        // =========================================
        // 滑鼠點擊事件
        // =========================================
        window.addEventListener('mousedown', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // 1. 新增花朵
            const newBlob = new Blob(mouseX, mouseY);
            blobs.push(newBlob);

            // 2. 新增放射狀小點點
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(mouseX, mouseY, newBlob.color));
            }

            // 3. 新增不規則放射星芒
            const numStarbursts = Math.random() > 0.7 ? 2 : 1;
            for (let i = 0; i < numStarbursts; i++) {
                starbursts.push(new Starburst(mouseX, mouseY, newBlob.color));
            }

            // 【修改 3】：將最大數量從 25 提高到 60，讓花朵陪伴久一點
            if (blobs.length > 60) blobs.shift();
        });

        // =========================================
        // 動畫迴圈
        // =========================================
        function animate(time) {
            ctx.fillStyle = 'rgba(255, 243, 194, 0.65)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製 Blob 
            blobs.forEach(blob => {
                blob.update(time);
                blob.draw(ctx);
            });

            // 繪製放射星芒
            ctx.globalCompositeOperation = 'destination-over';
            for (let i = starbursts.length - 1; i >= 0; i--) {
                starbursts[i].update();
                starbursts[i].draw(ctx);
                if (starbursts[i].life <= 0) {
                    starbursts.splice(i, 1);
                }
            }
            ctx.globalCompositeOperation = 'source-over';

            // 繪製 Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);

    </script>
</body>

</html>
