<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快樂的形狀 - 浮誇版</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 隱藏卷軸 */
            background-color: #fff3c2;
            /* 新的背景色 */
            cursor: pointer;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <canvas id="happyCanvas"></canvas>

    <script>
        const canvas = document.getElementById('happyCanvas');
        const ctx = canvas.getContext('2d');

        // 調色盤：對應你畫作中的柔和色彩
        const colors = ['#FFB3BA', '#FFDFBA', '#BAE1FF', '#E2CBF7', '#FFABAB', '#85E3FF', '#B9F6CA'];

        let blobs = [];
        let particles = [];

        // 設定畫布自適應大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 圓潤多邊形 (Blob) 的類別
        class Blob {
            constructor(x, y, isInitial = false) {
                this.x = x;
                this.y = y;
                this.baseY = y; // 紀錄初始高度，用來做 up & down
                // 大小變化更多 (20 ~ 100)
                this.radius = Math.random() * 80 + 20;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                // 花朵變化更大、更浮誇
                this.numWaves = Math.floor(Math.random() * 5) + 3; // 3 到 7 個波浪
                this.amplitude = Math.random() * this.radius * 0.4 + 10; // 波浪深度與半徑相關，更浮誇

                // 動態屬性
                this.phase = Math.random() * Math.PI * 2; // Up & down 的相位
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02; // 旋轉速度稍快一點

                // 點擊出來時的快速往上動態
                if (!isInitial) {
                    this.vy = -Math.random() * 15 - 10; // 初始向上速度 (-10 ~ -25)
                    this.gravity = 0.8; // 重力
                } else {
                    this.vy = 0;
                    this.gravity = 0;
                }

                // 決定是填滿還是外框 (模擬你的畫風)
                this.isStroke = Math.random() > 0.4;
                this.lineWidth = Math.random() * 12 + 6;
            }

            update(time) {
                // 快速往上的動態 + 重力影響
                if (this.vy !== 0 || this.gravity !== 0) {
                    this.y += this.vy;
                    this.vy += this.gravity;
                    this.baseY = this.y; // 更新 base Y，讓它在新的位置繼續浮動

                    // 當速度變慢且接近停止時，停止重力效果，轉為一般浮動
                    if (this.vy > 0 && this.gravity > 0) {
                        this.gravity = 0;
                        this.vy = 0;
                    }
                }

                // 有動態感的 up & down (疊加在快速上升之後的位置)
                this.y = this.baseY + Math.sin(time * 0.002 + this.phase) * 35; // 浮動幅度稍微加大
                this.rotation += this.rotationSpeed;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.beginPath();

                // 利用極座標和 sin 函數畫出圓潤的多邊形
                for (let i = 0; i <= Math.PI * 2 + 0.1; i += 0.1) {
                    let r = this.radius + Math.sin(i * this.numWaves) * this.amplitude;
                    let px = r * Math.cos(i);
                    let py = r * Math.sin(i);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();

                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                if (this.isStroke) {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = this.lineWidth;
                    ctx.stroke();

                    // 畫內部淡淡的一層模擬疊加效果
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = this.lineWidth / 2;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // 放射狀小點點的類別
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 8 + 3; // 粒子稍微大一點
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4; // 速度更快
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0; // 生命週期
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.025; // 逐漸消失
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // 初始化畫面上的一些圖形 (設定為初始狀態，不會快速上升)
        for (let i = 0; i < 6; i++) {
            blobs.push(new Blob(Math.random() * canvas.width, Math.random() * canvas.height, true));
        }

        // 滑鼠點擊事件：生成新圖形與放射狀特效
        window.addEventListener('mousedown', (e) => {
            // 新增一個花朵圖形 (會快速上升)
            const newBlob = new Blob(e.clientX, e.clientY);
            blobs.push(newBlob);

            // 新增放射狀小點點 (滿足、高漲的感覺)
            for (let i = 0; i < 25; i++) { // 粒子數量增加
                particles.push(new Particle(e.clientX, e.clientY, newBlob.color));
            }

            // 避免畫面過度擁擠，保留最新的 25 個大圖形
            if (blobs.length > 25) {
                blobs.shift();
            }
        });

        // 動畫迴圈
        function animate(time) {
            // 清除畫布，並保留一點殘影效果來增加溫柔感
            // 使用新的背景色，並帶有透明度
            ctx.fillStyle = 'rgba(255, 243, 194, 0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 更新並繪製 Blob
            blobs.forEach(blob => {
                blob.update(time);
                blob.draw(ctx);
            });

            // 更新並繪製 Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // 啟動動畫
        requestAnimationFrame(animate);

    </script>
</body>

</html>
