<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>興奮漣漪實驗</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    .stage {
      width: 1024px;
      height: 1024px;
      background: radial-gradient(circle at 30% 20%, #222 0, #050505 60%, #000 100%);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0.5;
      pointer-events: none;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      /* 一開始小、亮、飽和 */
      transform: scale(0.2);
      opacity: 1;
      /* 1.2秒：前半段激烈、後半段放慢、淡出 */
      animation: ripple-excited 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* 漣漪＋情緒曲線：
       0%   一下爆開、有點抖
       40%  最大的抖動與亮度（最興奮）
       100% 外擴、變大、變淡、變灰 */
    @keyframes ripple-excited {
      0% {
        transform: translate(0, 0) scale(0.2);
        filter: saturate(1.5) brightness(1.3);
        opacity: 1;
      }
      20% {
        transform: translate(-6px, 4px) scale(0.7);
      }
      40% {
        transform: translate(5px, -6px) scale(1.0);
        filter: saturate(2) brightness(1.4);
        opacity: 0.9;
      }
      70% {
        transform: translate(0, 0) scale(1.6);
        filter: saturate(0.9) brightness(1.0);
        opacity: 0.5;
      }
      100% {
        transform: translate(0, 0) scale(2.2);
        filter: saturate(0.3) brightness(0.8);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="hint">
      <div>點擊畫面</div>
      <div>一開始的興奮會像手抖爆開，然後像水波慢慢平靜</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");

    // 前半段：高能量螢光色，後半段會在動畫內自己去飽和
    const colors = [
      "#FF1744", // 螢光紅
      "#FFEA00", // 亮黃
      "#00E5FF", // 電光藍
      "#E040FB", // 螢光紫
      "#76FF03"  // 螢光萊姆綠
    ];

    let colorIndex = 0;

    stage.addEventListener("click", function (event) {
      const rect = stage.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      // 一次點擊：多圈漣漪，由內往外散開
      const waves = 3;          // 幾層水波
      const circlesPerWave = 8; // 每層有幾個圓圈

      for (let w = 0; w < waves; w++) {
        const delayBase = w * 80; // 每一圈稍微晚一點出現
        for (let i = 0; i < circlesPerWave; i++) {
          const angle = (Math.PI * 2 * i) / circlesPerWave;
          createCircle(x, y, angle, w, delayBase + Math.random() * 40);
        }
      }
    });

    function createCircle(x, y, angle, waveIndex, delay) {
      const circle = document.createElement("div");
      circle.classList.add("circle");

      // 大小：外圈更大
      const baseSize = 20 + waveIndex * 10;
      const size = baseSize + Math.random() * 15;
      circle.style.width = size + "px";
      circle.style.height = size + "px";

      // 顏色輪流
      const baseColor = colors[colorIndex % colors.length];
      colorIndex++;
      circle.style.backgroundColor = baseColor;

      // 每一圈初始半徑（讓它們一開始就有一點距離）
      const startRadius = 5 + waveIndex * 25;
      const jitterRadius = 6; // 抖動程度（越大越興奮）

      // 在角度方向附近加一點亂數，像手抖
      const jitterAngle = angle + (Math.random() - 0.5) * 0.4;
      const r = startRadius + (Math.random() - 0.5) * jitterRadius;
      const offsetX = Math.cos(jitterAngle) * r;
      const offsetY = Math.sin(jitterAngle) * r;

      circle.style.left = x + offsetX - size / 2 + "px";
      circle.style.top = y + offsetY - size / 2 + "px";

      // 加一點延遲，讓波紋一圈一圈展開
      circle.style.animationDelay = delay + "ms";

      stage.appendChild(circle);

      circle.addEventListener("animationend", () => {
        circle.remove();
      });
    }
  </script>
</body>
</html>
