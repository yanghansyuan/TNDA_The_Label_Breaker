<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>興奮粒子場 v7</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eee;
    }

    .stage {
      width: 1024px;
      height: 1024px;
      background:
        radial-gradient(circle at 30% 20%, rgba(120,120,120,0.45) 0, rgba(0,0,0,1) 55%),
        #000;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0.55;
      pointer-events: none;
      color: #ddd;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
      box-shadow: 0 0 14px rgba(0,0,0,0.4);
    }

    .shape-circle {
      border-radius: 50%;
    }

    .shape-line {
      border-radius: 999px;
      transform-origin: 50% 50%;
    }

    .shape-triangle {
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    .shape-star {
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="hint">
      <div>點擊或用手指點畫布</div>
      <div>幾何情緒在黑色空間裡爆開、撞牆、被牆吃掉再慢慢平靜</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const STAGE_SIZE = 1024;

    // 略帶灰度的康丁斯基風格色票
    const colors = [
      "#c7433b", // 暗紅
      "#e3c04f", // 黃赭
      "#4a7fbf", // 灰藍
      "#7a4ca3", // 紫
      "#4f8c5b", // 綠
      "#d8893a"  // 橙
    ];
    let colorIndex = 0;

    const particles = [];
    const shapeTypes = ["line", "triangle", "star", "circle"];

    // 共用的「點一下」處理：滑鼠或觸控都呼叫這個
    function handleTap(x, y) {
      const count = 30 + Math.floor(Math.random() * 20);
      for (let i = 0; i < count; i++) {
        const shape = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
        createParticle(x, y, shape);
      }
    }

    // 滑鼠 click
    stage.addEventListener("click", (event) => {
      const rect = stage.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      handleTap(x, y);
    });

    // 觸控 touchstart（手機／平板）
    stage.addEventListener("touchstart", (event) => {
      event.preventDefault(); // 避免觸控後又觸發 click
      const touch = event.changedTouches[0];
      const rect = stage.getBoundingClientRect();
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;
      handleTap(x, y);
    }, { passive: false });

    function createParticle(cx, cy, shape) {
      const el = document.createElement("div");
      el.classList.add("particle");

      const baseColor = colors[colorIndex % colors.length];
      colorIndex++;
      el.style.backgroundColor = baseColor;

      const baseAlpha = 0.7 + Math.random() * 0.2;
      el.style.opacity = baseAlpha.toString();

      let baseSpeed;
      let w, h;

      switch (shape) {
        case "line": {
          el.classList.add("shape-line");
          const thicknessLevels = [2, 4, 7];
          const tIndex = Math.floor(Math.random() * thicknessLevels.length);
          h = thicknessLevels[tIndex];
          w = 90 + Math.random() * 60;
          baseSpeed = 1600 + Math.random() * 900;
          break;
        }
        case "triangle": {
          el.classList.add("shape-triangle");
          const sizeLevels = [20, 30, 40];
          const s = sizeLevels[Math.floor(Math.random() * sizeLevels.length)];
          w = s;
          h = s;
          baseSpeed = 960 + Math.random() * 480;
          break;
        }
        case "star": {
          el.classList.add("shape-star");
          const sizeLevels = [26, 34, 44];
          const s = sizeLevels[Math.floor(Math.random() * sizeLevels.length)];
          w = s;
          h = s;
          baseSpeed = 780 + Math.random() * 420;
          break;
        }
        default: {
          el.classList.add("shape-circle");
          const sizeLevels = [16, 24, 34];
          const s = sizeLevels[Math.floor(Math.random() * sizeLevels.length)];
          w = s;
          h = s;
          baseSpeed = 900 + Math.random() * 480;
        }
      }

      el.style.width = w + "px";
      el.style.height = h + "px";

      const size = (w + h) / 2;
      const sizeFactor = 1.6 - Math.min(size / 80, 1.0);
      let speed = baseSpeed * sizeFactor;

      let x = cx;
      let y = cy;

      const angle = Math.random() * Math.PI * 2;
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed;

      el.style.transform = "translate(-50%, -50%) scale(1)";

      stage.appendChild(el);

      const now = performance.now();
      const life = 1500 + Math.random() * 800;

      particles.push({
        el,
        x,
        y,
        vx,
        vy,
        w,
        h,
        shape,
        life,
        createdAt: now,
        spin: 0,
        rotation: 0,
        shrink: false,
        targetW: w,
        baseAlpha
      });
    }

    let lastTime = null;

    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      updateParticles(dt, timestamp);
      requestAnimationFrame(animate);
    }

    function updateParticles(dt, now) {
      const baseDrag = 0.97;
      const wallDamping = 0.86;
      const spinDecay = 0.94;

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const age = now - p.createdAt;
        const t = age / p.life;

        if (t >= 1) {
          p.el.remove();
          particles.splice(i, 1);
          continue;
        }

        let localDrag = baseDrag;
        if (p.shape === "line") localDrag = 0.975;
        else if (p.shape === "star") localDrag = 0.965;

        p.vx *= localDrag;
        p.vy *= localDrag;

        p.x += p.vx * dt;
        p.y += p.vy * dt;

        const halfW = p.w / 2;
        const halfH = p.h / 2;
        const minX = halfW;
        const maxX = STAGE_SIZE - halfW;
        const minY = halfH;
        const maxY = STAGE_SIZE - halfH;

        let collided = false;

        if (p.x < minX) {
          p.x = minX;
          p.vx = -p.vx * wallDamping;
          collided = true;
        } else if (p.x > maxX) {
          p.x = maxX;
          p.vx = -p.vx * wallDamping;
          collided = true;
        }

        if (p.y < minY) {
          p.y = minY;
          p.vy = -p.vy * wallDamping;
          collided = true;
        } else if (p.y > maxY) {
          p.y = maxY;
          p.vy = -p.vy * wallDamping;
          collided = true;
        }

        if (collided) {
          const spinImpulse = 1080;
          const dir = Math.random() > 0.5 ? 1 : -1;
          p.spin += spinImpulse * dir;

          if (p.shape === "line" && !p.shrink) {
            p.shrink = true;
            p.targetW = p.w * 0.2;
          }
        }

        if (p.shape === "line" && p.shrink) {
          p.w += (p.targetW - p.w) * 0.25;
          if (p.w < 2) p.w = 2;
          p.el.style.width = p.w + "px";
        }

        p.spin *= spinDecay;
        p.rotation += p.spin * dt;

        const easeOut = 1 - Math.pow(1 - t, 2);
        const scale = 0.9 + (1.15 - 0.9) * (1 - easeOut);
        const opacity = p.baseAlpha * (1 - easeOut);

        const baseDirDeg = Math.atan2(p.vy, p.vx) * 180 / Math.PI;
        const rotationDeg = baseDirDeg + p.rotation;

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
        p.el.style.transform = `translate(-50%, -50%) scale(${scale}) rotate(${rotationDeg}deg)`;
        p.el.style.opacity = opacity.toString();
        p.el.style.filter = `saturate(${1 - t * 0.5}) brightness(${1 - t * 0.1})`;
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
