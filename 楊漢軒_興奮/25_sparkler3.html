<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>興奮粒子場 v16（點擊煙火＋長按火箭＋拖移仙女棒）</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eee;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .stage {
      width: 100%;
      height: 100%;
      background: #000;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
      box-shadow: 0 0 18px rgba(0,0,0,0.55);
    }

    .shape-circle { border-radius: 50%; }

    .shape-line {
      border-radius: 999px;
      transform-origin: 50% 50%;
    }

    .shape-triangle {
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    .shape-star {
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
    }

    .press-indicator {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      border: 2px solid #ffd700;
      box-shadow: 0 0 12px rgba(255,215,0,0.8);
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>

  <script>
    const stage = document.getElementById("stage");

    let STAGE_WIDTH = stage.clientWidth;
    let STAGE_HEIGHT = stage.clientHeight;
    window.addEventListener("resize", () => {
      STAGE_WIDTH = stage.clientWidth;
      STAGE_HEIGHT = stage.clientHeight;
    });

    const MAX_PARTICLES = 600;
    const LONG_PRESS_THRESHOLD = 1000; // 1 秒
    const DRAG_DISTANCE_THRESHOLD = 20; // 超過這個距離改成仙女棒

    const colors = [
      "#ff1744",
      "#ffd600",
      "#2979ff",
      "#e040fb",
      "#69f0ae",
      "#ff9100"
    ];
    let colorIndex = 0;

    const particles = [];
    const shapeTypes = ["line", "triangle", "star", "circle"];

    // 充能圓圈
    const pressIndicator = document.createElement("div");
    pressIndicator.className = "press-indicator";
    stage.appendChild(pressIndicator);

    let pressInfo = null;
    let pressAnimId = null;

    // 仙女棒狀態
    let isSparkler = false;
    let lastSparkX = null;
    let lastSparkY = null;

    // ---------- 按下：啟動充能圈 & 初始化拖移狀態 ----------
    stage.addEventListener("mousedown", (event) => {
      const rect = stage.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      pressInfo = {
        t: performance.now(),
        startX: x,
        startY: y,
        x,
        y,
        exceeded: false
      };

      isSparkler = false;
      lastSparkX = x;
      lastSparkY = y;

      // 充能圈
      pressIndicator.style.left = x + "px";
      pressIndicator.style.top = y + "px";
      pressIndicator.style.width = "120px";
      pressIndicator.style.height = "120px";
      pressIndicator.style.opacity = "1";
      pressIndicator.style.transform = "translate(-50%, -50%) scale(0.2)";

      const startT = performance.now();
      function grow() {
        if (!pressInfo || isSparkler) return; // 若變成仙女棒就不再顯示充能圈
        const nowT = performance.now();
        const elapsed = nowT - startT;

        let scale;
        if (elapsed < LONG_PRESS_THRESHOLD) {
          const t = elapsed / LONG_PRESS_THRESHOLD;
          const clamped = Math.min(t, 1);
          scale = 0.2 + 0.8 * clamped;
        } else {
          const wiggle = 0.05 * Math.sin((elapsed - LONG_PRESS_THRESHOLD) / 80);
          scale = 1.0 + wiggle;
          if (!pressInfo.exceeded) pressInfo.exceeded = true;
        }

        pressIndicator.style.transform = `translate(-50%, -50%) scale(${scale})`;
        pressAnimId = requestAnimationFrame(grow);
      }
      grow();
    });

    // ---------- 拖移：超過門檻就啟動仙女棒 ----------
    stage.addEventListener("mousemove", (event) => {
      if (!pressInfo) return;

      const rect = stage.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      pressInfo.x = x;
      pressInfo.y = y;

      const dx = x - pressInfo.startX;
      const dy = y - pressInfo.startY;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (!isSparkler && dist > DRAG_DISTANCE_THRESHOLD) {
        // 進入仙女棒模式：關掉充能圈
        isSparkler = true;
        if (pressAnimId) {
          cancelAnimationFrame(pressAnimId);
          pressAnimId = null;
        }
        pressIndicator.style.opacity = "0";
        pressIndicator.style.transform = "translate(-50%, -50%) scale(0)";
      }

      if (isSparkler) {
        spawnSparkler(x, y);
      }
    });

    // ---------- 放開：依模式決定行為 ----------
    stage.addEventListener("mouseup", () => {
      if (!pressInfo) return;
      const durationMs = performance.now() - pressInfo.t;
      const { startX, startY } = pressInfo;
      pressInfo = null;

      if (pressAnimId) {
        cancelAnimationFrame(pressAnimId);
        pressAnimId = null;
      }

      // 不管怎樣，關掉圓圈
      pressIndicator.style.transform = "translate(-50%, -50%) scale(0)";
      pressIndicator.style.opacity = "0";

      if (isSparkler) {
        // 仙女棒模式：放開時不觸發煙火
        isSparkler = false;
        return;
      }

      // 非仙女棒：判斷短按 / 長按
      if (durationMs >= LONG_PRESS_THRESHOLD) {
        spawnFireworkRockets(startX, startY, durationMs);
      } else {
        handleTap(startX, startY);
      }
    });

    // ---------- 仙女棒粒子 ----------

    function spawnSparkler(x, y) {
        // 讓軌跡連續一點，但避免過密
        if (lastSparkX !== null) {
            const dx = x - lastSparkX;
            const dy = y - lastSparkY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 3) return;
        }
        lastSparkX = x;
        lastSparkY = y;

        ensureCapacity(14);

        // 拖移「當下方向」（跟上一個點比，比較符合畫圖軌跡）
        let dirX = 1, dirY = 0;
        if (pressInfo && pressInfo.x != null && pressInfo.y != null) {
            const dx = x - pressInfo.x;
            const dy = y - pressInfo.y;
            const len = Math.sqrt(dx*dx + dy*dy) || 1;
            dirX = dx / len;
            dirY = dy / len;
        }

        // 核心：一團極亮、密集的火花
        const coreCount = 12 + Math.floor(Math.random() * 6);
        for (let i = 0; i < coreCount; i++) {
            createSparkParticle(x, y, dirX, dirY, "core");
        }

        // 外圈：比較長條、較少但更遠的迸發
        const streakCount = 6 + Math.floor(Math.random() * 4);
        for (let i = 0; i < streakCount; i++) {
            createSparkParticle(x, y, dirX, dirY, "streak");
        }
    }

    function createSparkParticle(x, y, nx, ny, mode) {
        const el = document.createElement("div");
        el.classList.add("particle", "shape-circle");

        // 接近白的高亮金色
        const sparkColor = mode === "core" ? "#fff6cc" : "#ffd900";
        el.style.backgroundColor = sparkColor;

        const size =
            mode === "core"
            ? 3 + Math.random() * 2        // 核心比較小但很多顆
            : 2 + Math.random() * 2;       // 外圈更細

        el.style.width = size + "px";
        el.style.height = size + "px";
        el.style.opacity = "1";
        el.style.transform = "translate(-50%, -50%) scale(1)";

        stage.appendChild(el);

        // 以拖移方向為主，只有微小散射
        const spread =
            mode === "core"
            ? (Math.random() - 0.5) * 0.4   // 核心較集中
            : (Math.random() - 0.5) * 0.9;  // 外圈散得比較開

        const cosA = Math.cos(spread);
        const sinA = Math.sin(spread);
        const dirX = nx * cosA - ny * sinA;
        const dirY = nx * sinA + ny * cosA;

        const baseSpeed =
            mode === "core"
            ? 550 + Math.random() * 300     // 很快，像迸發
            : 750 + Math.random() * 450;    // 外圈更快、更遠

        const vx = dirX * baseSpeed;
        const vy = dirY * baseSpeed;

        const now = performance.now();
        const life =
            mode === "core"
            ? 450 + Math.random() * 250     // 核心壽命較短，感覺很激烈
            : 900 + Math.random() * 700;    // 外圈壽命較長，留長條線

        particles.push({
            el,
            x,
            y,
            vx,
            vy,
            w: size,
            h: size,
            shape: "circle",
            life,
            createdAt: now,
            spin: 0,
            rotation: 0,
            shrink: false,
            targetW: size,
            baseAlpha: 1,
            type: "spark",
            mode,                  // core / streak
            splitDone: false       // 控制二次分裂
        });
    }



    // ---------- 短按：一般爆炸 ----------

    function handleTap(x, y) {
      const baseCount = 30 + Math.floor(Math.random() * 20);
      createBurstAt(x, y, baseCount);
    }

    function createBurstAt(cx, cy, count) {
      ensureCapacity(count);
      for (let i = 0; i < count; i++) {
        const shape = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
        createBurstParticle(cx, cy, shape);
      }
    }

    // ---------- 長按：火箭，終點 5 倍爆炸 ----------

    function spawnFireworkRockets(x, y, durationMs) {
      const minHold = LONG_PRESS_THRESHOLD;
      const maxHold = 4000;
      const clamped = Math.max(minHold, Math.min(maxHold, durationMs));
      const strength = (clamped - minHold) / (maxHold - minHold); // 0~1

      const rocketCount = 1 + Math.round(strength * 2); // 1~3
      ensureCapacity(rocketCount);
      for (let i = 0; i < rocketCount; i++) {
        createRocket(x, y, strength);
      }
    }

    function ensureCapacity(needToAdd) {
      const totalNeeded = particles.length + needToAdd;
      if (totalNeeded > MAX_PARTICLES) {
        const toRemove = totalNeeded - MAX_PARTICLES;
        for (let i = 0; i < toRemove && particles.length > 0; i++) {
          const old = particles.shift();
          old.el.remove();
        }
      }
    }

    // ---------- 一般爆炸粒子 ----------

    function createBurstParticle(cx, cy, shape) {
      const el = document.createElement("div");
      el.classList.add("particle");

      const baseColor = colors[colorIndex % colors.length];
      colorIndex++;
      el.dataset.baseColor = baseColor;
      el.style.backgroundColor = "#ffd700";

      const baseAlpha = 0.85 + Math.random() * 0.1;
      el.style.opacity = baseAlpha.toString();

      let baseSpeed;
      let w, h;

      switch (shape) {
        case "line": {
          el.classList.add("shape-line");
          const tLevels = [2, 4, 7];
          const tIndex = Math.floor(Math.random() * tLevels.length);
          h = tLevels[tIndex];
          w = 60 + Math.random() * 40;
          baseSpeed = 1500 + Math.random() * 900;
          break;
        }
        case "triangle": {
          el.classList.add("shape-triangle");
          const sLevels = [14, 20, 28];
          const s = sLevels[Math.floor(Math.random() * sLevels.length)];
          w = s;
          h = s;
          baseSpeed = 900 + Math.random() * 480;
          break;
        }
        case "star": {
          el.classList.add("shape-star");
          const sLevels = [16, 22, 30];
          const s = sLevels[Math.floor(Math.random() * sLevels.length)];
          w = s;
          h = s;
          baseSpeed = 760 + Math.random() * 420;
          break;
        }
        default: {
          el.classList.add("shape-circle");
          const sLevels = [10, 16, 22];
          const s = sLevels[Math.floor(Math.random() * sLevels.length)];
          w = s;
          h = s;
          baseSpeed = 880 + Math.random() * 480;
        }
      }

      el.style.width = w + "px";
      el.style.height = h + "px";

      const size = (w + h) / 2;
      const sizeFactor = 1.7 - Math.min(size / 80, 1.0);
      let speed = baseSpeed * sizeFactor;

      let x = cx;
      let y = cy;

      const angle = Math.random() * Math.PI * 2;
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed;

      el.style.transform = "translate(-50%, -50%) scale(0.3)";

      stage.appendChild(el);

      const now = performance.now();
      const life = 2200 + Math.random() * 1000;

      particles.push({
        el,
        x,
        y,
        vx,
        vy,
        w,
        h,
        shape,
        life,
        createdAt: now,
        spin: 0,
        rotation: 0,
        shrink: false,
        targetW: w,
        baseAlpha,
        type: "burst",
        trailTimer: 0
      });
    }

    // ---------- 火箭與拖尾 ----------

    function createRocket(cx, cy, strength) {
      const el = document.createElement("div");
      el.classList.add("particle", "shape-circle");

      const baseColor = colors[colorIndex % colors.length];
      colorIndex++;
      el.dataset.baseColor = baseColor;
      el.style.backgroundColor = "#ffd700";

      const size = 10 + Math.random() * 6;
      el.style.width = size + "px";
      el.style.height = size + "px";

      const baseAlpha = 0.9;
      el.style.opacity = baseAlpha.toString();

      const baseSpeed = 1200 + strength * 800;
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.2;
      let vx = Math.cos(angle) * (150 * (Math.random() - 0.5));
      let vy = Math.sin(angle) * baseSpeed;

      let x = cx;
      let y = cy;

      el.style.transform = "translate(-50%, -50%) scale(0.4)";

      stage.appendChild(el);

      const now = performance.now();
      const life = 1300 + strength * 700;

      particles.push({
        el,
        x,
        y,
        vx,
        vy,
        w: size,
        h: size,
        shape: "circle",
        life,
        createdAt: now,
        spin: 0,
        rotation: 0,
        shrink: false,
        targetW: size,
        baseAlpha,
        type: "rocket",
        trailTimer: 0
      });
    }

    function createTrailParticle(x, y, color) {
      const el = document.createElement("div");
      el.classList.add("particle", "shape-circle");
      el.style.backgroundColor = color;

      const size = 6 + Math.random() * 4;
      el.style.width = size + "px";
      el.style.height = size + "px";

      const baseAlpha = 0.8;
      el.style.opacity = baseAlpha.toString();
      el.style.transform = "translate(-50%, -50%) scale(1)";

      stage.appendChild(el);

      const now = performance.now();
      const life = 400 + Math.random() * 250;

      particles.push({
        el,
        x,
        y,
        vx: 0,
        vy: 0,
        w: size,
        h: size,
        shape: "circle",
        life,
        createdAt: now,
        spin: 0,
        rotation: 0,
        shrink: false,
        targetW: size,
        baseAlpha,
        type: "trail",
        trailTimer: 0
      });
    }

    // ---------- 動畫更新 ----------

    let lastTime = null;

    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      updateParticles(dt, timestamp);
      requestAnimationFrame(animate);
    }

    function updateParticles(dt, now) {
        const baseDrag = 0.97;
        const wallDamping = 0.86;
        const spinDecay = 0.94;

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            const age = now - p.createdAt;
            const t = age / p.life;

            // spark 在壽命中段做二次分裂
            if (p.type === "spark" && !p.splitDone) {
            const ageRatio = age / p.life;
            if (ageRatio > 0.3 && ageRatio < 0.5) {
                p.splitDone = true;

                const splitCount = 4 + Math.floor(Math.random() * 4);
                for (let s = 0; s < splitCount; s++) {
                const el2 = document.createElement("div");
                el2.classList.add("particle", "shape-circle");
                el2.style.backgroundColor = "#ffd900";
                const size2 = 1.5 + Math.random() * 1.5;
                el2.style.width = size2 + "px";
                el2.style.height = size2 + "px";
                el2.style.opacity = "0.9";
                el2.style.transform = "translate(-50%, -50%) scale(1)";
                stage.appendChild(el2);

                const angle = Math.random() * Math.PI * 2;
                const speed2 = 350 + Math.random() * 250;
                const vx2 = Math.cos(angle) * speed2;
                const vy2 = Math.sin(angle) * speed2;

                const now2 = performance.now();
                const life2 = 400 + Math.random() * 300;

                particles.push({
                    el: el2,
                    x: p.x,
                    y: p.y,
                    vx: vx2,
                    vy: vy2,
                    w: size2,
                    h: size2,
                    shape: "circle",
                    life: life2,
                    createdAt: now2,
                    spin: 0,
                    rotation: 0,
                    shrink: false,
                    targetW: size2,
                    baseAlpha: 0.9,
                    type: "spark",
                    mode: "child",
                    splitDone: true
                });
                }
            }
            }

            if (t >= 1) {
            // 火箭在終點 5 倍爆炸
            if (p.type === "rocket") {
                const baseCount = 30 + Math.floor(Math.random() * 20);
                createBurstAt(p.x, p.y, baseCount * 5);
            }
            p.el.remove();
            particles.splice(i, 1);
            continue;
            }

            // 速度與位置更新
            if (p.type !== "trail" && p.type !== "spark") {
            let localDrag = baseDrag;
            if (p.shape === "line") localDrag = 0.975;
            else if (p.shape === "star") localDrag = 0.965;

            p.vx *= localDrag;
            p.vy *= localDrag;

            p.x += p.vx * dt;
            p.y += p.vy * dt;

            const halfW = p.w / 2;
            const halfH = p.h / 2;
            const minX = halfW;
            const maxX = STAGE_WIDTH - halfW;
            const minY = halfH;
            const maxY = STAGE_HEIGHT - halfH;

            let collided = false;

            if (p.x < minX) {
                p.x = minX;
                p.vx = -p.vx * wallDamping;
                collided = true;
            } else if (p.x > maxX) {
                p.x = maxX;
                p.vx = -p.vx * wallDamping;
                collided = true;
            }

            if (p.y < minY) {
                p.y = minY;
                p.vy = -p.vy * wallDamping;
                collided = true;
            } else if (p.y > maxY) {
                p.y = maxY;
                p.vy = -p.vy * wallDamping;
                collided = true;
            }

            if (collided && p.type === "burst") {
                const spinImpulse = 1080;
                const dir = Math.random() > 0.5 ? 1 : -1;
                p.spin += spinImpulse * dir;

                if (p.shape === "line" && !p.shrink) {
                p.shrink = true;
                p.targetW = p.w * 0.2;
                }
            }
            } else {
            // spark / trail：阻力更小，保持速度以拉出長尾
            const drag = p.type === "spark" ? 0.99 : 0.98;
            p.vx *= drag;
            p.vy *= drag;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            }

            // 火箭拖尾
            if (p.type === "rocket") {
            p.trailTimer += dt;
            if (p.trailTimer > 0.03) {
                p.trailTimer = 0;
                createTrailParticle(p.x, p.y, p.el.dataset.baseColor || "#ffffff");
            }
            }

            p.spin *= spinDecay;
            p.rotation += p.spin * dt;

            const baseDirDeg = Math.atan2(p.vy, p.vx) * 180 / Math.PI;

            let scale;
            let opacity;

            if (p.type === "burst" || p.type === "rocket") {
            if (t < 0.2) {
                p.el.style.backgroundColor = "#ffd700";
            } else {
                p.el.style.backgroundColor = p.el.dataset.baseColor || "#ffffff";
            }

            if (t < 0.3) {
                const k = t / 0.3;
                scale = 0.3 + 0.9 * k;
            } else {
                const k = (t - 0.3) / 0.7;
                scale = 1.2 * (1 - k);
            }

            opacity = p.baseAlpha * (1 - t);
            } else if (p.type === "trail" || p.type === "spark") {
            if (p.type === "spark" && p.mode === "core") {
                // 核心：快速閃爍消失
                scale = 1 - t * 20.8;
                opacity = p.baseAlpha * (1 - t * 1.2);
            } else {
                // 外圈 / 子火花 / halo：細長拖尾
                scale = 1 - t * 2.5;
                opacity = p.baseAlpha * (1 - t);
            }
            } else {
            scale = 1;
            opacity = p.baseAlpha * (1 - t);
            }

            const rotationDeg = baseDirDeg + p.rotation;

            p.el.style.left = p.x + "px";
            p.el.style.top = p.y + "px";
            p.el.style.transform = `translate(-50%, -50%) scale(${scale}) rotate(${rotationDeg}deg)`;
            p.el.style.opacity = opacity.toString();
            p.el.style.filter = `saturate(${1 - t * 0.2}) brightness(${1 - t * 0.1})`;
        }
        }


    requestAnimationFrame(animate);
  </script>
</body>
</html>
