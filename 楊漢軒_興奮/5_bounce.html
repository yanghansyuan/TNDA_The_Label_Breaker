<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>興奮漣漪 + 牆壁反彈</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    .stage {
      width: 1024px;
      height: 1024px;
      background: radial-gradient(circle at 30% 20%, #222 0, #050505 60%, #000 100%);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0.5;
      pointer-events: none;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="hint">
      <div>點擊畫布</div>
      <div>興奮會爆開成一群小球，撞到邊邊會回彈，慢慢平靜消失</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const STAGE_SIZE = 1024;

    const colors = [
      "#FF1744",
      "#FFEA00",
      "#00E5FF",
      "#E040FB",
      "#76FF03"
    ];

    let colorIndex = 0;

    // 所有粒子都放在這個陣列裡
    const particles = [];

    // 點擊產生一團粒子
    stage.addEventListener("click", (event) => {
      const rect = stage.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      const count = 20 + Math.floor(Math.random() * 15); // 20~35 顆

      for (let i = 0; i < count; i++) {
        createParticle(x, y);
      }
    });

    function createParticle(cx, cy) {
      const el = document.createElement("div");
      el.classList.add("circle");

      // 大小
      const radius = 6 + Math.random() * 10; // 半徑
      const size = radius * 2;
      el.style.width = size + "px";
      el.style.height = size + "px";

      // 位置（中心）
      let x = cx;
      let y = cy;

      // 初始速度：從點擊點「爆開」，角度 + 亂數
      const angle = Math.random() * Math.PI * 2;
      const speed = 120 + Math.random() * 220; // 像興奮爆開的速度
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed;

      // 顏色：先高彩度，後面會往灰走
      const baseColor = colors[colorIndex % colors.length];
      colorIndex++;
      el.style.backgroundColor = baseColor;

      // 初始樣式
      el.style.left = (x - radius) + "px";
      el.style.top = (y - radius) + "px";
      el.style.opacity = "1";
      el.style.transform = "scale(1)";

      stage.appendChild(el);

      // 每顆粒子自己的壽命（毫秒）
      const life = 1500 + Math.random() * 800; // 1.5~2.3 秒
      const createdAt = performance.now();

      particles.push({
        el,
        x,
        y,
        vx,
        vy,
        radius,
        life,
        createdAt
      });
    }

    // 主動畫迴圈
    let lastTime = null;

    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000; // 轉成秒
      lastTime = timestamp;

      updateParticles(dt, timestamp);

      requestAnimationFrame(animate);
    }

    function updateParticles(dt, now) {
      const gravity = 0;          // 需要的話可以加一點重力
      const drag = 0.98;          // 阻力，讓速度慢慢平靜
      const wallDamping = 0.8;    // 撞牆後速度保留 80%

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const age = now - p.createdAt;
        const t = age / p.life; // 0 ~ 1

        if (t >= 1) {
          // 壽命到，移除
          p.el.remove();
          particles.splice(i, 1);
          continue;
        }

        // 加一點阻力 / 重力
        p.vx *= drag;
        p.vy = p.vy * drag + gravity;

        // 位置更新
        p.x += p.vx * dt;
        p.y += p.vy * dt;

        const minX = p.radius;
        const maxX = STAGE_SIZE - p.radius;
        const minY = p.radius;
        const maxY = STAGE_SIZE - p.radius;

        // 撞牆反彈（左右）
        if (p.x < minX) {
          p.x = minX;
          p.vx = -p.vx * wallDamping;
        } else if (p.x > maxX) {
          p.x = maxX;
          p.vx = -p.vx * wallDamping;
        }

        // 撞牆反彈（上下）
        if (p.y < minY) {
          p.y = minY;
          p.vy = -p.vy * wallDamping;
        } else if (p.y > maxY) {
          p.y = maxY;
          p.vy = -p.vy * wallDamping;
        }

        // 視覺：前半段比較興奮（亮、較大），後半段變小、變淡
        const easeOut = 1 - Math.pow(1 - t, 2); // 漸趨平緩 [web:52][web:55][web:58]
        const scale = 0.8 + (1.4 - 0.8) * (1 - easeOut); // 一開始大一點，後來變小
        const opacity = 1 - easeOut; // 慢慢變透明

        p.el.style.left = (p.x - p.radius) + "px";
        p.el.style.top = (p.y - p.radius) + "px";
        p.el.style.transform = `scale(${scale})`;
        p.el.style.opacity = opacity.toString();
        // 顏色去飽和的效果可以用 filter 模擬（簡單版）
        p.el.style.filter = `saturate(${1 - t * 0.7}) brightness(${1 - t * 0.2})`;
      }
    }

    // 啟動動畫
    requestAnimationFrame(animate);
  </script>
</body>
</html>
