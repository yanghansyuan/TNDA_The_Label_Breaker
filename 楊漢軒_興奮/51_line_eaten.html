<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>興奮粒子場 v30（文字亂數＋跑馬燈）</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eee;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .stage {
      width: 100%;
      height: 100%;
      background: #000;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
      box-shadow: 0 0 18px rgba(0,0,0,0.55);
    }

    .shape-circle { border-radius: 50%; }

    .shape-line {
      border-radius: 999px;
      transform-origin: 50% 50%;
    }

    .shape-triangle {
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    .shape-star {
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
    }

    .press-indicator {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      border: 2px solid #ffd700;
      box-shadow: 0 0 12px rgba(255,215,0,0.8);
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }

    .bg-fade {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, #ffffff 0%, #000000 70%);
      opacity: 0;
      transition: opacity 1.2s ease-out;
    }

    /* 中央文字：由 JS 控制 transform */
    #posterText {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #ffffff;
      font-size: 72px;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.2;
      pointer-events: none;
      white-space: pre-wrap;
      text-align: center;
      z-index: 5;
      user-select: none;
      transform-origin: 50% 50%;
      width: auto;      /* 初始給 auto，之後都用 JS 改成 N vw */
      white-space: normal;
    }

    .poster-line {
      display: inline-block;
      transform-origin: 50% 50%;
    }
    .poster-char {
        display: inline-block;
        transform-origin: 50% 50%;
    }

    #debugPanel {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 280px;
      z-index: 9999;
      display: none;
      user-select: text;
    }

    #debugPanel label {
      display: block;
      margin: 4px 0;
    }

    #debugPanel input[type="range"],
    #debugPanel textarea,
    #debugPanel select,
    #debugPanel input[type="color"] {
      width: 100%;
      box-sizing: border-box;
    }

    #debugPanel textarea {
      resize: vertical;
      min-height: 40px;
    }

    #debugPanel .section-title {
      margin-top: 6px;
      font-weight: 600;
      color: #ffd54f;
    }
  </style>
</head>

    function updatePosterTransform() {
      posterTextEl.style.left = "50%";
      posterTextEl.style.top = "50%";
      posterTextEl.style.transform =
        `translate(-50%, -50%) rotate(${POSTER.rotateDeg}deg)`;
    }

    function hexToHsl(hex) {
      hex = hex.replace("#", "");
      if (hex.length === 3) {
        hex = hex.split("").map(c => c + c).join("");
      }
      const r = parseInt(hex.substring(0,2), 16) / 255;
      const g = parseInt(hex.substring(2,4), 16) / 255;
      const b = parseInt(hex.substring(4,6), 16) / 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let h, s, l;
      l = (max + min) / 2;

      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return { h: h * 360, s: s * 100, l: l * 100 };
    }

    function renderPosterText() {
        posterTextEl.innerHTML = "";

        const lines = POSTER.text.split(/\r?\n/);
        lines.forEach((line, index) => {
            const lineWrapper = document.createElement("div");
            lineWrapper.classList.add("poster-line");
            lineWrapper.dataset.offsetX = "0";     // 跑馬燈用

            // 把這一行拆成字元
            const chars = line.split("");
            if (chars.length === 0) {
            const emptySpan = document.createElement("span");
            emptySpan.textContent = " ";
            emptySpan.classList.add("poster-char");
            lineWrapper.appendChild(emptySpan);
            } else {
            chars.forEach(ch => {
                const span = document.createElement("span");
                span.textContent = ch;
                span.classList.add("poster-char");
                span.dataset.baseRotate = "0";
                lineWrapper.appendChild(span);
            });
            }

            posterTextEl.appendChild(lineWrapper);
            if (index < lines.length - 1) {
            posterTextEl.appendChild(document.createElement("br"));
            }
        });

        applyRandomToChars();
        applyRandomColorToChars();
        resetMarqueeOffsets();
    }


    function applyRandomToChars() {
        const chars = posterTextEl.querySelectorAll(".poster-char");
        chars.forEach(charEl => {
            const baseSize = POSTER.fontSize;
            const sizeRange = POSTER.randSizePercent;
            const rotateRange = POSTER.randRotateDeg;

            // 大小亂數
            const sizeFactor = sizeRange > 0
            ? 1 + (Math.random() * 2 - 1) * (sizeRange / 100)
            : 1;
            const fontSizePx = baseSize * sizeFactor;

            // 旋轉亂數
            const rotateOffset = rotateRange > 0
            ? (Math.random() * 2 - 1) * rotateRange
            : 0;

            charEl.style.fontSize = fontSizePx + "px";
            charEl.dataset.baseRotate = rotateOffset.toString();
            // 先只管自己的 rotate，跑馬燈的 translateX 放在 line 上
            charEl.style.transform = `rotate(${rotateOffset}deg)`;
        });
    }


    function applyRandomColorToChars() {
        const jitter = POSTER.colorJitter;
        const chars = posterTextEl.querySelectorAll(".poster-char");
        if (jitter <= 0 || !POSTER.color) {
            chars.forEach(ch => {
            ch.style.color = POSTER.color;
            });
            return;
        }

        const baseHsl = hexToHsl(POSTER.color);
        chars.forEach(ch => {
            const deltaL = (Math.random() * 2 - 1) * jitter;
            let l = baseHsl.l + deltaL;
            l = Math.max(0, Math.min(100, l));
            const h = baseHsl.h;
            const s = baseHsl.s;
            ch.style.color =
            `hsl(${h.toFixed(1)}deg ${s.toFixed(1)}% ${l.toFixed(1)}%)`;
        });
    }


    function resetMarqueeOffsets() {
        const lines = posterTextEl.querySelectorAll(".poster-line");
        lines.forEach(lineEl => {
            lineEl.dataset.offsetX = "0";
            lineEl.style.transform = "translateX(0px)";
        });
    }


    function updateBackgroundBrightnessByRound() {
      if (!bgFade) return;
      let current = parseFloat(bgFade.style.opacity || "0");
      let target = current;

      if (fireworkRound < 4) {
        target = Math.min(current + 0.1, 0.3);
      } else {
        target = 1.0;
      }

      bgFade.style.opacity = target.toString();
    }

    function stopStoryboardPlayback(resetRound = false) {
      storyboardPlaying = false;

      if (storyboardTimerId) {
        clearTimeout(storyboardTimerId);
        storyboardTimerId = null;
      }
      if (storyboardCleanupTimerId) {
        clearTimeout(storyboardCleanupTimerId);
        storyboardCleanupTimerId = null;
      }

      storyboardWindows.forEach(win => {
        if (win && !win.closed) {
          try { win.close(); } catch (e) {}
        }
      });
      storyboardWindows = [];

      if (storyboardAudio) {
        try {
          storyboardAudio.pause();
          storyboardAudio.currentTime = 0;
        } catch (e) {}
        storyboardAudio = null;
      }

      if (resetRound) {
        fireworkRound = 0;
        if (bgFade) bgFade.style.opacity = "0";
      }
    }

    function clearForegroundParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (p.type === "burst" || p.type === "rocket") {
          p.el.remove();
          particles.splice(i, 1);
        }
      }
      activeRockets = 0;
      rocketsFinishedThisRound = false;
      backgroundUpdatedThisRound = false;
    }

    function startStoryboardSequence() {
      if (!storyboardFrames.length) return;

      clearForegroundParticles();

      storyboardPlaying = true;
      let index = 0;

      try {
        storyboardAudio = new Audio("storyboard/Spiegel im Spiegel.mp3");
        storyboardAudio.loop = false;
        storyboardAudio.play().catch(() => {});
      } catch (e) {}

      function grayOutOldWindows() {
        storyboardWindows.forEach(win => {
          try {
            if (win && !win.closed) {
              const img   = win.document.querySelector("img");
              const video = win.document.querySelector("video");
              if (img)   img.style.filter = "grayscale(100%) brightness(70%)";
              if (video) video.style.filter = "grayscale(100%) brightness(70%)";
            }
          } catch (e) {}
        });
      }

      function openOne(frameIndex) {
  if (!storyboardPlaying) return;
  if (frameIndex >= storyboardFrames.length) return;

  const frame = storyboardFrames[frameIndex];
  const w = frame.width;
  const h = frame.height;

  // 以「主視窗所在螢幕」為範圍，而不是整個桌面
  const baseLeft = window.screenX;   // 主視窗左上角在螢幕座標
  const baseTop  = window.screenY;
  const maxLeftOffset = Math.max(0, window.innerWidth  - w);
  const maxTopOffset  = Math.max(0, window.innerHeight - h);

  const offsetLeft = Math.floor(Math.random() * (maxLeftOffset + 1));
  const offsetTop  = Math.floor(Math.random() * (maxTopOffset + 1));

  const left = baseLeft + offsetLeft;
  const top  = baseTop  + offsetTop;

  const features =
    `width=${w},height=${h},left=${left},top=${top},` +
    `resizable=yes,scrollbars=no`;

  const win = window.open("", "_blank", features);
  if (!win) {
    console.warn("瀏覽器阻擋了 storyboard 視窗。");
    return;
  }

  let contentHtml = "";
  if (frame.type === "video") {
    contentHtml = `
      <video width="${w}" height="${h}" autoplay muted controls>
        <source src="${frame.src}" type="video/mp4">
        你的瀏覽器不支援 HTML5 影片標籤。
      </video>
    `;
  } else {
    contentHtml = `
      <img src="${frame.src}" alt="Storyboard ${frameIndex + 1}"
           style="width:${w}px;height:${h}px;">
    `;
  }

  win.document.write(`
    <!DOCTYPE html>
    <html lang="zh-Hant">
    <head>
      <meta charset="UTF-8" />
      <title>Storyboard ${frameIndex + 1}</title>
      <style>
        html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
          background: #000;
          display: flex;
          justify-content: center;
          align-items: center;
        }
      </style>
    </head>
    <body>
      ${contentHtml}
    </body>
    </html>
  `);
  win.document.close();
  win.focus();

  storyboardWindows.push(win);
}

      function scheduleNext() {
        if (!storyboardPlaying) return;

        if (index >= storyboardFrames.length) {
          storyboardCleanupTimerId = setTimeout(() => {
            stopStoryboardPlayback(true);
          }, 5000);
          return;
        }

        openOne(index);
        index++;

        storyboardTimerId = setTimeout(scheduleNext, PARAMS.storyboardIntervalMs);
      }

      scheduleNext();
    }

    stage.addEventListener("mousedown", (event) => {
      const rect = stage.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      pressInfo = {
        t: performance.now(),
        startX: x,
        startY: y,
        x,
        y,
        exceeded: false
      };

      isSparkler = false;
      lastSparkX = x;
      lastSparkY = y;
      sparklerTimer = 0;

      pressIndicator.style.left = x + "px";
      pressIndicator.style.top = y + "px";
      pressIndicator.style.width = "120px";
      pressIndicator.style.height = "120px";
      pressIndicator.style.opacity = "1";
      pressIndicator.style.transform = "translate(-50%, -50%) scale(0.2)";

      const startT = performance.now();
      function grow() {
        if (!pressInfo || isSparkler) return;
        const nowT = performance.now();
        const elapsed = nowT - startT;

        let scale;
        if (elapsed < LONG_PRESS_THRESHOLD) {
          const t = elapsed / LONG_PRESS_THRESHOLD;
          const clamped = Math.min(t, 1);
          scale = 0.2 + 0.8 * clamped;
        } else {
          const wiggle = 0.05 * Math.sin((elapsed - LONG_PRESS_THRESHOLD) / 80);
          scale = 1.0 + wiggle;
          if (!pressInfo.exceeded) pressInfo.exceeded = true;
        }

        pressIndicator.style.transform =
          `translate(-50%, -50%) scale(${scale})`;
        pressAnimId = requestAnimationFrame(grow);
      }
      grow();
    });

    stage.addEventListener("mousemove", (event) => {
      if (!pressInfo) return;

      const rect = stage.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      pressInfo.x = x;
      pressInfo.y = y;

      const dx = x - pressInfo.startX;
      const dy = y - pressInfo.startY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (!isSparkler && dist > DRAG_DISTANCE_THRESHOLD) {
        isSparkler = true;
        if (pressAnimId) {
          cancelAnimationFrame(pressAnimId);
          pressAnimId = null;
        }
        pressIndicator.style.opacity = "0";
        pressIndicator.style.transform =
          "translate(-50%, -50%) scale(0)";

        stopStoryboardPlayback(true);
      }
    });

    stage.addEventListener("mouseup", () => {
      if (!pressInfo) return;
      const durationMs = performance.now() - pressInfo.t;
      const { startX, startY } = pressInfo;
      pressInfo = null;

      if (pressAnimId) {
        cancelAnimationFrame(pressAnimId);
        pressAnimId = null;
      }

      pressIndicator.style.transform =
        "translate(-50%, -50%) scale(0)";
      pressIndicator.style.opacity = "0";

      if (isSparkler) {
        isSparkler = false;
        return;
      }

      if (durationMs >= LONG_PRESS_THRESHOLD) {
        stopStoryboardPlayback(false);

        fireworkRound = Math.min(fireworkRound + 1, 4);
        spawnFireworkRockets(startX, startY, durationMs);
      } else {
        handleTap(startX, startY);
      }
    });

    function spawnSparkler(x, y) {
      let dist = Infinity;
      if (lastSparkX !== null) {
        const dx = x - lastSparkX;
        const dy = y - lastSparkY;
        dist = Math.sqrt(dx*dx + dy*dy);
      }
      lastSparkX = x;
      lastSparkY = y;

      drawHalo(x, y);

      const shouldEmit =
        dist > 2 || Math.random() < 0.4;

      if (!shouldEmit) return;

      ensureCapacity(24);

      const coreCount = 12 + Math.floor(Math.random() * 6);
      for (let i = 0; i < coreCount; i++) {
        createSparkParticle(x, y, "core");
      }

      const streakCount = 6 + Math.floor(Math.random() * 4);
      for (let i = 0; i < streakCount; i++) {

    }

    function setParticleZ(el) {
      if (particleLayerMode === "behind") {
        el.style.zIndex = "1";

        el.style.zIndex = "10";

    }

    function drawHalo(x, y) {

      particles.push({

        spin: 0,

    function createSparkParticle(x, y, mode) {
      const el = document.createElement("div");
      el.classList.add("particle", "shape-circle");
      setParticleZ(el);

      const sparkColor = mode === "core" ? "#fff9dd" : "#ffd900";

        mode === "core"
          ? 3 + Math.random() * 2
          : 2 + Math.random() * 2;

      el.style.width = size + "px";
      el.style.height = size + "px";
      el.style.opacity = "1";
      el.style.transform = "translate(-50%, -50%) scale(1)";

      stage.appendChild(el);

      const angle = Math.random() * Math.PI * 2;
      const baseSpeed =
        mode === "core"
          ? PARAMS.sparkCoreSpeedMin + Math.random() * PARAMS.sparkCoreSpeedExtra
          : PARAMS.sparkStreakSpeedMin + Math.random() * PARAMS.sparkStreakSpeedExtra;
      const speed = baseSpeed * PARAMS.sparkSpeedMul;

      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;

      const now = performance.now();
      const baseLife =
        mode === "core"
          ? PARAMS.sparkCoreLifeBase + Math.random() * PARAMS.sparkCoreLifeExtra
          : PARAMS.sparkStreakLifeBase + Math.random() * PARAMS.sparkStreakLifeExtra;
      const life = baseLife * PARAMS.sparkLifeMul;

      particles.push({
        el,
        x,
        y,
        vx,
        vy,
        w: size,
        h: size,
        shape: "circle",
        life,
        createdAt: now,
        spin: 0,
        rotation: 0,
        shrink: false,
        targetW: size,
        baseAlpha: 1,
        type: "spark",

        splitDone: false

    function handleTap(x, y) {
      const extra = PARAMS.tapBurstCountMax - PARAMS.tapBurstCountMin;
      const baseCount = PARAMS.tapBurstCountMin + Math.floor(Math.random() * Math.max(extra, 1));
      createBurstAt(x, y, baseCount);
    }

    function createBurstAt(cx, cy, count) {
      ensureCapacity(count);
      for (let i = 0; i < count; i++) {
        const shape = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
        createBurstParticle(cx, cy, shape, "tap");
      }
    }

    function spawnFireworkRockets(x, y, durationMs) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const t = particles[i].type;
        if (t === "rocket" || t === "burst") {
          particles[i].el.remove();
          particles.splice(i, 1);
        }
      }
      activeRockets = 0;
      rocketsFinishedThisRound = false;
      backgroundUpdatedThisRound = false;

      const minHold = LONG_PRESS_THRESHOLD;
      const maxHold = 4000;
      const clamped = Math.max(minHold, Math.min(maxHold, durationMs));
      const strength = (clamped - minHold) / (maxHold - minHold);

      const rocketsThisRound = Math.max(
        1,
        Math.min(fireworkRound, PARAMS.rocketCountMax)
      );

      activeRockets = rocketsThisRound;

      const baseDelay = 80;
      const baseAngle = -Math.PI / 2;
      const spread = PARAMS.rocketSpread;

      for (let i = 0; i < rocketsThisRound; i++) {
        const t = rocketsThisRound === 1 ? 0.5 : i / (rocketsThisRound - 1);
        const angleOffset = (t - 0.5) * spread;
        const finalAngle = baseAngle + angleOffset;

        setTimeout(() => {
          createRocketWithAngle(x, y, strength, finalAngle);
        }, i * baseDelay);
      }
    }

    function ensureCapacity(needToAdd) {
      const totalNeeded = particles.length + needToAdd;
      if (totalNeeded > MAX_PARTICLES) {
        const toRemove = totalNeeded - MAX_PARTICLES;
        for (let i = 0; i < toRemove && particles.length > 0; i++) {
          const old = particles.shift();
          old.el.remove();
        }
      }
    }

    function createBurstParticle(cx, cy, shape, sourceType) {
      const el = document.createElement("div");
      el.classList.add("particle");
      setParticleZ(el);

      const baseColor = colors[colorIndex % colors.length];
      colorIndex++;
      el.dataset.baseColor = baseColor;
      el.style.backgroundColor = "#ffd700";

      const baseAlpha = 0.85 + Math.random() * 0.1;
      el.style.opacity = baseAlpha.toString();

      let baseSpeed;
      let w, h;

      switch (shape) {
        case "line": {
          el.classList.add("shape-line");
          let sLevels;
          if (sourceType === "tap") {
            sLevels = [3, 5, 7];
          } else {
            sLevels = [2, 4, 7];
          }
          const tIndex = Math.floor(Math.random() * sLevels.length);
          h = sLevels[tIndex];
          if (sourceType === "tap") {
            w = 80 + Math.random() * 60;

          h = s;
          baseSpeed = 900 + Math.random() * 480;

        case "star": {
          el.classList.add("shape-star");

          if (sourceType === "tap") {
            sLevels = [24, 36, 50];

            sLevels = [16, 22, 30];
          }
          const s = sLevels[Math.floor(Math.random() * sLevels.length)];

        default: {

          }

          h = s;

      el.style.width = w + "px";
      el.style.height = h + "px";

      const size = (w + h) / 2;
      const sizeFactor = 1.7 - Math.min(size / 80, 1.0);

      let speed = baseSpeed * sizeFactor;
      if (sourceType === "tap") {
        speed *= PARAMS.tapSpeedMul;
      } else {
        speed *= PARAMS.burstSpeedMul;
      }

      let x = cx;
      let y = cy;

      const angle = Math.random() * Math.PI * 2;
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed;

      el.style.transform = "translate(-50%, -50%) scale(0.3)";

      stage.appendChild(el);

      const now = performance.now();
      let baseLife = PARAMS.burstLifeBase + Math.random() * PARAMS.burstLifeExtra;
      if (sourceType === "tap") {
        baseLife *= PARAMS.tapLifeMul;
      } else {
        baseLife *= PARAMS.burstLifeMul;
      }

      particles.push({
        el,
        x,
        y,
        vx,
        vy,
        w,
        h,
        shape,
        life: baseLife,
        createdAt: now,
        spin: 0,
        rotation: 0,
        shrink: false,
        targetW: w,
        baseAlpha,
        type: "burst",
        trailTimer: 0

    function createRocketWithAngle(cx, cy, strength, angle) {
      const el = document.createElement("div");
      el.classList.add("particle", "shape-circle");

      el.style.width = size + "px";
      el.style.height = size + "px";

      const baseAlpha = 0.9;
      el.style.opacity = baseAlpha.toString();

      const baseSpeed = (PARAMS.rocketBaseSpeed + strength * PARAMS.rocketExtraSpeed) * PARAMS.rocketSpeedMul;
      let vx = Math.cos(angle) * (150 * (Math.random() - 0.5));
      let vy = Math.sin(angle) * baseSpeed;

      let x = cx;
      let y = cy;

      el.style.transform = "translate(-50%, -50%) scale(0.4)";

      stage.appendChild(el);

      const now = performance.now();
      const baseLife = (PARAMS.rocketLifeBase + strength * PARAMS.rocketLifeExtra) * PARAMS.rocketLifeMul;

      particles.push({
        el,
        x,
        y,
        vx,
        vy,
        w: size,
        h: size,
        shape: "circle",
        life: baseLife,

        spin: 0,
        rotation: 0,
        shrink: false,
        targetW: size,

      });

    function createTrailParticle(x, y, color) {
      const el = document.createElement("div");
      el.classList.add("particle", "shape-circle");
      setParticleZ(el);
      el.style.backgroundColor = color;

      const size = 6 + Math.random() * 4;
      el.style.width = size + "px";
      el.style.height = size + "px";

      const baseAlpha = 0.8;
      el.style.opacity = baseAlpha.toString();
      el.style.transform = "translate(-50%, -50%) scale(1)";

      stage.appendChild(el);

      const now = performance.now();
      const life = 400 + Math.random() * 250;

      particles.push({
        el,
        x,
        y,
        vx: 0,
        vy: 0,
        w: size,
        h: size,
        shape: "circle",
        life,
        createdAt: now,
        spin: 0,
        rotation: 0,
        shrink: false,
        targetW: size,
        baseAlpha,
        type: "trail",
        trailTimer: 0
      });
    }

    let lastTime = null;

    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      if (pressInfo && isSparkler) {
        const x = pressInfo.x ?? pressInfo.startX;
        const y = pressInfo.y ?? pressInfo.startY;
        sparklerTimer += dt;
        const interval = 1 / 60;
        while (sparklerTimer >= interval) {
          sparklerTimer -= interval;
          spawnSparkler(x, y);
        }
      } else {
        sparklerTimer = 0;
      }

      if (POSTER.marqueeEnabled && POSTER.marqueeSpeed !== 0) {
        const lines = posterTextEl.querySelectorAll(".poster-line");
        lines.forEach(lineEl => {
            let off = parseFloat(lineEl.dataset.offsetX || "0");
            off += POSTER.marqueeSpeed * dt;
            lineEl.dataset.offsetX = off.toString();
            lineEl.style.transform = `translateX(${off}px)`;
        });
      }


      updateParticles(dt, timestamp);
      requestAnimationFrame(animate);
    }
    function updateParticles(dt, now) {
  const baseDrag = 0.97;
  const wallDamping = 0.86;
  const spinDecay = 0.94;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const age = now - p.createdAt;
    const t = age / p.life;

    // 仙女棒分裂邏輯（保持原本）
    if (p.type === "spark" && !p.splitDone && p.mode !== "halo") {
      const ageRatio = age / p.life;
      if (ageRatio > 0.35 && ageRatio < 0.55) {
        p.splitDone = true;

        const splitCount = 3 + Math.floor(Math.random() * 3);
        for (let s = 0; s < splitCount; s++) {
          const el2 = document.createElement("div");
          el2.classList.add("particle", "shape-circle");
          setParticleZ(el2);
          el2.style.backgroundColor = "#ffd900";
          const size2 = (1.5 + Math.random() * 1.5) * PARAMS.sparkSizeMul;
          el2.style.width = size2 + "px";
          el2.style.height = size2 + "px";
          el2.style.opacity = "0.85";
          el2.style.transform = "translate(-50%, -50%) scale(1)";
          stage.appendChild(el2);

          const angle2 = Math.random() * Math.PI * 2;
          const baseSpeed2 = 320 + Math.random() * 260;
          const speed2 = baseSpeed2 * PARAMS.sparkSpeedMul;
          const vx2 = Math.cos(angle2) * speed2;
          const vy2 = Math.sin(angle2) * speed2;

          const now2 = performance.now();
          const baseLife2 = 900 + Math.random() * 700;
          const life2 = baseLife2 * PARAMS.sparkLifeMul;

          particles.push({
            el: el2,
            x: p.x,
            y: p.y,
            vx: vx2,
            vy: vy2,
            w: size2,
            h: size2,
            shape: "circle",
            life: life2,
            createdAt: now2,
            spin: 0,
            rotation: 0,
            shrink: false,
            targetW: size2,
            baseAlpha: 0.85,
            type: "spark",
            mode: "child",
            splitDone: true
          });
        }
      }
    }

    // 壽命到期
    if (t >= 1.05) {
      if (p.type === "rocket") {
        const baseCount =
          PARAMS.rocketBurstBaseCount +
          Math.floor(Math.random() * PARAMS.rocketBurstExtraCount);
        for (let k = 0; k < baseCount * PARAMS.rocketBurstMultiplier; k++) {
          const shape = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
          createBurstParticle(p.x, p.y, shape, "rocket");
        }

        if (!backgroundUpdatedThisRound) {
          updateBackgroundBrightnessByRound();
          backgroundUpdatedThisRound = true;
        }

        activeRockets--;
        if (activeRockets <= 0) {
          rocketsFinishedThisRound = true;
        }
      }

      p.el.remove();
      particles.splice(i, 1);
      continue;
    }

    // 位置與碰撞處理
    if (p.type !== "trail" && p.type !== "spark") {
      let localDrag = baseDrag;
      if (p.shape === "line") localDrag = 0.975;
      else if (p.shape === "star") localDrag = 0.965;

      p.vx *= localDrag;
      p.vy *= localDrag;

      p.x += p.vx * dt;
      p.y += p.vy * dt;

      const halfW = p.w / 2;
      const halfH = p.h / 2;
      const minX = halfW;
      const maxX = STAGE_WIDTH - halfW;
      const minY = halfH;
      const maxY = STAGE_HEIGHT - halfH;

      let collided = false;
      let hitLeft = false;
      let hitRight = false;
      let hitTop = false;
      let hitBottom = false;

      if (p.x < minX) {
        p.x = minX;
        collided = true;
        hitLeft = true;
      } else if (p.x > maxX) {
        p.x = maxX;
        collided = true;
        hitRight = true;
      }

      if (p.y < minY) {
        p.y = minY;
        collided = true;
        hitTop = true;
      } else if (p.y > maxY) {
        p.y = maxY;
        collided = true;
        hitBottom = true;
      }

      if (collided) {
        if (p.type === "burst" && p.shape === "line") {
          // 線條撞邊框：被邊框吃掉 → 長度縮短＋速度幾乎停
          const shrinkFactor = 0.6;   // 每次撞牆縮成 60%
          const minLength = 4;        // 太短就砍掉

          p.w *= shrinkFactor;
          if (p.w < minLength) {
            p.el.remove();
            particles.splice(i, 1);
            continue;
          }
          p.el.style.width = p.w + "px";

          // 稍微往內推一點，避免黏在牆上
          if (hitLeft)  p.x = minX + 2;
          if (hitRight) p.x = maxX - 2;
          if (hitTop)   p.y = minY + 2;
          if (hitBottom)p.y = maxY - 2;

          // 停止旋轉與大幅減速
          p.spin = 0;
          p.vx *= 0.1;
          p.vy *= 0.1;
        } else if (p.type === "burst") {
          // 其他形狀維持原本的彈跳＋旋轉效果
          if (p.x === minX || p.x === maxX) {
            p.vx = -p.vx * wallDamping;
          }
          if (p.y === minY || p.y === maxY) {
            p.vy = -p.vy * wallDamping;
          }

          const spinImpulse = 1080;
          const dir = Math.random() > 0.5 ? 1 : -1;
          p.spin += spinImpulse * dir;

          if (p.shape === "line" && !p.shrink) {
            p.shrink = true;
            p.targetW = p.w * 0.2;
          }
        } else {
          // rocket 等其它型別
          if (p.x === minX || p.x === maxX) {
            p.vx = -p.vx * wallDamping;
          }
          if (p.y === minY || p.y === maxY) {
            p.vy = -p.vy * wallDamping;
          }
        }
      }
    } else {
      // spark / trail
      const drag = p.type === "spark" ? 0.993 : 0.985;
      p.vx *= drag;
      p.vy *= drag;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }

    // 火箭拖尾
    if (p.type === "rocket") {
      p.trailTimer += dt;
      if (p.trailTimer > 0.03) {
        p.trailTimer = 0;
        createTrailParticle(p.x, p.y, p.el.dataset.baseColor || "#ffffff");
      }
    }

    // 自轉衰減
    p.spin *= spinDecay;
    p.rotation += p.spin * dt;

    const baseDirDeg = Math.atan2(p.vy, p.vx) * 180 / Math.PI;

    let scale;
    let opacity;

    if (p.type === "burst" || p.type === "rocket") {
      if (t < 0.2) {
        p.el.style.backgroundColor = "#ffd700";
      } else {
        p.el.style.backgroundColor = p.el.dataset.baseColor || "#ffffff";
      }

      if (t < 0.3) {
        const k = t / 0.3;
        scale = 0.3 + 0.9 * k;
      } else {
        const k = (t - 0.3) / 0.7;
        scale = 1.2 * (1 - k);
      }

      opacity = p.baseAlpha * (1 - t);
    } else if (p.type === "trail" || p.type === "spark") {
      if (p.type === "spark" && p.mode === "core") {
        scale = 1 - t * 0.8;
        opacity = p.baseAlpha * (1 - t * 1.3);
      } else {
        scale = 1 - t * 0.4;
        opacity = p.baseAlpha * (1 - t * 0.85);
      }
    } else {
      scale = 1;
      opacity = p.baseAlpha * (1 - t);
    }

    const rotationDeg = baseDirDeg + p.rotation;

    p.el.style.left = p.x + "px";
    p.el.style.top = p.y + "px";
    p.el.style.transform =
      `translate(-50%, -50%) scale(${scale}) rotate(${rotationDeg}deg)`;
    p.el.style.opacity = opacity.toString();
    p.el.style.filter =
      `saturate(${1 - t * 0.1}) brightness(${1 - t * 0.05})`;
  }

  // 檢查煙火是否結束、觸發分鏡（保持原本邏輯）
  let hasFireworkParticles = false;
  for (let i = 0; i < particles.length; i++) {
    const type = particles[i].type;
    if (type === "rocket" || type === "burst") {
      hasFireworkParticles = true;
      break;
    }
  }

  if (rocketsFinishedThisRound &&
      activeRockets === 0 &&
      !hasFireworkParticles) {

    rocketsFinishedThisRound = false;

    if (fireworkRound >= 4 && !storyboardPlaying) {
      startStoryboardSequence();
    }
  }
}
