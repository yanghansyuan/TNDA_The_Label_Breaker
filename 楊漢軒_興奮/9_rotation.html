<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>興奮粒子場 v5</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    .stage {
      width: 1024px;
      height: 1024px;
      background: radial-gradient(circle at 30% 20%, #222 0, #050505 60%, #000 100%);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0.5;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .shape-circle {
      border-radius: 50%;
    }

    .shape-line {
      border-radius: 999px;
      transform-origin: 50% 50%;
    }

    .shape-triangle {
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    .shape-star {
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="hint">
      <div>點擊畫布</div>
      <div>線條俐落直衝，固體在邊界撞擊時會劇烈旋轉後慢慢平靜</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const STAGE_SIZE = 1024;

    const colors = [
      "#FF1744",
      "#FFEA00",
      "#00E5FF",
      "#E040FB",
      "#76FF03"
    ];
    let colorIndex = 0;

    const particles = [];

    // 只保留：直線 + 三角形 + 星形 + 圓
    const shapeTypes = ["line", "triangle", "star", "circle"];

    stage.addEventListener("click", (event) => {
      const rect = stage.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      const count = 30 + Math.floor(Math.random() * 20); // 30~49 個

      for (let i = 0; i < count; i++) {
        const shape = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
        createParticle(x, y, shape);
      }
    });

    function createParticle(cx, cy, shape) {
      const el = document.createElement("div");
      el.classList.add("particle");

      const baseColor = colors[colorIndex % colors.length];
      colorIndex++;
      el.style.backgroundColor = baseColor;

      let baseSpeed;
      let w, h;

      switch (shape) {
        case "line": {
          el.classList.add("shape-line");
          w = 90 + Math.random() * 60;
          h = 3 + Math.random() * 2;
          // 最快、跑最遠（高速度）
          baseSpeed = 1600 + Math.random() * 900;
          break;
        }
        case "triangle": {
          el.classList.add("shape-triangle");
          w = 24 + Math.random() * 24;
          h = w;
          baseSpeed = 960 + Math.random() * 480;
          break;
        }
        case "star": {
          el.classList.add("shape-star");
          w = 30 + Math.random() * 26;
          h = w;
          baseSpeed = 780 + Math.random() * 420;
          break;
        }
        default: {
          el.classList.add("shape-circle");
          const radius = 8 + Math.random() * 10;
          w = radius * 2;
          h = radius * 2;
          baseSpeed = 900 + Math.random() * 480;
        }
      }

      el.style.width = w + "px";
      el.style.height = h + "px";

      // 大小 → 速度微調：越大越重、越小越快
      const size = (w + h) / 2;
      const sizeFactor = 1.6 - Math.min(size / 80, 1.0);
      let speed = baseSpeed * sizeFactor;

      let x = cx;
      let y = cy;

      const angle = Math.random() * Math.PI * 2;
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed;

      el.style.opacity = "1";
      el.style.transform = "translate(-50%, -50%) scale(1)";

      stage.appendChild(el);

      const now = performance.now();
      const life = 1400 + Math.random() * 700; // 1.4~2.1 秒

      particles.push({
        el,
        x,
        y,
        vx,
        vy,
        w,
        h,
        shape,
        life,
        createdAt: now,
        spin: 0,        // 角速度（度/秒）
        rotation: 0     // 累積旋轉角度（度）
      });
    }

    let lastTime = null;

    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      updateParticles(dt, timestamp);
      requestAnimationFrame(animate);
    }

    function updateParticles(dt, now) {
      const baseDrag = 0.97;       // 阻力小，速度保持久
      const wallDamping = 0.86;    // 撞牆後仍保留多能量
      const spinDecay = 0.94;      // 旋轉阻尼

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const age = now - p.createdAt;
        const t = age / p.life;

        if (t >= 1) {
          p.el.remove();
          particles.splice(i, 1);
          continue;
        }

        let localDrag = baseDrag;

        if (p.shape === "line") {
          localDrag = 0.975; // 最滑
        } else if (p.shape === "star") {
          localDrag = 0.965;
        }

        p.vx *= localDrag;
        p.vy *= localDrag;

        p.x += p.vx * dt;
        p.y += p.vy * dt;

        const halfW = p.w / 2;
        const halfH = p.h / 2;
        const minX = halfW;
        const maxX = STAGE_SIZE - halfW;
        const minY = halfH;
        const maxY = STAGE_SIZE - halfH;

        // 撞牆反彈 + 注入旋轉
        let collided = false;

        if (p.x < minX) {
          p.x = minX;
          p.vx = -p.vx * wallDamping;
          collided = true;
        } else if (p.x > maxX) {
          p.x = maxX;
          p.vx = -p.vx * wallDamping;
          collided = true;
        }

        if (p.y < minY) {
          p.y = minY;
          p.vy = -p.vy * wallDamping;
          collided = true;
        } else if (p.y > maxY) {
          p.y = maxY;
          p.vy = -p.vy * wallDamping;
          collided = true;
        }

        if (collided) {
          // 撞牆時給一個強烈的旋轉脈衝
          const spinImpulse = 1080; // 度/秒，大約 3 圈/秒起跳
          const dir = Math.random() > 0.5 ? 1 : -1;
          p.spin += spinImpulse * dir;
        }

        // 更新旋轉：角速度衰減，並累積旋轉角度
        p.spin *= spinDecay;
        p.rotation += p.spin * dt;

        const easeOut = 1 - Math.pow(1 - t, 2);
        const scale = 0.85 + (1.2 - 0.85) * (1 - easeOut);
        const opacity = 1 - easeOut;

        let baseDirDeg = Math.atan2(p.vy, p.vx) * 180 / Math.PI;
        let rotationDeg = baseDirDeg + p.rotation;

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
        p.el.style.transform = `translate(-50%, -50%) scale(${scale}) rotate(${rotationDeg}deg)`;
        p.el.style.opacity = opacity.toString();
        p.el.style.filter = `saturate(${1 - t * 0.6}) brightness(${1 - t * 0.15})`;
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
