<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>興奮粒子場 v3</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    .stage {
      width: 1024px;
      height: 1024px;
      background: radial-gradient(circle at 30% 20%, #222 0, #050505 60%, #000 100%);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0.5;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .shape-circle {
      border-radius: 50%;
    }

    .shape-line,
    .shape-wave-line {
      border-radius: 999px;
      transform-origin: 50% 50%;
    }

    .shape-triangle {
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    .shape-star {
      clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
      );
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="hint">
      <div>點擊畫布</div>
      <div>直線最快、波浪線次快，其他形狀依大小決定能量與距離</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const STAGE_SIZE = 1024;

    const colors = [
      "#FF1744",
      "#FFEA00",
      "#00E5FF",
      "#E040FB",
      "#76FF03"
    ];
    let colorIndex = 0;

    const particles = [];

    // 新的形狀列表：加入 wave-line
    const shapeTypes = ["line", "wave-line", "triangle", "star", "circle"];

    stage.addEventListener("click", (event) => {
      const rect = stage.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      const count = 30 + Math.floor(Math.random() * 20); // 30~49 個

      for (let i = 0; i < count; i++) {
        const shape = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
        createParticle(x, y, shape);
      }
    });

    function createParticle(cx, cy, shape) {
      const el = document.createElement("div");
      el.classList.add("particle");

      const baseColor = colors[colorIndex % colors.length];
      colorIndex++;
      el.style.backgroundColor = baseColor;

      let baseSpeed;
      let w, h;

      // 大小先決定，後面用來算「越大越重、越小越快」
      switch (shape) {
        case "line": {
          el.classList.add("shape-line");
          w = 90 + Math.random() * 60;
          h = 3 + Math.random() * 2;
          baseSpeed = 520 + Math.random() * 220; // 最快、跑最遠
          break;
        }
        case "wave-line": {
          el.classList.add("shape-wave-line");
          w = 70 + Math.random() * 50;
          h = 5 + Math.random() * 3;
          baseSpeed = 440 + Math.random() * 210; // 次快
          break;
        }
        case "triangle": {
          el.classList.add("shape-triangle");
          w = 24 + Math.random() * 24;
          h = w;
          baseSpeed = 320 + Math.random() * 160; // 固體中偏快
          break;
        }
        case "star": {
          el.classList.add("shape-star");
          w = 30 + Math.random() * 26;
          h = w;
          baseSpeed = 260 + Math.random() * 140; // 固體中偏慢
          break;
        }
        default: {
          el.classList.add("shape-circle");
          const radius = 8 + Math.random() * 10;
          w = radius * 2;
          h = radius * 2;
          baseSpeed = 300 + Math.random() * 160; // 中間
        }
      }

      el.style.width = w + "px";
      el.style.height = h + "px";

      // 大小 → 速度微調：越大越重，越小越快
      const size = (w + h) / 2;
      const sizeFactor = 1.4 - Math.min(size / 80, 0.8); // size 小 -> factor ~1.4, size 大 -> ~0.6
      let speed = baseSpeed * sizeFactor;

      // 初始位置
      let x = cx;
      let y = cy;

      const angle = Math.random() * Math.PI * 2;
      let vx = Math.cos(angle) * speed;
      let vy = Math.sin(angle) * speed;

      el.style.opacity = "1";
      el.style.transform = "translate(-50%, -50%) scale(1)";

      stage.appendChild(el);

      const now = performance.now();
      const life = 1200 + Math.random() * 700; // 整體縮短：1.2~1.9 秒，更俐落

      const baseAngleDeg = (angle * 180) / Math.PI;

      particles.push({
        el,
        x,
        y,
        vx,
        vy,
        w,
        h,
        shape,
        life,
        createdAt: now,
        baseAngleDeg
      });
    }

    let lastTime = null;

    function animate(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      updateParticles(dt, timestamp);
      requestAnimationFrame(animate);
    }

    function updateParticles(dt, now) {
      const baseDrag = 0.94;       // 整體拖曳更小 → 更快
      const wallDamping = 0.82;    // 撞牆稍微保留多一點速度

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const age = now - p.createdAt;
        const t = age / p.life;

        if (t >= 1) {
          p.el.remove();
          particles.splice(i, 1);
          continue;
        }

        let localDrag = baseDrag;

        // 線段保持速度感更久
        if (p.shape === "line") {
          localDrag = 0.96;
        } else if (p.shape === "wave-line") {
          localDrag = 0.95;
        } else if (p.shape === "star") {
          localDrag = 0.93;
        }

        p.vx *= localDrag;
        p.vy *= localDrag;

        p.x += p.vx * dt;
        p.y += p.vy * dt;

        const halfW = p.w / 2;
        const halfH = p.h / 2;
        const minX = halfW;
        const maxX = STAGE_SIZE - halfW;
        const minY = halfH;
        const maxY = STAGE_SIZE - halfH;

        if (p.x < minX) {
          p.x = minX;
          p.vx = -p.vx * wallDamping;
        } else if (p.x > maxX) {
          p.x = maxX;
          p.vx = -p.vx * wallDamping;
        }

        if (p.y < minY) {
          p.y = minY;
          p.vy = -p.vy * wallDamping;
        } else if (p.y > maxY) {
          p.y = maxY;
          p.vy = -p.vy * wallDamping;
        }

        const easeOut = 1 - Math.pow(1 - t, 2);
        const scale = 0.8 + (1.25 - 0.8) * (1 - easeOut);
        const opacity = 1 - easeOut;

        let rotationDeg = 0;

        if (p.shape === "line") {
          // 直線不抖動，只跟著速度方向轉
          rotationDeg = Math.atan2(p.vy, p.vx) * 180 / Math.PI;
        } else if (p.shape === "wave-line") {
          // 波浪線：在基準角附近做正弦擺動
          const waveFreq = 16; // 頻率（愈大愈抖）
          const waveAmp = 18;  // 擺幅
          const wave = Math.sin(age / 1000 * waveFreq) * waveAmp * (1 - t);
          rotationDeg = p.baseAngleDeg + wave;
        } else if (p.shape === "triangle" || p.shape === "star" || p.shape === "circle") {
          rotationDeg = Math.atan2(p.vy, p.vx) * 180 / Math.PI;
        }

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
        p.el.style.transform = `translate(-50%, -50%) scale(${scale}) rotate(${rotationDeg}deg)`;
        p.el.style.opacity = opacity.toString();
        p.el.style.filter = `saturate(${1 - t * 0.6}) brightness(${1 - t * 0.15})`;
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
