<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒的總和 - 最終黑金版 (V4)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* [修改 1] 背景改為純黑 */
            background-color: #000000;
            user-select: none; 
        }

        /* [修改 4] 移除提示框樣式 */

        .canvas-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 融球濾鏡層 */
        #goo-layer {
            z-index: 1;
            /* [重要] 黑色背景下，濾鏡參數微調以保持黏性 */
            filter: blur(12px) contrast(25);
            /* [重要] 這一層的背景也必須是黑色，濾鏡才能正確運作 */
            background-color: #000000; 
        }

        #particle-layer {
            z-index: 2;
            pointer-events: none;
            /* 讓火花在黑底上更亮 */
            filter: drop-shadow(0 0 5px currentColor);
        }
    </style>
</head>
<body>

    <div class="canvas-wrapper" id="goo-layer">
        <canvas id="gooCanvas"></canvas>
    </div>
    <div class="canvas-wrapper" id="particle-layer">
        <canvas id="particleCanvas"></canvas>
    </div>

    <script>
        const gooCanvas = document.getElementById('gooCanvas');
        const ctxGoo = gooCanvas.getContext('2d');

        const particleCanvas = document.getElementById('particleCanvas');
        const ctxParticle = particleCanvas.getContext('2d');

        let width, height;
        let dpr = window.devicePixelRatio || 1;

        let balls = [];
        let particles = [];
        let draggedBall = null;
        let isGameOver = false;

        let mouseX = 0, mouseY = 0;
        let lastMouseX = 0, lastMouseY = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;

            gooCanvas.width = width * dpr;
            gooCanvas.height = height * dpr;
            ctxGoo.scale(dpr, dpr);

            particleCanvas.width = width * dpr;
            particleCanvas.height = height * dpr;
            ctxParticle.scale(dpr, dpr);
            
            gooCanvas.style.width = `${width}px`;
            gooCanvas.style.height = `${height}px`;
            particleCanvas.style.width = `${width}px`;
            particleCanvas.style.height = `${height}px`;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 類別定義 ---

        class Ball {
            constructor(x, y, r) {
                this.x = x;
                this.y = y;
                this.radius = r;
                this.baseRadius = r;
                
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.isDragging = false;
                this.updateColor();
            }

            updateColor() {
                let safeX = Math.max(0, Math.min(this.x, width));
                let hue = (safeX / width) * 360;

                // [修改 1] 針對黑色背景調整亮度
                // 提高亮度範圍：底部 50% -> 頂部 85%，並使用 100% 飽和度
                // 這樣在黑底上會看起來像在發光
                let safeY = Math.max(0, Math.min(this.y, height));
                let lightness = 85 - (safeY / height) * 35; 

                this.color = `hsl(${hue}, 100%, ${lightness}%)`;
                this.hue = hue;
            }

            update() {
                if (this.isDragging) {
                    // --- 拖曳模式 ---
                    
                    // [修改 2] 加入拖曳邊界限制
                    // 計算目標位置，但限制在螢幕範圍內 (考慮半徑)
                    let targetX = mouseX;
                    let targetY = mouseY;
                    
                    // 限制 X 軸：不能小於半徑，不能大於 寬度-半徑
                    this.x = Math.max(this.radius, Math.min(targetX, width - this.radius));
                    // 限制 Y 軸
                    this.y = Math.max(this.radius, Math.min(targetY, height - this.radius));
                    
                    // 計算拖曳時的速度感 (用於放開時的慣性)
                    this.vx = this.x - lastMouseX;
                    this.vy = this.y - lastMouseY;

                    this.radius = this.baseRadius * 1.15;
                } else {
                    // --- 自由模式 ---
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    this.vx *= 0.99;
                    this.vy *= 0.99;

                    if (this.x < this.radius) { this.x = this.radius; this.vx *= -1; }
                    if (this.x > width - this.radius) { this.x = width - this.radius; this.vx *= -1; }
                    if (this.y < this.radius) { this.y = this.radius; this.vy *= -1; }
                    if (this.y > height - this.radius) { this.y = height - this.radius; this.vy *= -1; }

                    if (this.radius > this.baseRadius) {
                        this.radius -= 0.5;
                    }
                }
                this.updateColor();
            }

            draw() {
                ctxGoo.beginPath();
                ctxGoo.fillStyle = this.color;
                ctxGoo.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctxGoo.fill();
                
                // (選用) 在黑底上加一個淡淡的高光圈，增加立體感
                // ctxGoo.strokeStyle = 'rgba(255,255,255,0.3)';
                // ctxGoo.lineWidth = 2;
                // ctxGoo.stroke();
            }
        }

        class Spark {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4; // 火花速度更快
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.03 + 0.02;
                // 火花顏色調亮一點
                this.color = color; 
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15; 
                this.life -= this.decay;
            }
            draw() {
                ctxParticle.globalAlpha = this.life;
                // 使用更亮的顏色繪製火花核心
                ctxParticle.fillStyle = '#ffffff'; 
                ctxParticle.beginPath();
                ctxParticle.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
                ctxParticle.fill();
                
                // 繪製外發光
                ctxParticle.globalAlpha = this.life * 0.7;
                ctxParticle.fillStyle = this.color;
                ctxParticle.beginPath();
                ctxParticle.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxParticle.fill();
                
                ctxParticle.globalAlpha = 1.0;
            }
        }

        // --- 邏輯函數 ---

        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push(new Spark(x, y, color));
            }
        }

        function checkCollisions() {
            if (balls.length < 2) return;

            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i];
                    let b2 = balls[j];
                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < (b1.radius + b2.radius) * 0.9) {
                        
                        let newArea = b1.radius * b1.radius + b2.radius * b2.radius;
                        let newRadius = Math.sqrt(newArea);
                        let totalR = b1.radius + b2.radius;
                        let newX = (b1.x * b1.radius + b2.x * b2.radius) / totalR;
                        let newY = (b1.y * b1.radius + b2.y * b2.radius) / totalR;

                        let newBall = new Ball(newX, newY, newRadius);
                        
                        if (b1.isDragging || b2.isDragging) {
                             newBall.isDragging = true;
                             draggedBall = newBall; 
                        }

                        // 融合火花更強烈
                        createExplosion(newX, newY, '#ffffff', 30);
                        createExplosion(newX, newY, b1.color, 20);

                        balls.splice(j, 1);
                        balls.splice(i, 1);
                        balls.push(newBall);
                        return; 
                    }
                }
            }
        }

        function checkEndGame() {
            if (balls.length === 1) {
                let bigBall = balls[0];
                // 判定稍微嚴格一點，確保真的很大
                let limit = Math.min(width, height) * 0.42; 
                
                if (bigBall.radius > limit && !isGameOver) {
                    isGameOver = true;
                    
                    // [修改 3] 觸發結局時，強制釋放拖曳
                    if (draggedBall) {
                        draggedBall.isDragging = false;
                        draggedBall = null;
                    }

                    // 設定大球狀態
                    bigBall.vx = 0;
                    bigBall.vy = 0;
                }

                if (isGameOver) {
                    // 平滑移到中間
                    bigBall.x += (width/2 - bigBall.x) * 0.05;
                    bigBall.y += (height/2 - bigBall.y) * 0.05;
                    // 呼吸效果
                    bigBall.radius = bigBall.baseRadius + Math.sin(Date.now() / 300) * 15;
                }
            }
        }

        // --- 輸入處理 ---

        function handleInputStart(x, y) {
            let hitBall = false;
            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                let dist = Math.sqrt((x - b.x)**2 + (y - b.y)**2);
                
                if (dist < b.radius) {
                    hitBall = true;
                    if (isGameOver) {
                        // 終極大爆炸
                        createExplosion(x, y, b.color, 200);
                        createExplosion(x, y, '#FFFFFF', 100);
                        balls = [];
                        isGameOver = false;
                    } else {
                        b.isDragging = true;
                        draggedBall = b;
                    }
                    break; 
                }
            }

            if (!hitBall && !isGameOver) {
                let newR = Math.random() * 25 + 35;
                balls.push(new Ball(x, y, newR));
                createExplosion(x, y, '#ffffff', 10); // 生成時白色火花
            }
            mouseX = x; mouseY = y;
            lastMouseX = x; lastMouseY = y;
        }

        function handleInputMove(x, y) {
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            mouseX = x;
            mouseY = y;
        }

        function handleInputEnd() {
            if (draggedBall) {
                draggedBall.isDragging = false;
                draggedBall = null;
            }
        }

        window.addEventListener('mousedown', e => handleInputStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleInputMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleInputEnd);
        
        window.addEventListener('touchstart', e => {
            e.preventDefault();
            handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            handleInputMove(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        window.addEventListener('touchend', handleInputEnd);

        // --- 繪圖循環 ---

        function animate() {
            ctxGoo.clearRect(0, 0, width, height);
            ctxParticle.clearRect(0, 0, width, height);

            balls.forEach(b => {
                b.update();
                b.draw();
            });

            checkCollisions();
            checkEndGame(); // 這裡的順序調整了一下，確保邏輯更順暢

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        animate();

    </script>
</body>
</html>
