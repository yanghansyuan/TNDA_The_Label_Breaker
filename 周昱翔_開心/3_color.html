<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開心 - RGB調色盤互動 (V3)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            user-select: none; 
        }

        #instruction {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: '微軟正黑體', sans-serif;
            color: #555;
            z-index: 10;
            pointer-events: none;
            background-color: rgba(255,255,255,0.7);
            padding: 15px;
            border-radius: 10px;
        }

        /* 融球濾鏡層保持不變 */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            /* 這裡稍微加強了一點對比度，讓顏色更鮮豔 */
            filter: blur(15px) contrast(40);
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="instruction">
        <h1>3_color.html</h1>
        <p>核心更新：RGB 調色盤拖曳</p>
        <ul>
            <li><b>左右拖曳：</b>改變色相 (彩虹色循環)</li>
            <li><b>上下拖曳：</b>改變亮度 (上亮下暗)</li>
            <li>放開後球體會變回它原本的顏色。</li>
            <li>物理投擲與融合效果依然存在。</li>
        </ul>
    </div>

    <div id="canvas-container">
        <canvas id="emotionCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('emotionCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        
        let dragParticle = null;
        let mouseX = 0;
        let mouseY = 0;
        let lastMouseX = 0;
        let lastMouseY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.baseRadius = Math.random() * 25 + 35;
                this.radius = this.baseRadius;
                this.originalColor = color; // 記住它原本的顏色
                this.currentColor = color;
                
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5;
                this.friction = 0.98;
                this.isDragging = false;
            }

            update() {
                if (this.isDragging) {
                    // --- 拖曳模式 ---
                    this.vx = mouseX - lastMouseX;
                    this.vy = mouseY - lastMouseY;
                    this.x = mouseX;
                    this.y = mouseY;
                    
                    // [重點更新]：根據位置計算 RGB 調色盤顏色
                    
                    // 1. 計算色相 (Hue)：根據 X 軸位置，從 0 到 360 度循環
                    // 確保 x 在畫面內，避免計算出錯
                    let safeX = Math.max(0, Math.min(this.x, width));
                    const hue = (safeX / width) * 360;

                    // 2. 計算亮度 (Lightness)：根據 Y 軸位置
                    // 畫面最上方(y=0)亮度高(約70%)，最下方(y=height)亮度低(約30%)
                    let safeY = Math.max(0, Math.min(this.y, height));
                    const lightness = 70 - (safeY / height) * 40;

                    // 3. 設定新顏色 (使用 HSL 格式，飽和度固定 100% 最鮮豔)
                    this.currentColor = `hsl(${hue}, 100%, ${lightness}%)`;

                    // 拖曳時稍微變大
                    this.radius = this.baseRadius * 1.3;

                } else {
                    // --- 自由模式 ---
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= this.friction;
                    this.vy *= this.friction;

                    if (this.x < this.radius) { this.x = this.radius; this.vx *= -1; }
                    if (this.x > width - this.radius) { this.x = width - this.radius; this.vx *= -1; }
                    if (this.y < this.radius) { this.y = this.radius; this.vy *= -1; }
                    if (this.y > height - this.radius) { this.y = height - this.radius; this.vy *= -1; }

                    // 放開後，慢慢變回原本的顏色
                    this.currentColor = this.originalColor;
                    this.radius = this.baseRadius + Math.sin(Date.now() / 300) * 2;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.fillStyle = this.currentColor;
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            // 初始顏色我們用比較柔和的，這樣對比拖曳時的鮮豔感
            const colors = ['#FFD700', '#FF6347', '#00BFFF', '#32CD32', '#FF69B4'];
            for (let i = 0; i < 6; i++) {
                particles.push(new Particle(
                    width / 2 + (Math.random() - 0.5) * 200,
                    height / 2 + (Math.random() - 0.5) * 200,
                    colors[i % colors.length]
                ));
            }
        }

        // --- 互動事件處理 (保持不變) ---
        function handleStart(x, y) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                const dx = x - p.x;
                const dy = y - p.y;
                if (Math.sqrt(dx*dx + dy*dy) < p.radius) {
                    p.isDragging = true;
                    dragParticle = p;
                    break;
                }
            }
            mouseX = x;
            mouseY = y;
            lastMouseX = x;
            lastMouseY = y;
        }

        function handleMove(x, y) {
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            mouseX = x;
            mouseY = y;
        }

        function handleEnd() {
            if (dragParticle) {
                dragParticle.isDragging = false;
                dragParticle = null;
            }
        }

        canvas.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            handleStart(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        window.addEventListener('touchend', handleEnd);

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();

    </script>
</body>
</html>
