<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒的總和 - 完美流動版 (V3)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* 背景色改為純淨的淺灰，突顯顏色 */
            background-color: #eeeeee;
            user-select: none; 
            font-family: '微軟正黑體', sans-serif;
        }

        #instruction {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #444;
            z-index: 100;
            pointer-events: none;
            background-color: rgba(255,255,255,0.8);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            max-width: 300px;
        }

        .canvas-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* [關鍵優化] 融球濾鏡層 
           透過 mix-blend-mode 和更細緻的濾鏡參數解決「怪怪的」邊緣
        */
        #goo-layer {
            z-index: 1;
            /* blur(10px): 模糊程度適中
               contrast(20): 對比度降低，避免邊緣鋸齒
               hue-rotate: 讓顏色混合更自然
            */
            filter: blur(10px) contrast(20);
            background-color: #eeeeee; /* 確保濾鏡層背景與 body 一致 */
        }

        /* 粒子層 (火花) 不受濾鏡影響，保持銳利 */
        #particle-layer {
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="instruction">
        <h3>撕下標籤的人</h3>
        <p style="font-size: 0.9em; line-height: 1.6;">
            ● <b>全域流動</b>：球體顏色隨位置即時變化。<br>
            ● <b>真實融合</b>：撞擊融合，直至填滿世界。<br>
            ● <b>操作</b>：點擊生成、拖曳互動。<br>
            ● <b>結局</b>：戳破那顆最大的球。
        </p>
    </div>

    <div class="canvas-wrapper" id="goo-layer">
        <canvas id="gooCanvas"></canvas>
    </div>
    <div class="canvas-wrapper" id="particle-layer">
        <canvas id="particleCanvas"></canvas>
    </div>

    <script>
        const gooCanvas = document.getElementById('gooCanvas');
        const ctxGoo = gooCanvas.getContext('2d');

        const particleCanvas = document.getElementById('particleCanvas');
        const ctxParticle = particleCanvas.getContext('2d');

        let width, height;
        let dpr = window.devicePixelRatio || 1; // 獲取螢幕像素比

        let balls = [];
        let particles = [];
        let draggedBall = null;
        let isGameOver = false;

        let mouseX = 0, mouseY = 0;
        let lastMouseX = 0, lastMouseY = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;

            // [關鍵優化] 使用 DPR 提高解析度，讓融球邊緣平滑
            gooCanvas.width = width * dpr;
            gooCanvas.height = height * dpr;
            ctxGoo.scale(dpr, dpr);

            particleCanvas.width = width * dpr;
            particleCanvas.height = height * dpr;
            ctxParticle.scale(dpr, dpr);
            
            // 讓 CSS 尺寸保持正確
            gooCanvas.style.width = `${width}px`;
            gooCanvas.style.height = `${height}px`;
            particleCanvas.style.width = `${width}px`;
            particleCanvas.style.height = `${height}px`;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 類別定義 ---

        class Ball {
            constructor(x, y, r) {
                this.x = x;
                this.y = y;
                this.radius = r;
                this.baseRadius = r;
                
                // 初始速度
                this.vx = (Math.random() - 0.5) * 6; // 稍微加快一點速度感
                this.vy = (Math.random() - 0.5) * 6;
                
                this.isDragging = false;
                
                // 立即計算一次顏色
                this.updateColor();
            }

            // [關鍵優化] 顏色計算獨立出來，隨時根據位置更新
            updateColor() {
                // X 軸控制色相 (0-360)
                // 限制範圍避免邊緣閃爍
                let safeX = Math.max(0, Math.min(this.x, width));
                let hue = (safeX / width) * 360;

                // Y 軸控制亮度 (Lightness)
                // 上面亮(65%)，下面暗(45%)，增加立體感
                let safeY = Math.max(0, Math.min(this.y, height));
                let lightness = 65 - (safeY / height) * 20;

                this.color = `hsl(${hue}, 90%, ${lightness}%)`;
                this.hue = hue; // 儲存色相供融合使用
            }

            update() {
                if (this.isDragging) {
                    // 拖曳模式
                    this.vx = mouseX - lastMouseX;
                    this.vy = mouseY - lastMouseY;
                    this.x = mouseX;
                    this.y = mouseY;
                    
                    // 拖曳時稍微變大
                    this.radius = this.baseRadius * 1.15;
                } else {
                    // 自由模式
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    // 摩擦力
                    this.vx *= 0.99;
                    this.vy *= 0.99;

                    // 邊界反彈
                    if (this.x < this.radius) { this.x = this.radius; this.vx *= -1; }
                    if (this.x > width - this.radius) { this.x = width - this.radius; this.vx *= -1; }
                    if (this.y < this.radius) { this.y = this.radius; this.vy *= -1; }
                    if (this.y > height - this.radius) { this.y = height - this.radius; this.vy *= -1; }

                    // 恢復原有大小
                    if (this.radius > this.baseRadius) {
                        this.radius -= 0.5;
                    }
                }

                // [關鍵] 無論是否拖曳，每一幀都重新計算顏色
                this.updateColor();
            }

            draw() {
                ctxGoo.beginPath();
                ctxGoo.fillStyle = this.color;
                ctxGoo.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctxGoo.fill();
            }
        }

        class Spark {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2; // 讓火花更明顯
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.04 + 0.01;
                this.color = color;
                this.size = Math.random() * 4 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // 重力感
                this.life -= this.decay;
            }
            draw() {
                ctxParticle.globalAlpha = this.life;
                ctxParticle.fillStyle = this.color;
                ctxParticle.beginPath();
                ctxParticle.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxParticle.fill();
                ctxParticle.globalAlpha = 1.0;
            }
        }

        // --- 邏輯函數 ---

        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push(new Spark(x, y, color));
            }
        }

        function checkCollisions() {
            if (balls.length < 2) return;

            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i];
                    let b2 = balls[j];
                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    // 判定距離係數
                    if (dist < (b1.radius + b2.radius) * 0.9) {
                        
                        // 計算新半徑
                        let newArea = b1.radius * b1.radius + b2.radius * b2.radius;
                        let newRadius = Math.sqrt(newArea);
                        
                        // 計算新位置 (重心)
                        let totalR = b1.radius + b2.radius;
                        let newX = (b1.x * b1.radius + b2.x * b2.radius) / totalR;
                        let newY = (b1.y * b1.radius + b2.y * b2.radius) / totalR;

                        let newBall = new Ball(newX, newY, newRadius);
                        
                        // 繼承拖曳狀態 (修復拖曳中斷問題)
                        if (b1.isDragging || b2.isDragging) {
                             newBall.isDragging = true;
                             draggedBall = newBall; 
                        }

                        // 產生火花
                        createExplosion(newX, newY, '#ffffff', 20);
                        createExplosion(newX, newY, b1.color, 15);

                        balls.splice(j, 1);
                        balls.splice(i, 1);
                        balls.push(newBall);
                        return; 
                    }
                }
            }
        }

        function checkEndGame() {
            if (balls.length === 1) {
                let bigBall = balls[0];
                let limit = Math.min(width, height) * 0.45; // 稍微增加判定大小
                
                if (bigBall.radius > limit) {
                    isGameOver = true;
                    // 平滑移到中間
                    bigBall.x += (width/2 - bigBall.x) * 0.1;
                    bigBall.y += (height/2 - bigBall.y) * 0.1;
                    bigBall.vx = 0;
                    bigBall.vy = 0;
                    
                    // 呼吸效果
                    let pulse = Math.sin(Date.now() / 300) * 10;
                    bigBall.radius = bigBall.baseRadius + pulse;

                    document.querySelector('#instruction h3').innerText = "情緒已滿溢";
                    document.querySelector('#instruction p').innerText = "點擊球體，釋放它。";
                }
            }
        }

        // --- 輸入處理 ---

        function handleInputStart(x, y) {
            let hitBall = false;
            // 反向檢查，先點到上層的球
            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                let dist = Math.sqrt((x - b.x)**2 + (y - b.y)**2);
                
                if (dist < b.radius) {
                    hitBall = true;
                    if (isGameOver) {
                        // 終極大爆炸
                        createExplosion(x, y, b.color, 150);
                        createExplosion(x, y, '#FFF', 80);
                        createExplosion(x+50, y+50, b.color, 50);
                        createExplosion(x-50, y-50, '#FFD700', 50);
                        
                        balls = [];
                        isGameOver = false;
                        document.querySelector('#instruction h3').innerText = "撕下標籤的人";
                        setTimeout(() => {
                            document.querySelector('#instruction p').innerHTML = "● <b>全域流動</b>：球體顏色隨位置即時變化。<br>● <b>真實融合</b>：撞擊融合，直至填滿世界。<br>...";
                        }, 1000);
                    } else {
                        b.isDragging = true;
                        draggedBall = b;
                    }
                    break; 
                }
            }

            if (!hitBall && !isGameOver) {
                let newR = Math.random() * 25 + 35;
                balls.push(new Ball(x, y, newR));
                createExplosion(x, y, '#ccc', 8);
            }
            mouseX = x; mouseY = y;
            lastMouseX = x; lastMouseY = y;
        }

        function handleInputMove(x, y) {
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            mouseX = x;
            mouseY = y;
        }

        function handleInputEnd() {
            if (draggedBall) {
                draggedBall.isDragging = false;
                draggedBall = null;
            }
        }

        window.addEventListener('mousedown', e => handleInputStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleInputMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleInputEnd);
        
        window.addEventListener('touchstart', e => {
            e.preventDefault();
            handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            handleInputMove(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        window.addEventListener('touchend', handleInputEnd);

        // --- 繪圖循環 ---

        function animate() {
            // 清除畫布 (考慮 DPR)
            ctxGoo.clearRect(0, 0, width, height);
            ctxParticle.clearRect(0, 0, width, height);

            balls.forEach(b => {
                b.update();
                b.draw();
            });

            if (!isGameOver) {
                checkCollisions();
                checkEndGame();
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        animate();

    </script>
</body>
</html>
