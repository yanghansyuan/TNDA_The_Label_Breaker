<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒的總和 - 最終版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* 背景不再是死白，改為溫暖的米灰色 */
            background-color: #f2f0eb;
            user-select: none; 
            font-family: '微軟正黑體', sans-serif;
        }

        #instruction {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #555;
            z-index: 100; /* 確保文字在最上層 */
            pointer-events: none;
            background-color: rgba(255,255,255,0.6);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        .canvas-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 第一層：融球層 (Metaballs) */
        #goo-layer {
            z-index: 1;
            /* 這裡產生黏糊糊的效果 */
            filter: blur(20px) contrast(40);
            background-color: transparent;
        }

        /* 第二層：粒子層 (Particles) */
        #particle-layer {
            z-index: 2;
            /* 這一層沒有濾鏡，所以火花是清晰的 */
            pointer-events: none; /* 讓滑鼠點擊可以穿透這層，點到下面的球 */
        }

    </style>
</head>
<body>

    <div id="instruction">
        <h3>撕下標籤的人 - 最終章</h3>
        <p>1. <b>點擊空白處</b>：生成新的情緒粒子。</p>
        <p>2. <b>拖曳球體</b>：移動並觀察顏色變化。</p>
        <p>3. <b>融合</b>：將球撞在一起，它們會真的合併。</p>
        <p>4. <b>終點</b>：當球大到填滿螢幕時...戳破它。</p>
    </div>

    <div class="canvas-wrapper" id="goo-layer">
        <canvas id="gooCanvas"></canvas>
    </div>
    <div class="canvas-wrapper" id="particle-layer">
        <canvas id="particleCanvas"></canvas>
    </div>

    <script>
        const gooCanvas = document.getElementById('gooCanvas');
        const ctxGoo = gooCanvas.getContext('2d');

        const particleCanvas = document.getElementById('particleCanvas');
        const ctxParticle = particleCanvas.getContext('2d');

        let width, height;
        
        // 遊戲狀態
        let balls = [];
        let particles = [];
        let draggedBall = null;
        let isGameOver = false; // 是否出現巨大球

        // 滑鼠追蹤
        let mouseX = 0, mouseY = 0;
        let lastMouseX = 0, lastMouseY = 0;

        // 初始化畫布
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            gooCanvas.width = width;
            gooCanvas.height = height;
            particleCanvas.width = width;
            particleCanvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 類別定義 ---

        class Ball {
            constructor(x, y, r) {
                this.x = x;
                this.y = y;
                this.radius = r;
                this.baseRadius = r; // 記憶原始大小
                
                // 隨機初始顏色 (HSL)
                this.hue = Math.random() * 360;
                this.lightness = 50;
                this.color = `hsl(${this.hue}, 100%, 50%)`;

                // 物理屬性
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.isDragging = false;
            }

            update() {
                if (this.isDragging) {
                    // 拖曳邏輯：跟隨滑鼠 + RGB調色盤變色
                    this.vx = mouseX - lastMouseX;
                    this.vy = mouseY - lastMouseY;
                    this.x = mouseX;
                    this.y = mouseY;

                    // 根據位置改變顏色 (RGB調色盤邏輯)
                    let safeX = Math.max(0, Math.min(this.x, width));
                    let safeY = Math.max(0, Math.min(this.y, height));
                    this.hue = (safeX / width) * 360;
                    this.lightness = 70 - (safeY / height) * 40;
                    
                    this.radius = this.baseRadius * 1.1; // 拖曳時稍微變大

                } else {
                    // 自由飄動邏輯
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    // 摩擦力
                    this.vx *= 0.98;
                    this.vy *= 0.98;

                    // 邊界反彈
                    if (this.x < this.radius) { this.x = this.radius; this.vx *= -1; }
                    if (this.x > width - this.radius) { this.x = width - this.radius; this.vx *= -1; }
                    if (this.y < this.radius) { this.y = this.radius; this.vy *= -1; }
                    if (this.y > height - this.radius) { this.y = height - this.radius; this.vy *= -1; }

                    // 恢復原有大小
                    if (this.radius > this.baseRadius) {
                        this.radius -= 0.5;
                    }
                }
                
                // 更新顏色字串
                this.color = `hsl(${this.hue}, 100%, ${this.lightness}%)`;
            }

            draw() {
                ctxGoo.beginPath();
                ctxGoo.fillStyle = this.color;
                ctxGoo.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctxGoo.fill();
            }
        }

        // 火花粒子 (這是畫在第二層 clear canvas 上的)
        class Spark {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0; // 生命值 1.0 -> 0.0
                this.decay = Math.random() * 0.03 + 0.01; // 消失速度
                this.color = color;
                this.size = Math.random() * 3 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // 重力
                this.life -= this.decay;
            }

            draw() {
                ctxParticle.globalAlpha = this.life;
                ctxParticle.fillStyle = this.color;
                ctxParticle.beginPath();
                ctxParticle.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxParticle.fill();
                ctxParticle.globalAlpha = 1.0;
            }
        }

        // --- 核心功能函數 ---

        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push(new Spark(x, y, color));
            }
        }

        // 檢查並執行融合
        function checkCollisions() {
            // 如果只剩一顆球，且它很大，就不做融合檢查了
            if (balls.length < 2) return;

            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i];
                    let b2 = balls[j];

                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    // 判定融合：距離 < 兩球半徑和 (稍微縮小一點判定範圍讓視覺更黏)
                    if (dist < (b1.radius + b2.radius) * 0.8) {
                        // 融合！
                        
                        // 1. 計算新半徑 (面積相加: R = sqrt(r1^2 + r2^2))
                        let newArea = b1.radius * b1.radius + b2.radius * b2.radius;
                        let newRadius = Math.sqrt(newArea);

                        // 2. 計算新位置 (根據大小加權，大的球吸小的球)
                        let totalR = b1.radius + b2.radius;
                        let newX = (b1.x * b1.radius + b2.x * b2.radius) / totalR;
                        let newY = (b1.y * b1.radius + b2.y * b2.radius) / totalR;

                        // 3. 產生特效
                        createExplosion(newX, newY, '#ffffff', 20); // 白色閃光
                        createExplosion(newX, newY, b1.color, 10);  // 原色火花

                        // 4. 生成新球
                        let newBall = new Ball(newX, newY, newRadius);
                        // 顏色混合：取兩者色相的中間值
                        newBall.hue = (b1.hue + b2.hue) / 2;
                        newBall.color = `hsl(${newBall.hue}, 100%, 50%)`;
                        
                        // 5. 移除舊球，加入新球
                        balls.splice(j, 1); // 先移後面的
                        balls.splice(i, 1); // 再移前面的
                        balls.push(newBall);

                        // 融合發生後，跳出迴圈避免索引錯誤 (下一幀再繼續檢查)
                        return; 
                    }
                }
            }
        }

        // 檢查是否達成「填滿螢幕」的條件
        function checkEndGame() {
            if (balls.length === 1) {
                let bigBall = balls[0];
                // 如果球的直徑大於螢幕短邊的 80%，就算填滿
                let limit = Math.min(width, height) * 0.4; 
                
                if (bigBall.radius > limit) {
                    isGameOver = true;
                    // 讓大球保持在中心
                    bigBall.x = width / 2;
                    bigBall.y = height / 2;
                    bigBall.vx = 0;
                    bigBall.vy = 0;
                    // 視覺提示：稍微閃爍
                    bigBall.lightness = 50 + Math.sin(Date.now() / 200) * 10;
                    bigBall.color = `hsl(${bigBall.hue}, 100%, ${bigBall.lightness}%)`;
                    
                    // 修改說明文字
                    document.querySelector('#instruction h3').innerText = "情緒已滿溢";
                    document.querySelector('#instruction p').innerText = "點擊球體，釋放它。";
                }
            }
        }

        // --- 輸入事件 ---

        function handleInputStart(x, y) {
            let hitBall = false;

            // 1. 檢查是否點到球
            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                let dist = Math.sqrt((x - b.x)**2 + (y - b.y)**2);
                
                if (dist < b.radius) {
                    hitBall = true;

                    if (isGameOver) {
                        // --- 結局：戳破大球 ---
                        createExplosion(x, y, b.color, 100); // 大爆炸
                        createExplosion(x, y, '#FFF', 50);
                        balls = []; // 清空
                        isGameOver = false;
                        document.querySelector('#instruction h3').innerText = "撕下標籤的人 - 最終章";
                        // 0.5秒後重置文字
                        setTimeout(() => {
                            document.querySelector('#instruction p').innerHTML = "1. <b>點擊空白處</b>：生成新的情緒粒子。<br>...";
                        }, 1000);
                    } else {
                        // --- 拖曳模式 ---
                        b.isDragging = true;
                        draggedBall = b;
                    }
                    break; 
                }
            }

            // 2. 如果沒點到球，且不是結束畫面 -> 生成新球
            if (!hitBall && !isGameOver) {
                // 初始大小約 30-50
                let newR = Math.random() * 20 + 30;
                balls.push(new Ball(x, y, newR));
                // 生成特效
                createExplosion(x, y, '#aaa', 5);
            }

            mouseX = x; mouseY = y;
            lastMouseX = x; lastMouseY = y;
        }

        function handleInputMove(x, y) {
            lastMouseX = mouseX;
            lastMouseY = mouseY;
            mouseX = x;
            mouseY = y;
        }

        function handleInputEnd() {
            if (draggedBall) {
                draggedBall.isDragging = false;
                draggedBall = null;
            }
        }

        // 監聽器綁定 (Mouse & Touch)
        window.addEventListener('mousedown', e => handleInputStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleInputMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleInputEnd);

        window.addEventListener('touchstart', e => {
            e.preventDefault();
            handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            handleInputMove(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        window.addEventListener('touchend', handleInputEnd);

        // --- 主迴圈 ---

        function animate() {
            // 清除兩層畫布
            ctxGoo.clearRect(0, 0, width, height);
            ctxParticle.clearRect(0, 0, width, height);

            // 更新與繪製球
            balls.forEach(b => {
                b.update();
                b.draw();
            });

            // 處理融合 (如果不是結束畫面)
            if (!isGameOver) {
                checkCollisions();
                checkEndGame();
            }

            // 更新與繪製粒子 (倒序迴圈以便移除)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

    </script>
</body>
</html>
