<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>憤怒 - 情緒視覺化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        canvas {
            display: block;
            background: linear-gradient(135deg, #0a0505 0%, #1a0808 100%);
        }

        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #662222;
            font-family: 'Microsoft JhengHei', sans-serif;
            font-size: 14px;
            text-align: center;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">點擊齒輪感受憤怒的摩擦</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 設置畫布大小
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // 齒輪參數
        const gears = [
            { x: centerX, y: centerY - 180, radius: 80, teeth: 16, rotation: 0, speed: 0 },
            { x: centerX + 160, y: centerY, radius: 70, teeth: 14, rotation: 0, speed: 0 },
            { x: centerX, y: centerY + 180, radius: 85, teeth: 18, rotation: 0, speed: 0 },
            { x: centerX - 160, y: centerY, radius: 75, teeth: 15, rotation: 0, speed: 0 }
        ];
        
        let isRotating = false;
        let rotationSpeed = 0.02;
        
        // 繪製粗糙質感的心臟
        function drawHeart(x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            
            // 心臟底色 - 暗沉的深紅
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
            gradient.addColorStop(0, '#3a0a0a');
            gradient.addColorStop(0.5, '#2a0505');
            gradient.addColorStop(1, '#1a0303');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(0, size * 0.3);
            ctx.bezierCurveTo(-size * 0.5, -size * 0.3, -size * 0.9, size * 0.1, 0, size * 0.9);
            ctx.bezierCurveTo(size * 0.9, size * 0.1, size * 0.5, -size * 0.3, 0, size * 0.3);
            ctx.fill();
            
            // 添加粗糙質感的線條
            ctx.strokeStyle = '#4a0808';
            ctx.lineWidth = 1;
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const startR = Math.random() * size * 0.3;
                const endR = startR + Math.random() * size * 0.4;
                ctx.beginPath();
                ctx.moveTo(Math.cos(angle) * startR, Math.sin(angle) * startR);
                ctx.lineTo(Math.cos(angle) * endR, Math.sin(angle) * endR);
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        // 繪製鋸齒齒輪（帶毛線質感）
        function drawGear(gear) {
            ctx.save();
            ctx.translate(gear.x, gear.y);
            ctx.rotate(gear.rotation);
            
            const { radius, teeth } = gear;
            const toothHeight = radius * 0.3;
            
            // 繪製齒輪本體 - 深紅帶鏽色
            const gearGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
            gearGradient.addColorStop(0, '#4a1515');
            gearGradient.addColorStop(0.7, '#3a0a0a');
            gearGradient.addColorStop(1, '#2a0505');
            ctx.fillStyle = gearGradient;
            
            ctx.beginPath();
            for (let i = 0; i < teeth; i++) {
                const angle = (i / teeth) * Math.PI * 2;
                const nextAngle = ((i + 1) / teeth) * Math.PI * 2;
                
                // 鋸齒形狀
                const innerX = Math.cos(angle) * radius;
                const innerY = Math.sin(angle) * radius;
                const outerX = Math.cos(angle + 0.5 / teeth * Math.PI * 2) * (radius + toothHeight);
                const outerY = Math.sin(angle + 0.5 / teeth * Math.PI * 2) * (radius + toothHeight);
                const nextInnerX = Math.cos(nextAngle) * radius;
                const nextInnerY = Math.sin(nextAngle) * radius;
                
                if (i === 0) ctx.moveTo(innerX, innerY);
                ctx.lineTo(outerX, outerY);
                ctx.lineTo(nextInnerX, nextInnerY);
            }
            ctx.closePath();
            ctx.fill();
            
            // 粗糙邊緣
            ctx.strokeStyle = '#5a1a1a';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 添加"毛"的質感 - 從齒輪表面長出的線條
            ctx.strokeStyle = '#3a0808';
            ctx.lineWidth = 1;
            for (let i = 0; i < teeth * 8; i++) {
                const angle = (i / (teeth * 8)) * Math.PI * 2;
                const baseR = radius + toothHeight * 0.5;
                const x1 = Math.cos(angle) * baseR;
                const y1 = Math.sin(angle) * baseR;
                const hairLength = 5 + Math.random() * 15;
                const hairAngle = angle + (Math.random() - 0.5) * 0.3;
                const x2 = Math.cos(hairAngle) * (baseR + hairLength);
                const y2 = Math.sin(hairAngle) * (baseR + hairLength);
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            
            // 中心孔洞
            ctx.fillStyle = '#0a0000';
            ctx.beginPath();
            ctx.arc(0, 0, radius * 0.3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        // 繪製連接線（表現擠壓感）
        function drawConnections() {
            ctx.strokeStyle = '#2a0505';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            
            for (let i = 0; i < gears.length; i++) {
                const gear1 = gears[i];
                ctx.beginPath();
                ctx.moveTo(gear1.x, gear1.y);
                ctx.lineTo(centerX, centerY);
                ctx.stroke();
            }
            
            ctx.setLineDash([]);
        }
        
        // 動畫循環
        function animate() {
            // 清空畫布
            ctx.fillStyle = '#0a0505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 繪製連接線
            drawConnections();
            
            // 繪製中心心臟
            drawHeart(centerX, centerY, 50);
            
            // 更新和繪製齒輪
            gears.forEach((gear, index) => {
                if (isRotating) {
                    gear.speed = rotationSpeed * (index % 2 === 0 ? 1 : -1);
                } else {
                    gear.speed *= 0.95; // 緩慢停止
                }
                gear.rotation += gear.speed;
                drawGear(gear);
            });
            
            requestAnimationFrame(animate);
        }
        
        // 點擊事件
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            // 檢查是否點擊在任何齒輪上
            for (let gear of gears) {
                const dx = clickX - gear.x;
                const dy = clickY - gear.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < gear.radius + gear.radius * 0.3) {
                    isRotating = !isRotating;
                    if (isRotating) {
                        rotationSpeed = 0.03;
                    }
                    break;
                }
            }
        });
        
        // 響應式調整
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // 開始動畫
        animate();
    </script>
</body>
</html>
