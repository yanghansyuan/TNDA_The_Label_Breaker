<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>憤怒 - 情緒視覺化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            touch-action: none; /* 防止手機上的拖曳和縮放 */
            -webkit-tap-highlight-color: transparent; /* 移除觸控高亮 */
        }

        canvas {
            display: block;
            background: linear-gradient(135deg, #0a0505 0%, #1a0808 100%);
            width: 100%;
            height: 100%;
        }

        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #662222;
            font-family: 'Microsoft JhengHei', sans-serif;
            font-size: 14px;
            text-align: center;
            opacity: 0.6;
            pointer-events: none;
            padding: 0 20px;
            white-space: nowrap;
        }
        
        @media (max-width: 768px) {
            #info {
                font-size: 12px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">點擊畫面 · 觸發憤怒的心跳與血液噴發</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 響應式參數
        let scale = 1;
        let centerX, centerY, heartSize, gearDistance;
        
        // 岩漿粒子系統
        let lavaParticles = [];
        
        // 初始化畫布和響應式參數
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
            
            // 根據螢幕大小調整比例
            scale = Math.min(canvas.width, canvas.height) / 800;
            heartSize = 90 * scale; // 放大心臟
            gearDistance = 140 * scale; // 縮小距離，幾乎摩擦
            
            // 心臟位置往上移動一些，視覺上更居中
            const heartOffsetY = -15 * scale; // 往上偏移
            
            // 更新齒輪位置（齒輪位置不變）
            gears[0] = { x: centerX, y: centerY - gearDistance, radius: 80 * scale, teeth: 16, rotation: gears[0]?.rotation || 0, speed: gears[0]?.speed || 0 };
            gears[1] = { x: centerX + gearDistance, y: centerY, radius: 70 * scale, teeth: 14, rotation: gears[1]?.rotation || 0, speed: gears[1]?.speed || 0 };
            gears[2] = { x: centerX, y: centerY + gearDistance, radius: 85 * scale, teeth: 18, rotation: gears[2]?.rotation || 0, speed: gears[2]?.speed || 0 };
            gears[3] = { x: centerX - gearDistance, y: centerY, radius: 75 * scale, teeth: 15, rotation: gears[3]?.rotation || 0, speed: gears[3]?.speed || 0 };
            
            // 儲存心臟位置（用於繪製）
            window.heartCenterY = centerY + heartOffsetY;
        }
        
        // 齒輪參數
        const gears = [
            { x: 0, y: 0, radius: 80, teeth: 16, rotation: 0, speed: 0 },
            { x: 0, y: 0, radius: 70, teeth: 14, rotation: 0, speed: 0 },
            { x: 0, y: 0, radius: 85, teeth: 18, rotation: 0, speed: 0 },
            { x: 0, y: 0, radius: 75, teeth: 15, rotation: 0, speed: 0 }
        ];
        
        initCanvas();
        
        let isRotating = true; // 一開始齒輪就在轉
        let rotationSpeed = 0.02 * scale;
        
        // 心臟跳動相關
        let heartBeatScale = 1.0;
        let heartBeatSpeed = 0.015; // 正常跳動速度
        let heartBeatDirection = 1;
        let isAccelerated = false; // 是否處於加速狀態
        let accelerationTimer = 0;
        
        // 岩漿粒子類
        class LavaParticle {
            constructor(x, y, isBloodRed = false) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.life = 1.0;
                this.size = 3 + Math.random() * 5;
                
                // 鮮紅色（血液）或橘紅色（岩漿）
                if (isBloodRed) {
                    this.color = Math.random() > 0.5 ? '#cc0000' : '#ff0000'; // 鮮紅色
                    this.color2 = '#aa0000';
                } else {
                    this.color = Math.random() > 0.5 ? '#ff4500' : '#ff6b1a'; // 橘紅色
                    this.color2 = '#ff8c00';
                }
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.015;
                this.size *= 0.98;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color2);
                gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            isDead() {
                return this.life <= 0;
            }
        }
        
        // 生成岩漿粒子
        function spawnLava() {
            // 正常的橘紅色岩漿
            if (Math.random() < 0.15) {
                const angle = Math.random() * Math.PI * 2;
                const distance = heartSize * heartBeatScale * 0.7;
                const x = centerX + Math.cos(angle) * distance;
                const y = window.heartCenterY + Math.sin(angle) * distance;
                lavaParticles.push(new LavaParticle(x, y, false));
            }
            
            // 點擊時額外生成鮮紅色粒子
            if (isAccelerated && Math.random() < 0.3) {
                const angle = Math.random() * Math.PI * 2;
                const distance = heartSize * heartBeatScale * 0.6;
                const x = centerX + Math.cos(angle) * distance;
                const y = window.heartCenterY + Math.sin(angle) * distance;
                lavaParticles.push(new LavaParticle(x, y, true)); // true = 鮮紅色
            }
        }
        
        // 繪製粗糙質感的心臟（帶跳動效果）
        function drawHeart(x, y, size, scale = 1.0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale); // 應用跳動縮放
            
            // 心臟底色 - 暗沉的深紅
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
            gradient.addColorStop(0, '#3a0a0a');
            gradient.addColorStop(0.5, '#2a0505');
            gradient.addColorStop(1, '#1a0303');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(0, size * 0.3);
            ctx.bezierCurveTo(-size * 0.5, -size * 0.3, -size * 0.9, size * 0.1, 0, size * 0.9);
            ctx.bezierCurveTo(size * 0.9, size * 0.1, size * 0.5, -size * 0.3, 0, size * 0.3);
            ctx.fill();
            
            // 添加粗糙質感的線條
            ctx.strokeStyle = '#4a0808';
            ctx.lineWidth = 1;
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const startR = Math.random() * size * 0.3;
                const endR = startR + Math.random() * size * 0.4;
                ctx.beginPath();
                ctx.moveTo(Math.cos(angle) * startR, Math.sin(angle) * startR);
                ctx.lineTo(Math.cos(angle) * endR, Math.sin(angle) * endR);
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        // 繪製鋸齒齒輪（帶毛線質感）
        function drawGear(gear) {
            ctx.save();
            ctx.translate(gear.x, gear.y);
            ctx.rotate(gear.rotation);
            
            const { radius, teeth } = gear;
            const toothHeight = radius * 0.3;
            
            // 繪製齒輪本體 - 深紅帶鏽色
            const gearGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
            gearGradient.addColorStop(0, '#4a1515');
            gearGradient.addColorStop(0.7, '#3a0a0a');
            gearGradient.addColorStop(1, '#2a0505');
            ctx.fillStyle = gearGradient;
            
            ctx.beginPath();
            for (let i = 0; i < teeth; i++) {
                const angle = (i / teeth) * Math.PI * 2;
                const nextAngle = ((i + 1) / teeth) * Math.PI * 2;
                
                // 鋸齒形狀
                const innerX = Math.cos(angle) * radius;
                const innerY = Math.sin(angle) * radius;
                const outerX = Math.cos(angle + 0.5 / teeth * Math.PI * 2) * (radius + toothHeight);
                const outerY = Math.sin(angle + 0.5 / teeth * Math.PI * 2) * (radius + toothHeight);
                const nextInnerX = Math.cos(nextAngle) * radius;
                const nextInnerY = Math.sin(nextAngle) * radius;
                
                if (i === 0) ctx.moveTo(innerX, innerY);
                ctx.lineTo(outerX, outerY);
                ctx.lineTo(nextInnerX, nextInnerY);
            }
            ctx.closePath();
            ctx.fill();
            
            // 粗糙邊緣
            ctx.strokeStyle = '#5a1a1a';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 添加"毛"的質感 - 從齒輪表面長出的線條
            ctx.strokeStyle = '#3a0808';
            ctx.lineWidth = 1;
            for (let i = 0; i < teeth * 8; i++) {
                const angle = (i / (teeth * 8)) * Math.PI * 2;
                const baseR = radius + toothHeight * 0.5;
                const x1 = Math.cos(angle) * baseR;
                const y1 = Math.sin(angle) * baseR;
                const hairLength = 5 + Math.random() * 15;
                const hairAngle = angle + (Math.random() - 0.5) * 0.3;
                const x2 = Math.cos(hairAngle) * (baseR + hairLength);
                const y2 = Math.sin(hairAngle) * (baseR + hairLength);
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            
            // 中心孔洞
            ctx.fillStyle = '#0a0000';
            ctx.beginPath();
            ctx.arc(0, 0, radius * 0.3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        // 繪製連接線（表現擠壓感）
        function drawConnections() {
            ctx.strokeStyle = '#2a0505';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            
            for (let i = 0; i < gears.length; i++) {
                const gear1 = gears[i];
                ctx.beginPath();
                ctx.moveTo(gear1.x, gear1.y);
                ctx.lineTo(centerX, window.heartCenterY);
                ctx.stroke();
            }
            
            ctx.setLineDash([]);
        }
        
        // 動畫循環
        function animate() {
            // 清空畫布
            ctx.fillStyle = '#0a0505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 更新心臟跳動
            const currentSpeed = isAccelerated ? heartBeatSpeed * 3 : heartBeatSpeed;
            heartBeatScale += heartBeatDirection * currentSpeed;
            
            if (heartBeatScale >= 1.15) {
                heartBeatScale = 1.15;
                heartBeatDirection = -1;
            } else if (heartBeatScale <= 0.85) {
                heartBeatScale = 0.85;
                heartBeatDirection = 1;
            }
            
            // 加速計時器倒數
            if (isAccelerated) {
                accelerationTimer--;
                if (accelerationTimer <= 0) {
                    isAccelerated = false;
                }
            }
            
            // 繪製連接線
            drawConnections();
            
            // 繪製齒輪（在心臟後方）
            gears.forEach((gear, index) => {
                // 齒輪持續旋轉，點擊時減速
                const targetSpeed = isAccelerated ? rotationSpeed * 0.3 : rotationSpeed;
                gear.speed = gear.speed * 0.9 + targetSpeed * 0.1 * (index % 2 === 0 ? 1 : -1);
                gear.rotation += gear.speed;
                drawGear(gear);
            });
            
            // 生成岩漿粒子
            spawnLava();
            
            // 更新和繪製岩漿粒子（在心臟下層）
            lavaParticles = lavaParticles.filter(particle => !particle.isDead());
            lavaParticles.forEach(particle => {
                particle.update();
                particle.draw(ctx);
            });
            
            // 繪製中心心臟（在最上層，帶跳動效果）
            drawHeart(centerX, window.heartCenterY, heartSize, heartBeatScale);
            
            requestAnimationFrame(animate);
        }
        
        // 點擊事件（響應式）- 觸發憤怒爆發
        function handleClick(e) {
            e.preventDefault();
            
            // 觸發心臟加速跳動
            isAccelerated = true;
            accelerationTimer = 120; // 約2秒後恢復正常（60fps）
            
            // 齒輪會變慢（增加摩擦感）但不會停止
        }
        
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', handleClick);
        
        // 響應式調整
        window.addEventListener('resize', () => {
            initCanvas();
        });
        
        // 開始動畫
        animate();
    </script>
</body>
</html>
