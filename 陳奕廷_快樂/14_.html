<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dopamine Liquid Glass - Happy Jitter Edition</title>
    <style>
        :root {
            --sky-top: #87CEEB; 
            --sky-bottom: #E0F7FA;
            --glass-shine: rgba(255, 255, 255, 0.4);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: linear-gradient(135deg, var(--sky-top) 0%, var(--sky-bottom) 100%); }
        body::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(125deg, var(--glass-shine) 0%, transparent 50%, rgba(0,0,0,0.05) 100%); pointer-events: none; z-index: 10; }
        canvas { display: block; z-index: 5; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const PANTONE_COLORS = ['#FFD100', '#FF671F', '#FF808B', '#B4A1D8', '#A5D6A7'];
        let particles = [];
        let backgroundDots = [];
        let isDrawing = false;
        let frameCount = 0;
        let isEliminationMode = false;
        let baseGlobalWidth = 8;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initBackgroundDots();
        }

        function initBackgroundDots() {
            backgroundDots = [];
            for(let i=0; i<30; i++) {
                backgroundDots.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random()-0.5) * 1, vy: (Math.random()-0.5) * 1, size: Math.random() * 2 + 1 });
            }
        }

        window.addEventListener('resize', resize);
        resize();

        class LiquidLine {
            constructor(x, y, color, isSpread = false) {
                const spread = isSpread ? 65 : 0;
                this.x = x + (Math.random() - 0.5) * spread;
                this.y = y + (Math.random() - 0.5) * spread;
                
                this.color = color;
                const speedBase = 2 + Math.random() * 1.5;
                this.vx = (Math.random() - 0.5) * speedBase; 
                this.vy = (Math.random() - 0.5) * speedBase;
                
                this.points = [];
                this.maxLength = 22; 
                this.group = null;
                this.groupAngle = 0;
                this.markForDeletion = false;
                
                // 活潑抖動屬性
                this.jitterSeed = Math.random() * 100; // 每個線條有不同的抖動起點
                this.wobbleSpeed = 0.1 + Math.random() * 0.1;
            }

            updatePhysics(currentGroups) {
                // 隨風飄動感
                const windX = Math.sin(frameCount * 0.008 + this.jitterSeed) * 0.5;
                const windY = Math.cos(frameCount * 0.01 + this.jitterSeed) * 0.5;
                const margin = isEliminationMode ? 60 : 35;

                if (!this.group) {
                    this.x += this.vx + windX;
                    this.y += this.vy + windY;
                    // Q 彈反彈
                    if (this.x < margin || this.x > canvas.width - margin) { this.vx *= -1.02; this.x = Math.max(margin, Math.min(canvas.width-margin, this.x)); }
                    if (this.y < margin || this.y > canvas.height - margin) { this.vy *= -1.02; this.y = Math.max(margin, Math.min(canvas.height-margin, this.y)); }
                    // 速度衰減，維持在 15-20km
                    this.vx *= 0.995; this.vy *= 0.995;
                } else {
                    // --- 消消樂模式物理 ---
                    if (isEliminationMode) {
                        if (currentGroups.length === 2) {
                            let otherGroup = currentGroups.find(g => g.id !== this.group.id);
                            if (otherGroup) {
                                const dx = otherGroup.center.x - this.group.center.x;
                                const dy = otherGroup.center.y - this.group.center.y;
                                const dist = Math.hypot(dx, dy);
                                const pullForce = 0.8; // 增強吸引力
                                this.group.vx += (dx / dist) * pullForce;
                                this.group.vy += (dy / dist) * pullForce;
                                const speed = Math.hypot(this.group.vx, this.group.vy);
                                if (speed > 14) { this.group.vx = (this.group.vx / speed) * 14; this.group.vy = (this.group.vy / speed) * 14; }
                            }
                        } else if (currentGroups.length === 1) {
                            this.markForDeletion = true; // 最後一個自動瓦解
                        }
                    }

                    this.group.center.x += this.group.vx + windX;
                    this.group.center.y += this.group.vy + windY;

                    // Q 彈反彈 (組合)
                    if (this.group.center.x < margin || this.group.center.x > canvas.width - margin) { this.group.vx *= -1.02; this.group.center.x = Math.max(margin, Math.min(canvas.width-margin, this.group.center.x));}
                    if (this.group.center.y < margin || this.group.center.y > canvas.height - margin) { this.group.vy *= -1.02; this.group.center.y = Math.max(margin, Math.min(canvas.height-margin, this.group.center.y));}
                    this.group.vx *= 0.992; this.group.vy *= 0.992;

                    this.x = this.group.center.x;
                    this.y = this.group.center.y;
                }

                this.points.unshift({ x: this.x, y: this.y });
                if (this.points.length > this.maxLength) this.points.pop();
            }

            checkCollision(allParticles) {
                if (this.markForDeletion) return;

                if (!isEliminationMode) {
                    if (!this.group) {
                        // 高效率磁吸 (判定半徑 85)
                        let nearby = allParticles.filter(p => p !== this && !p.group && !p.markForDeletion && Math.hypot(this.x - p.x, this.y - p.y) < 85);
                        if (nearby.length >= 2) {
                            const sharedGroup = {
                                center: { x: this.x, y: this.y },
                                vx: (Math.random() - 0.5) * 4, 
                                vy: (Math.random() - 0.5) * 4,
                                id: Math.random()
                            };
                            this.group = sharedGroup;
                            this.groupAngle = 0;
                            nearby[0].group = sharedGroup;
                            nearby[0].groupAngle = Math.PI / 3; 
                            nearby[1].group = sharedGroup;
                            nearby[1].groupAngle = Math.PI * 2 / 3;
                        }
                    }
                } else if (this.group) {
                    // 高效率消除 (判定半徑 135)
                    for (let other of allParticles) {
                        if (other.group && other.group.id !== this.group.id) {
                            const dist = Math.hypot(this.group.center.x - other.group.center.x, this.group.center.y - other.group.center.y);
                            if (dist < 135) { 
                                this.markGroupDeleted(this.group.id, allParticles);
                                this.markGroupDeleted(other.group.id, allParticles);
                                break;
                            }
                        }
                    }
                }
            }

            markGroupDeleted(id, allParticles) {
                allParticles.forEach(p => {
                    if (p.group && p.group.id === id) p.markForDeletion = true;
                });
            }

            draw() {
                if (this.markForDeletion || this.points.length < 2) return;

                ctx.save();
                ctx.strokeStyle = this.color;
                // 呼吸感厚度：基於時間輕微震盪
                const breathingWidth = baseGlobalWidth + Math.sin(frameCount * 0.1 + this.jitterSeed) * 1.5;
                ctx.lineWidth = Math.max(2, breathingWidth);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 5;
                ctx.shadowOffsetY = 4;

                ctx.beginPath();
                for(let i=0; i<this.points.length; i++) {
                    const p = this.points[i];
                    
                    // --- 核心優化：快樂抖動 (不論是否組合，都在蠕動) ---
                    // 使用正弦波組合創造不規則的蠕動感
                    const jitterX = Math.sin(frameCount * this.wobbleSpeed + i * 0.4 + this.jitterSeed) * 3;
                    const jitterY = Math.cos(frameCount * (this.wobbleSpeed * 1.2) + i * 0.3 + this.jitterSeed) * 3;

                    let drawX, drawY;

                    if (this.group) {
                        // 米字放射結構 (*) + 持續抖動
                        const offset = (i - this.maxLength / 2) * 10; 
                        drawX = p.x + Math.cos(this.groupAngle) * offset + jitterX;
                        drawY = p.y + Math.sin(this.groupAngle) * offset + jitterY;
                    } else {
                        // 單線大波浪 + 持續抖動
                        const wave = Math.sin(frameCount * 0.12 + i * 0.35 + this.jitterSeed) * 12;
                        drawX = p.x + wave + jitterX;
                        drawY = p.y + wave + jitterY;
                    }
                    
                    if (i === 0) ctx.moveTo(drawX, drawY);
                    else ctx.lineTo(drawX, drawY);
                }
                ctx.stroke();

                // 亮面反射
                ctx.strokeStyle = 'rgba(255,255,255,0.45)';
                ctx.lineWidth = Math.max(1, ctx.lineWidth / 2.6);
                ctx.stroke();
                ctx.restore();
            }
        }

        function handleInput(e) {
            if (!isDrawing) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            const throttleRate = isEliminationMode ? 16 : 8;
            if (frameCount % throttleRate === 0) {
                particles.push(new LiquidLine(x, y, PANTONE_COLORS[Math.floor(Math.random() * PANTONE_COLORS.length)], true));
            }
        }

        window.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchstart', (e) => { isDrawing = true; handleInput(e); });
        window.addEventListener('touchend', () => isDrawing = false);
        window.addEventListener('touchmove', handleInput);

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            // 背景白點
            backgroundDots.forEach(dot => {
                dot.x += dot.vx + Math.sin(frameCount * 0.02 + dot.size) * 0.5;
                dot.y += dot.vy;
                if (dot.x < 0) dot.x = canvas.width; if (dot.x > canvas.width) dot.x = 0;
                if (dot.y < 0) dot.y = canvas.height; if (dot.y > canvas.height) dot.y = 0;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.beginPath(); ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2); ctx.fill();
            });

            // 提取組合資訊
            const groupMap = new Map();
            particles.forEach(p => { if(p.group && !p.markForDeletion) groupMap.set(p.group.id, p.group); });
            const currentGroups = Array.from(groupMap.values());
            const currentGroupCount = currentGroups.length;

            // 模式切換 (10個*觸發)
            if (!isEliminationMode && currentGroupCount >= 10) isEliminationMode = true;
            else if (isEliminationMode && currentGroupCount === 0) isEliminationMode = false;

            // 基礎寬度成長
            const targetWidth = 8 + (currentGroupCount * 3.0);
            baseGlobalWidth += (targetWidth - baseGlobalWidth) * 0.12;

            particles.forEach(p => p.updatePhysics(currentGroups));
            particles.forEach(p => p.checkCollision(particles));
            
            particles = particles.filter(p => !p.markForDeletion);
            particles.forEach(p => p.draw());

            if (particles.length > 150) particles.splice(0, particles.length - 150);

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
