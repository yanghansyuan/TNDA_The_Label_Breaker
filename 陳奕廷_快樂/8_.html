<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dopamine Liquid Glass - Precision Edition</title>
    <style>
        :root {
            --sky-top: #87CEEB; 
            --sky-bottom: #E0F7FA;
            --glass-shine: rgba(255, 255, 255, 0.4);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: linear-gradient(135deg, var(--sky-top) 0%, var(--sky-bottom) 100%); }
        body::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(125deg, var(--glass-shine) 0%, transparent 50%, rgba(0,0,0,0.05) 100%); pointer-events: none; z-index: 10; }
        canvas { display: block; z-index: 5; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const PANTONE_COLORS = ['#FFD100', '#FF671F', '#FF808B', '#B4A1D8', '#A5D6A7'];
        let particles = [];
        let backgroundDots = [];
        let isDrawing = false;
        let frameCount = 0;
        let isEliminationMode = false;
        let globalWidth = 8;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initBackgroundDots();
        }

        function initBackgroundDots() {
            backgroundDots = [];
            for(let i=0; i<30; i++) {
                backgroundDots.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random()-0.5) * 1.5, vy: (Math.random()-0.5) * 1.5, size: Math.random() * 2 + 1 });
            }
        }

        window.addEventListener('resize', resize);
        resize();

        class LiquidLine {
            constructor(x, y, color, isSpread = false) {
                // 3. 擴散生成：如果是滑動生成的，給予隨機位移，不黏在滑鼠上
                const spread = isSpread ? 40 : 0;
                this.x = x + (Math.random() - 0.5) * spread;
                this.y = y + (Math.random() - 0.5) * spread;
                
                this.color = color;
                this.vx = (Math.random() - 0.5) * 5; // 速度保持 30km 感
                this.vy = (Math.random() - 0.5) * 5;
                this.points = [];
                this.maxLength = 22; 
                this.group = null;
                this.groupAngle = 0;
                this.markForDeletion = false;
                this.radius = 45; // 用於碰撞判定的虛擬半徑
            }

            updatePhysics() {
                const windX = Math.sin(frameCount * 0.01) * 0.7;
                const windY = Math.cos(frameCount * 0.012) * 0.7;

                if (!this.group) {
                    this.x += this.vx + windX;
                    this.y += this.vy + windY;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                } else {
                    this.group.center.x += this.group.vx + windX;
                    this.group.center.y += this.group.vy + windY;
                    if (this.group.center.x < 0 || this.group.center.x > canvas.width) this.group.vx *= -1;
                    if (this.group.center.y < 0 || this.group.center.y > canvas.height) this.group.vy *= -1;
                    this.x = this.group.center.x;
                    this.y = this.group.center.y;
                }

                this.points.unshift({ x: this.x, y: this.y });
                if (this.points.length > this.maxLength) this.points.pop();
            }

            checkCollision(allParticles) {
                if (this.markForDeletion) return;

                if (!isEliminationMode) {
                    if (!this.group) {
                        let nearby = allParticles.filter(p => p !== this && !p.group && !p.markForDeletion && Math.hypot(this.x - p.x, this.y - p.y) < 60);
                        if (nearby.length >= 2) {
                            const sharedGroup = {
                                center: { x: this.x, y: this.y },
                                vx: (Math.random() - 0.5) * 6,
                                vy: (Math.random() - 0.5) * 6,
                                id: Math.random()
                            };
                            this.group = sharedGroup;
                            this.groupAngle = 0;
                            nearby[0].group = sharedGroup;
                            nearby[0].groupAngle = Math.PI / 3; 
                            nearby[1].group = sharedGroup;
                            nearby[1].groupAngle = Math.PI * 2 / 3;
                        }
                    }
                } else if (this.group) {
                    // 1. 消除邏輯優化：擴大偵測範圍，確保「碰到一點點就消除」
                    for (let other of allParticles) {
                        if (other.group && other.group.id !== this.group.id) {
                            // 只要兩組米字球的中心距離小於兩倍的線條延伸長度就消除
                            const dist = Math.hypot(this.group.center.x - other.group.center.x, this.group.center.y - other.group.center.y);
                            if (dist < 85) { // 稍微大於線條長度，確保尖端碰到就消失
                                this.markGroupDeleted(this.group.id, allParticles);
                                this.markGroupDeleted(other.group.id, allParticles);
                                break;
                            }
                        }
                    }
                }
            }

            markGroupDeleted(id, allParticles) {
                allParticles.forEach(p => {
                    if (p.group && p.group.id === id) p.markForDeletion = true;
                });
            }

            draw() {
                if (this.markForDeletion || this.points.length < 2) return;

                ctx.save();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = globalWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetY = 3;

                ctx.beginPath();
                for(let i=0; i<this.points.length; i++) {
                    const p = this.points[i];
                    let drawX, drawY;

                    if (this.group) {
                        // 米字放射結構 (*)
                        const offset = (i - this.maxLength / 2) * 9; 
                        drawX = p.x + Math.cos(this.groupAngle) * offset;
                        drawY = p.y + Math.sin(this.groupAngle) * offset;
                    } else {
                        const wave = Math.sin(frameCount * 0.1 + i * 0.3) * 10;
                        drawX = p.x + wave;
                        drawY = p.y + wave;
                    }
                    
                    if (i === 0) ctx.moveTo(drawX, drawY);
                    else ctx.lineTo(drawX, drawY);
                }
                ctx.stroke();

                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = globalWidth / 2.5;
                ctx.stroke();
                ctx.restore();
            }
        }

        function handleInput(e) {
            if (!isDrawing) return;
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            // 2. 彩蛋觸發後，生成頻率再減半 (1/8 -> 1/16)
            const throttleRate = isEliminationMode ? 16 : 8;
            
            if (frameCount % throttleRate === 0) {
                // 3. 傳入 true 觸發擴散模式
                particles.push(new LiquidLine(x, y, PANTONE_COLORS[Math.floor(Math.random() * PANTONE_COLORS.length)], true));
            }
        }

        window.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchstart', (e) => { isDrawing = true; handleInput(e); });
        window.addEventListener('touchend', () => isDrawing = false);
        window.addEventListener('touchmove', handleInput);

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            backgroundDots.forEach(dot => {
                dot.x += dot.vx + Math.sin(frameCount * 0.02) * 0.5;
                dot.y += dot.vy;
                if (dot.x < 0) dot.x = canvas.width; if (dot.x > canvas.width) dot.x = 0;
                if (dot.y < 0) dot.y = canvas.height; if (dot.y > canvas.height) dot.y = 0;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath(); ctx.arc(dot.x, dot.y, dot.size, 0, Math.PI * 2); ctx.fill();
            });

            const groupIds = new Set();
            particles.forEach(p => { if(p.group && !p.markForDeletion) groupIds.add(p.group.id); });
            const currentGroupCount = groupIds.size;

            if (!isEliminationMode && currentGroupCount >= 15) isEliminationMode = true;
            else if (isEliminationMode && currentGroupCount === 0) isEliminationMode = false;

            // 寬度隨組合數更明顯的成長
            const targetWidth = 8 + (currentGroupCount * 2.2);
            globalWidth += (targetWidth - globalWidth) * 0.1;

            particles.forEach(p => p.updatePhysics());
            particles.forEach(p => p.checkCollision(particles));
            
            particles = particles.filter(p => !p.markForDeletion);
            particles.forEach(p => p.draw());

            if (particles.length > 180) particles.splice(0, particles.length - 180);

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
