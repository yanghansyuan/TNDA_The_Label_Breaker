<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotional Flow - Sadness</title>

<style>
html, body {
    margin: 0; 
    padding: 0;
    height: 100%; 
    overflow: hidden;
    background: radial-gradient(circle at center, #dbe7f3 0%, #1e2a38 100%);
}

.bg-gradient {
    position: fixed; 
    width: 100%; 
    height: 100%; 
    z-index: 0;
    background: linear-gradient(180deg, rgba(219, 231, 243, 0.1) 0%, rgba(15, 23, 42, 0.4) 100%);
}

.stars {
    position: fixed; 
    width: 200%; 
    height: 200%;
    top: -50%; 
    left: -50%; 
    pointer-events: none; 
    z-index: 1;
    transition: transform 0.1s ease-out;
}

.star {
    position: absolute; 
    border-radius: 50%;
    animation: twinkle var(--twinkleSpeed) ease-in-out infinite alternate;
}

@keyframes twinkle {
    from { transform: scale(0.8); opacity: 0.3; }
    to   { transform: scale(1.2); opacity: 0.9; }
}

.bubble {
    position: absolute; bottom: -100px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.6) 0%, 
                rgba(255, 255, 255, 0.05) 30%, 
                rgba(168, 223, 255, 0.2) 60%, 
                rgba(255, 255, 255, 0.3) 100%);
    box-shadow: inset -1px -1px 8px rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(1.5px);
    cursor: pointer;
    animation: floatUp linear forwards;
}

.particle {
    position: absolute; pointer-events: none;
    border-radius: 50%; opacity: 0.8;
    animation: burstOut 0.8s ease-out forwards;
}

@keyframes burstOut {
    to { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
}

@keyframes floatUp {
    from { transform: translateY(0) rotate(0deg); opacity: 0.8; }
    to   { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
}

.glass-layer { 
    position: fixed; width: 100%; height: 100%; 
    z-index: 4; pointer-events: none; 
    backdrop-filter: blur(1px);
}

.phone-line { position: fixed; bottom: 0; width: 100%; z-index: 3; }
.phone-line path { fill: none; stroke: rgba(159, 179, 200, 0.6); stroke-width: 2; }

.content {
    position: relative; z-index: 5; text-align: center;
    padding: 20vh 5vw; color: #5f6c7b; font-family: sans-serif;
    letter-spacing: 2px; pointer-events: none;
}

/* 💧 加強版水滴樣式 */
.drip-drop {
    position: absolute;
    width: 3px; /* 水滴加粗 */
    background: linear-gradient(to bottom, rgba(159, 179, 200, 0.8), rgba(255, 255, 255, 0.4), transparent);
    border-bottom-left-radius: 3px;
    border-bottom-right-radius: 3px;
    transition: height 3s ease-in, opacity 2.5s ease-in;
    pointer-events: none;
    z-index: 4;
}
</style>
</head>

<body>

<div class="bg-gradient"></div>
<div class="stars" id="stars"></div>
<div class="glass-layer" id="glassLayer"></div>

<section class="content">
    <h1>隻身仰望</h1>
    <p style="margin-left: 30px;">盛大結尾之後，只剩下風聲與回憶。</p>
</section>

<svg class="phone-line" viewBox="0 0 1440 200">
    <path id="phonePath"/>
</svg>

<script>
/* ⭐ 滿天繁星 */
const starContainer = document.getElementById("stars");
for(let i=0; i<400; i++){
    let star = document.createElement("div");
    star.className = "star";
    let rand = Math.random();
    let size;

    if (rand > 0.5) {
        size = Math.random() * 3.5 + 2.5; 
        star.style.boxShadow = "0 0 6px rgba(255,255,255,0.6)";
        star.style.background = "#fff";
    } else {
        size = Math.random() * 1.2 + 0.3;
        star.style.background = "rgba(255,255,255,0.5)";
    }

    star.style.width = size + "px";
    star.style.height = size + "px";
    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.setProperty("--twinkleSpeed", (Math.random() * 4 + 2) + "s");
    starContainer.appendChild(star);
}

/* ⭐ 星空視差 */
document.addEventListener("mousemove",(e)=>{
    let x = (e.clientX / window.innerWidth - 0.5) * 20;
    let y = (e.clientY / window.innerHeight - 0.5) * 20;
    starContainer.style.transform = `translate(${x}px, ${y}px)`;
});

/* 🫧 泡泡破裂 */
function createBurst(x, y, colorHue) {
    for (let i = 0; i < 12; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const pSize = Math.random() * 3 + 1;
        p.style.width = pSize + "px";
        p.style.height = pSize + "px";
        p.style.left = x + "px";
        p.style.top = y + "px";
        p.style.background = `hsl(${colorHue}, 60%, 75%)`;
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 80 + 30;
        p.style.setProperty("--mx", Math.cos(angle) * dist + "px");
        p.style.setProperty("--my", Math.sin(angle) * dist + "px");
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}

function createBubble(){
    let bubble = document.createElement("div");
    bubble.className = "bubble";
    let size = Math.random() * 40 + 20;
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";
    bubble.style.left = Math.random() * 100 + "vw";
    bubble.style.animationDuration = (Math.random() * 8 + 12) + "s";
    let hue = Math.floor(Math.random() * 360);
    bubble.style.filter = `hue-rotate(${hue}px)`;
    bubble.addEventListener("click", (e) => {
        createBurst(e.clientX, e.clientY, hue);
        bubble.remove();
    });
    document.body.appendChild(bubble);
    setTimeout(() => bubble.remove(), 20000);
}
setInterval(createBubble, 1800);

/* 💎 裂痕與💧水滴強化 */
const glassLayer = document.getElementById("glassLayer");
document.addEventListener("click", (e) => {
    if(e.target.classList.contains('bubble')) return;

    let svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("width","240"); svg.setAttribute("height","240");
    svg.style.position="absolute";
    svg.style.left=(e.clientX-120)+"px"; svg.style.top=(e.clientY-120)+"px";
    svg.style.opacity="1"; svg.style.transition="opacity 3s ease";
    svg.style.pointerEvents="none";

    let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    let filter = document.createElementNS("http://www.w3.org/2000/svg", "filter");
    filter.setAttribute("id", "blurFilter");
    let feGaussianBlur = document.createElementNS("http://www.w3.org/2000/svg", "feGaussianBlur");
    feGaussianBlur.setAttribute("stdDeviation", "0.7");
    filter.appendChild(feGaussianBlur);
    defs.appendChild(filter);
    svg.appendChild(defs);

    let distFromCenter = Math.sqrt(Math.pow(e.clientX - window.innerWidth/2, 2) + Math.pow(e.clientY - window.innerHeight/2, 2));
    let lineColor = (distFromCenter < 300) ? "rgba(70, 90, 110, 0.8)" : "rgba(219, 231, 243, 0.8)";

    for(let i=0;i<8;i++){
        let line=document.createElementNS("http://www.w3.org/2000/svg","line");
        let angle=Math.random()*Math.PI*2;
        let length=Math.random()*90 + 30;
        line.setAttribute("x1",120); line.setAttribute("y1",120);
        line.setAttribute("x2",120+Math.cos(angle)*length);
        line.setAttribute("y2",120+Math.sin(angle)*length);
        line.setAttribute("stroke", lineColor);
        line.setAttribute("stroke-width","1.4");
        line.setAttribute("filter", "url(#blurFilter)");
        svg.appendChild(line);
    }
    glassLayer.appendChild(svg);

    // 💧 強化版水滴 (淚滴)
    let drip = document.createElement("div");
    drip.className = "drip-drop";
    drip.style.left = e.clientX + "px";
    drip.style.top = e.clientY + "px";
    drip.style.height = "0px";
    glassLayer.appendChild(drip);
    
    setTimeout(() => { 
        drip.style.height = (Math.random() * 100 + 100) + "px"; 
        drip.style.opacity = "0"; 
    }, 50);
    setTimeout(() => drip.remove(), 3100);

    // 裂痕消失邏輯
    setTimeout(() => {
        if (Math.random() < 0.3) { 
            svg.style.opacity = "0.25"; 
        } else { 
            svg.style.opacity = "0"; 
            setTimeout(() => svg.remove(), 3000); 
        }
    }, 3000);
});

/* ☎ 電話線 (牽引效果強化) */
const path = document.getElementById("phonePath");
let t = 0;
let mouseY = 100;
let currentAttract = 0;

document.addEventListener("mousemove",(e)=>{
    mouseY = e.clientY; // 捕獲滑鼠Y軸
});

function animateLine(){
    t += 0.02;

    // 滑鼠牽引權重調回 0.1
    let targetAttract = (mouseY - window.innerHeight/2) * 0.1;
    currentAttract += (targetAttract - currentAttract) * 0.05;

    let d = `
    M0 100
    C 300 ${100+Math.sin(t)*40 + currentAttract},
      600 ${100+Math.sin(t+1)*60 + currentAttract},
      900 ${100+Math.sin(t+2)*40 + currentAttract}
    S 1200 ${100+Math.sin(t+3)*60 + currentAttract},
      1440 ${100+Math.sin(t+4)*40 + currentAttract}
    `;

    path.setAttribute("d", d);
    requestAnimationFrame(animateLine);
}
animateLine();
</script>
</body>
</html>
