<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotional Flow</title>
<link rel="stylesheet" href="style.css">
<script>  
        document.addEventListener("click", function(e) {
    const ripple = document.createElement("div");
    ripple.className = "ripple";
    ripple.style.left = e.pageX + "px";
    ripple.style.top = e.pageY + "px";
    document.body.appendChild(ripple);

    setTimeout(() => {
        ripple.remove();
    }, 1000);
});
    </script>
    
    <style>
  body {
    margin: 0;
    font-family: "Noto Sans TC", sans-serif;
    background: linear-gradient(180deg, #dbe7f3, #f2f4f7);
    overflow-x: hidden;
}

.content {
    text-align: center;
    padding: 10vh 5vw;
    color: #5f6c7b;
}

h1 {
    font-weight: 300;
    letter-spacing: 2px;
}

.emotion-btn {
    padding: 12px 28px;
    border: 1px solid #9fb3c8;
    background: transparent;
    color: #5f6c7b;
    cursor: pointer;
    transition: all 0.6s ease;
}

.emotion-btn:hover {
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 25px rgba(100,120,150,0.2);
}

.image-container {
    margin-top: 40px;
    overflow: hidden;
}

.image-container img {
    width: 100%;
    max-width: 500px;
    transition: transform 1.2s ease, box-shadow 1.2s ease;
    filter: grayscale(40%);
}

.image-container img:hover {
    transform: scale(1.08);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

/* 流動波浪背景 */
.background-waves {
    position: fixed;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.3), transparent 40%);
    animation: waveMove 20s linear infinite;
}

@keyframes waveMove {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* 響應式 */
@media (max-width: 768px) {
    h1 {
        font-size: 24px;
    }
}

.ripple {
    position: absolute;
    width: 20px;
    height: 20px;
    background: rgba(160,180,210,0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: rippleEffect 1s ease-out;
}

@keyframes rippleEffect {
    from {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(12);
    }
}
    </style>
</head>

<body>    
  <div class="background-waves"></div>

<section class="content">
    <h1>月光下的公園</h1>
    <p>盛大結尾之後，只剩下風聲與回憶。</p>

    <button class="emotion-btn">觸碰情緒</button>

    <div class="image-container">
        <img src="https://picsum.photos/500/300?grayscale" alt="memory">
    </div>
</section>


</body>
</html>
