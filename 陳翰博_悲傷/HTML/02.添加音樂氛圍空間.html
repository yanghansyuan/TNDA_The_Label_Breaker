<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>散去後的悲傷</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #888;
            font-family: "Noto Serif TC", serif;
            cursor: crosshair;
        }

        #ui-overlay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            pointer-events: none;
            z-index: 10;
            transition: opacity 1s;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.5rem;
            margin: 0;
            opacity: 0.7;
        }

        p {
            font-size: 0.8rem;
            margin-top: 10px;
            opacity: 0.5;
        }

        .instruction {
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 25px;
            border-radius: 30px;
            margin-top: 30px;
            font-size: 0.9rem;
            letter-spacing: 0.1rem;
            transition: all 0.3s;
        }

        #start-screen:hover .instruction {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="start-screen" onclick="startExperience()">
        <h1>散去後的悲傷</h1>
        <div class="instruction">點擊進入寧靜的空間</div>
    </div>

    <div id="ui-overlay">
        <h1>散去後的悲傷</h1>
        <p>移動滑鼠，聽見那些抓不住的過往</p>
    </div>

    <script>
        let particles = [];
        const MAX_PARTICLES = 180;
        
        // 原生 Web Audio API 變數
        let audioCtx;
        let masterGain, masterFilter;
        let subOsc, subGain;
        let leadOsc, leadGain;
        let audioInitialized = false;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            
            // 初始化部分靜態粒子
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function initNativeAudio() {
            // 建立音訊上下文
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. 主控制節點 (Master)
            masterFilter = audioCtx.createBiquadFilter();
            masterFilter.type = 'lowpass';
            masterFilter.frequency.setValueAtTime(400, audioCtx.currentTime);
            masterFilter.Q.setValueAtTime(1, audioCtx.currentTime);

            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0, audioCtx.currentTime);

            // 連結至輸出
            masterFilter.connect(masterGain);
            masterGain.connect(audioCtx.destination);

            // 2. Sub Bass (深沉低音)
            subOsc = audioCtx.createOscillator();
            subGain = audioCtx.createGain();
            subOsc.type = 'sine';
            subOsc.frequency.setValueAtTime(55, audioCtx.currentTime); // A1
            subGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            
            subOsc.connect(subGain);
            subGain.connect(masterFilter);
            subOsc.start();

            // 3. Lead Synth (滑鼠互動音)
            leadOsc = audioCtx.createOscillator();
            leadGain = audioCtx.createGain();
            leadOsc.type = 'sine';
            leadOsc.frequency.setValueAtTime(440, audioCtx.currentTime);
            leadGain.gain.setValueAtTime(0, audioCtx.currentTime);
            
            leadOsc.connect(leadGain);
            leadGain.connect(masterFilter);
            leadOsc.start();
        }

        function startExperience() {
            if (!audioInitialized) {
                initNativeAudio();
                
                // 平滑開啟主音量
                masterGain.gain.exponentialRampToValueAtTime(0.8, audioCtx.currentTime + 2);
                
                document.getElementById('start-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('start-screen').style.display = 'none';
                }, 1200);
                audioInitialized = true;
            }
        }

        function draw() {
            background(10, 10, 10, 25);

            if (audioInitialized) {
                updateAudioContext();
            }

            // 滑鼠互動邏輯
            if (mouseX > 0 && mouseY > 0 && (pmouseX !== mouseX || pmouseY !== mouseY)) {
                particles.push(new Particle(mouseX, mouseY));
                
                if (audioInitialized) {
                    // 根據 Y 軸調整音高
                    let freq = map(mouseY, height, 0, 150, 600);
                    leadOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
                    
                    // 根據移動速度調整音量
                    let speed = dist(mouseX, mouseY, pmouseX, pmouseY);
                    let vol = constrain(map(speed, 0, 100, 0, 0.2), 0, 0.25);
                    leadGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
                }
            } else if (audioInitialized) {
                // 滑鼠停止時聲音慢慢隱去
                leadGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.4);
            }

            // 粒子更新與繪製
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].display();
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }

            if (particles.length > MAX_PARTICLES) {
                particles.shift();
            }
        }

        function updateAudioContext() {
            // 濾波器頻率隨粒子數量動態變化 (粒子越多越明亮)
            let cutoff = map(particles.length, 0, MAX_PARTICLES, 300, 2500);
            masterFilter.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.2);
            
            // Sub Bass 呼吸感 (使用 LFO 模擬)
            let lfo = sin(frameCount * 0.03) * 0.02 + 0.08;
            subGain.gain.setTargetAtTime(lfo, audioCtx.currentTime, 0.1);
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = createVector(random(-0.4, 0.4), random(-0.7, 0.1));
                this.acc = createVector(0, 0);
                this.lifespan = 255;
                this.size = random(1.5, 5);
                this.noiseOffset = random(2000);
                this.colorVal = random(160, 220);
            }

            update() {
                // 模擬氣流
                let n = noise(this.noiseOffset, frameCount * 0.008);
                this.acc.x = map(n, 0, 1, -0.02, 0.02);
                
                this.vel.add(this.acc);
                this.pos.add(this.vel);
                
                this.lifespan -= 1.1;
                this.size *= 0.997;
                this.noiseOffset += 0.01;
            }

            display() {
                // 核心粒子
                fill(this.colorVal, this.colorVal + 5, this.colorVal + 15, this.lifespan);
                ellipse(this.pos.x, this.pos.y, this.size);
                
                // 邊緣暈染感 (CSS-like glow)
                if (this.lifespan > 180) {
                    fill(255, 255, 255, this.lifespan * 0.08);
                    ellipse(this.pos.x, this.pos.y, this.size * 2.5);
                }
            }

            isDead() {
                return this.lifespan < 0;
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
