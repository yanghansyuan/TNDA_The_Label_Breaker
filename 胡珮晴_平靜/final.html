<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平靜：傍晚窗台</title>
    <style>
        :root {
            --sunset-orange: #ff9d6c; 
            --sunset-glow: #ffd2a0;
            --rust-color: #5d4037;
            --leaf-green: #7db37d;
            --shadow-color: rgba(62, 39, 35, 0.4);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--sunset-orange);
            overflow: hidden;
        }

        .canvas {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 80% 20%, var(--sunset-glow) 0%, var(--sunset-orange) 80%);
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
        }

        /* 傍晚斜射光影 */
        .window-shadow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent 40%, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.1) 100%);
            pointer-events: none;
        }

        /* 生鏽窗台 */
        .windowsill {
            position: relative; width: 100%; height: 160px;
            background: linear-gradient(to bottom, #8d6e63, var(--rust-color));
            border-top: 4px solid #3e2723;
            z-index: 10;
        }

        /* 盆栽與它的長影子 */
        .plant-group {
            position: absolute; bottom: 160px; left: 40%; z-index: 20;
        }

        /* 長影子：使用傾斜與模糊 */
        .plant-shadow {
            position: absolute; bottom: 0; left: 20px;
            width: 60px; height: 30px;
            background: var(--shadow-color);
            filter: blur(8px);
            transform: skewX(-60deg) scaleY(4); /* 傍晚的長投影 */
            transform-origin: bottom left;
            z-index: 11;
        }

        .pot {
            width: 60px; height: 50px; background: #a1887f;
            clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 20% 100%);
            position: relative; z-index: 21;
        }

        .leaves {
            display: flex; justify-content: center; align-items: flex-end;
            margin-bottom: -5px; position: relative; z-index: 22;
        }

        .leaf {
            width: 20px; height: 35px; background: var(--leaf-green);
            border-radius: 50% 50% 10% 10%; margin: 0 -3px;
            animation: sway 5s infinite alternate ease-in-out;
        }

        @keyframes sway {
            from { transform: rotate(-2deg); }
            to { transform: rotate(4deg); }
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="window-shadow"></div>
        <div class="plant-group">
            <div class="plant-shadow"></div>
            <div class="leaves">
                <div class="leaf" style="height:30px;"></div>
                <div class="leaf" style="height:45px; animation-delay: 1s;"></div>
                <div class="leaf" style="height:35px; animation-delay: 2s;"></div>
            </div>
            <div class="pot"></div>
        </div>
        <div class="windowsill"></div>
    </div>
</body>
</html>
