<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒互動：怪誕生鐵幾何</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #C8C9C7; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
    const { Engine, Render, Runner, Bodies, Composite, Vector, Body } = Matter;

    const colors = {
        background: '#C8C9C7', // Pantone Cool Gray 3 C
        main: '#1D2327',       // Pantone 433 C
        accent: '#591014'      // Pantone 1817 C
    };

    const engine = Engine.create();
    engine.world.gravity.y = 1.6;

    const canvas = document.createElement('canvas');
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    let width, height, ground, wallLeft, wallRight;
    const ironStones = [];
    const shockwaves = [];

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        if (ground) Composite.remove(engine.world, [ground, wallLeft, wallRight]);
        ground = Bodies.rectangle(width / 2, height + 50, width, 100, { isStatic: true });
        wallLeft = Bodies.rectangle(-50, height / 2, 100, height * 2, { isStatic: true });
        wallRight = Bodies.rectangle(width + 50, height / 2, 100, height * 2, { isStatic: true });
        Composite.add(engine.world, [ground, wallLeft, wallRight]);
    }
    window.addEventListener('resize', resize);
    resize();

    function createIronStone(x, y) {
        const radius = Math.random() * 30 + 25;
        const sides = 16;
        const body = Bodies.polygon(x, y, sides, radius, {
            density: 0.3,
            friction: 0.9,
            restitution: 0.01,
            render: { visible: false }
        });

        const stone = {
            body: body,
            radius: radius,
            offsets: Array.from({ length: sides }, () => Math.random() * 6),
            alpha: 0.5 + Math.random() * 0.5, // 生鐵深淺調整
            crumbleTimer: 0,
            vibration: 0
        };

        ironStones.push(stone);
        Composite.add(engine.world, body);
    }

    // 滑鼠點擊觸發：主震 + 非線性餘震
    window.addEventListener('mousedown', (e) => {
        const pos = { x: e.clientX, y: e.clientY };

        // 主震
        shockwaves.push({ x: pos.x, y: pos.y, r: 0, maxR: 500, speed: 12, opacity: 0.9, weight: 8 });
        
        // 餘震 (非等距、非線性延遲)
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                shockwaves.push({
                    x: pos.x,
                    y: pos.y,
                    r: 0,
                    maxR: 300 + Math.random() * 250,
                    speed: 4 + Math.random() * 10,
                    opacity: 0.6,
                    weight: Math.random() * 4 + 1
                });
            }, Math.random() * 800);
        }

        ironStones.forEach(s => {
            const dist = Vector.magnitude(Vector.sub(s.body.position, pos));
            if (dist < 400) {
                s.vibration = 18;
                s.crumbleTimer = 10000; // 邊緣崩裂持續 10 秒
                const force = Vector.mult(Vector.normalise(Vector.sub(s.body.position, pos)), 0.12);
                Body.applyForce(s.body, s.body.position, force);
            }
        });
    });

    setInterval(() => {
        if (ironStones.length < 130) createIronStone(Math.random() * width, -100);
    }, 1400);

    let lastTime = 0;
    (function render(time) {
        const deltaTime = time - lastTime;
        lastTime = time;

        ctx.fillStyle = colors.background;
        ctx.fillRect(0, 0, width, height);

        Engine.update(engine);

        // 渲染震盪波漣漪
        for (let i = shockwaves.length - 1; i >= 0; i--) {
            const sw = shockwaves[i];
            sw.r += sw.speed;
            sw.opacity -= 0.015;
            ctx.beginPath();
            ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(89, 16, 20, ${sw.opacity})`; // 使用 Pantone 1817 C 增加血絲感
            ctx.lineWidth = sw.weight;
            ctx.stroke();
            if (sw.opacity <= 0) shockwaves.splice(i, 1);
        }

        // 渲染生鐵石與幾何開孔
        ironStones.forEach(s => {
            const { position, angle } = s.body;
            ctx.save();
            ctx.translate(position.x, position.y);
            
            // 處理震動
            if (s.vibration > 0) {
                ctx.translate((Math.random()-0.5)*s.vibration, (Math.random()-0.5)*s.vibration);
                s.vibration *= 0.85;
            }
            
            ctx.rotate(angle);

            if (s.crumbleTimer > 0) s.crumbleTimer -= deltaTime;
            const isCrumbling = s.crumbleTimer > 0;

            // 1. 繪製生鐵石本體
            ctx.beginPath();
            const sides = s.offsets.length;
            for (let i = 0; i < sides; i++) {
                const ang = (i / sides) * Math.PI * 2;
                // 崩裂時邊緣產生劇烈燥點
                const crumbleEffect = isCrumbling ? (Math.random() * 15 * (s.crumbleTimer / 10000)) : 0;
                const r = s.radius + s.offsets[i] + crumbleEffect;
                const x = Math.cos(ang) * r;
                const y = Math.sin(ang) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = `rgba(29, 35, 39, ${s.alpha})`;
            ctx.fill();

            // 崩裂時的視覺提示 (邊緣微弱泛紅)
            if (isCrumbling) {
                ctx.strokeStyle = `rgba(89, 16, 20, ${s.crumbleTimer / 10000})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // 2. 繪製「開孔」表情 - 使用背景色進行覆蓋
            ctx.fillStyle = colors.background;

            // 兩顆圓形眼洞
            const eyeSize = s.radius * 0.18;
            const eyeY = -s.radius * 0.25;
            const eyeX = s.radius * 0.35;
            
            ctx.beginPath();
            ctx.arc(-eyeX, eyeY, eyeSize, 0, Math.PI * 2); // 左眼
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, eyeSize, 0, Math.PI * 2);  // 右眼
            ctx.fill();

            // 一條粗橫線口洞
            const mouthW = s.radius * 1.1;
            const mouthH = s.radius * 0.15;
            const mouthY = s.radius * 0.3;
            ctx.fillRect(-mouthW / 2, mouthY, mouthW, mouthH);
            
            ctx.restore();
        });

        requestAnimationFrame(render);
    })(0);
</script>

</body>
</html>
