<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒互動：窒息的生鐵牆</title>
    <style>
        body { margin: 0; overflow: hidden; transition: background-color 0.5s ease; background-color: #C8C9C7; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
    const { Engine, Render, Runner, Bodies, Composite, Vector, Body } = Matter;

    const colors = {
        bgNormal: '#C8C9C7', // Pantone Cool Gray 3 C
        bgSuffocate: '#919294', // 更深、更沈重的灰色
        main: '#1D2327',       // Pantone 433 C
        accent: '#591014'      // Pantone 1817 C
    };

    const engine = Engine.create();
    // 增加重力感，使其迅速下墜
    engine.world.gravity.y = 3.0; 

    const canvas = document.createElement('canvas');
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    let width, height, ground, wallLeft, wallRight;
    const ironStones = [];
    const shockwaves = [];
    let currentBgColor = colors.bgNormal;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        if (ground) Composite.remove(engine.world, [ground, wallLeft, wallRight]);
        ground = Bodies.rectangle(width / 2, height + 60, width, 120, { isStatic: true });
        wallLeft = Bodies.rectangle(-60, height / 2, 120, height * 2.5, { isStatic: true });
        wallRight = Bodies.rectangle(width + 60, height / 2, 120, height * 2.5, { isStatic: true });
        Composite.add(engine.world, [ground, wallLeft, wallRight]);
    }
    window.addEventListener('resize', resize);
    resize();

    function createIronStone(x, y) {
        const radius = Math.random() * 25 + 25;
        const sides = 15;
        const body = Bodies.polygon(x, y, sides, radius, {
            density: 0.5,
            friction: 0.95,
            restitution: 0.01,
            frictionAir: 0.005, // 減少空氣阻力，下墜更快
            render: { visible: false }
        });

        const stone = {
            body: body,
            radius: radius,
            offsets: Array.from({ length: sides }, () => Math.random() * 7),
            alpha: 0.5 + Math.random() * 0.5,
            mouthType: Math.random() > 0.5 ? 'line' : 'invertedV', // 隨機混合口型
            crumbleTimer: 0,
            vibration: 0
        };

        ironStones.push(stone);
        Composite.add(engine.world, body);
    }

    window.addEventListener('mousedown', (e) => {
        const pos = { x: e.clientX, y: e.clientY };
        shockwaves.push({ x: pos.x, y: pos.y, r: 0, maxR: 600, speed: 15, opacity: 0.9, weight: 10 });
        
        for (let i = 0; i < 4; i++) {
            setTimeout(() => {
                shockwaves.push({
                    x: pos.x, y: pos.y, r: 0,
                    maxR: 350 + Math.random() * 300,
                    speed: 6 + Math.random() * 12,
                    opacity: 0.6,
                    weight: Math.random() * 5 + 2
                });
            }, Math.random() * 700);
        }

        ironStones.forEach(s => {
            const dist = Vector.magnitude(Vector.sub(s.body.position, pos));
            if (dist < 450) {
                s.vibration = 25;
                s.crumbleTimer = 10000;
                const force = Vector.mult(Vector.normalise(Vector.sub(s.body.position, pos)), 0.2);
                Body.applyForce(s.body, s.body.position, force);
            }
        });
    });

    setInterval(() => {
        if (ironStones.length < 150) createIronStone(Math.random() * width, -200);
    }, 1200);

    // 顏色過渡函數
    function lerpColor(a, b, amount) {
        const ah = parseInt(a.replace(/#/g, ''), 16),
              bh = parseInt(b.replace(/#/g, ''), 16),
              ar = ah >> 16, ag = ah >> 8 & 0xff, ab = ah & 0xff,
              br = bh >> 16, bg = bh >> 8 & 0xff, bb = bh & 0xff,
              rr = ar + amount * (br - ar),
              rg = ag + amount * (bg - ag),
              rb = ab + amount * (bb - ab);
        return '#' + ((1 << 24) + (rr << 16) + (rg << 8) + rb | 0).toString(16).slice(1);
    }

    let lastTime = 0;
    (function render(time) {
        const deltaTime = time - lastTime;
        lastTime = time;

        // 計算目前堆疊最高點，用於背景變色
        let highestPoint = height;
        ironStones.forEach(s => {
            if (s.body.position.y < highestPoint) highestPoint = s.body.position.y;
        });
        
        // 當高度接近 1/2 螢幕時開始變色
        const stackRatio = Math.max(0, Math.min(1, (height - highestPoint) / (height * 0.7)));
        currentBgColor = lerpColor(colors.bgNormal, colors.bgSuffocate, stackRatio);
        
        ctx.fillStyle = currentBgColor;
        ctx.fillRect(0, 0, width, height);

        Engine.update(engine);

        // 渲染漣漪
        for (let i = shockwaves.length - 1; i >= 0; i--) {
            const sw = shockwaves[i];
            sw.r += sw.speed;
            sw.opacity -= 0.015;
            ctx.beginPath();
            ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(89, 16, 20, ${sw.opacity})`; 
            ctx.lineWidth = sw.weight;
            ctx.stroke();
            if (sw.opacity <= 0) shockwaves.splice(i, 1);
        }

        // 渲染生鐵石
        ironStones.forEach(s => {
            const { position, angle } = s.body;
            ctx.save();
            ctx.translate(position.x, position.y);
            
            if (s.vibration > 0) {
                ctx.translate((Math.random()-0.5)*s.vibration, (Math.random()-0.5)*s.vibration);
                s.vibration *= 0.8;
            }
            
            ctx.rotate(angle);

            if (s.crumbleTimer > 0) s.crumbleTimer -= deltaTime;
            const isCrumbling = s.crumbleTimer > 0;

            // 1. 繪製生鐵石本體
            ctx.beginPath();
            const sides = s.offsets.length;
            for (let i = 0; i < sides; i++) {
                const ang = (i / sides) * Math.PI * 2;
                const crumbleEffect = isCrumbling ? (Math.random() * 18 * (s.crumbleTimer / 10000)) : 0;
                const r = s.radius + s.offsets[i] + crumbleEffect;
                const x = Math.cos(ang) * r;
                const y = Math.sin(ang) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = `rgba(29, 35, 39, ${s.alpha})`;
            ctx.fill();

            // 2. 繪製「開孔」表情 (使用目前的背景色覆蓋)
            ctx.fillStyle = currentBgColor;

            // 兩顆眼洞
            const eyeSize = s.radius * 0.16;
            const eyeY = -s.radius * 0.28;
            const eyeX = s.radius * 0.38;
            ctx.beginPath();
            ctx.arc(-eyeX, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            // 口部開孔
            if (s.mouthType === 'line') {
                const mouthW = s.radius * 1.0;
                const mouthH = s.radius * 0.18;
                const mouthY = s.radius * 0.25;
                ctx.fillRect(-mouthW / 2, mouthY, mouthW, mouthH);
            } else {
                // 倒 V 型 (ʌ)
                const vWidth = s.radius * 0.8;
                const vHeight = s.radius * 0.4;
                const vY = s.radius * 0.45;
                ctx.beginPath();
                ctx.moveTo(-vWidth / 2, vY);
                ctx.lineTo(0, vY - vHeight);
                ctx.lineTo(vWidth / 2, vY);
                ctx.lineWidth = s.radius * 0.2;
                ctx.strokeStyle = currentBgColor;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            }
            
            ctx.restore();
        });

        requestAnimationFrame(render);
    })(0);
</script>

</body>
</html>
