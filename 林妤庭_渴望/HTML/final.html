<!DOCTYPE html>
<html lang="zh-Hant">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>心靈角落 - 新台式美學日記彈珠台</title>
   <style>
       :root {
           --neon-pink: #ff007f;
           --neon-green: #39ff14;
           --neon-blue: #00f3ff;
           --leather-dark: #2a1b15;
           --paper-white: #fffdf5;
          
           /* 透明材質彈珠顏色 */
           --glass-career: rgba(0, 243, 255, 0.4);
           --glass-love: rgba(255, 0, 127, 0.4);
           --glass-life: rgba(57, 255, 20, 0.4);
           --glass-growth: rgba(255, 215, 0, 0.4);
       }

       * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Noto Sans TC", sans-serif; }

       body {
           background: #111;
           /* 台式復古瓷磚背景 */
           background-image:
               linear-gradient(45deg, #222 25%, transparent 25%),
               linear-gradient(-45deg, #222 25%, transparent 25%),
               linear-gradient(45deg, transparent 75%, #222 75%),
               linear-gradient(-45deg, transparent 75%, #222 75%);
           background-size: 40px 40px;
           color: #fff;
           min-height: 100vh;
           width: 100vw;
           display: flex;
           justify-content: center;
           align-items: center;
           padding: 2vw;
           overflow: hidden;
       }

       /* 拼貼風格容器 */
       .app-shell {
           display: flex;
           width: 95vw;
           height: 90vh;
           max-width: 1200px;
           background: var(--leather-dark);
           border: 5px solid #444;
           border-radius: 12px;
           box-shadow: 0 0 50px rgba(0,0,0,1);
           position: relative;
           flex-direction: row;
           overflow: hidden;
           transition: all 0.3s ease;
       }

       /* 左側：日記拼貼區 */
       .journal-side {
           flex: 1;
           background: var(--paper-white);
           color: #333;
           padding: 2.5vw;
           display: flex;
           flex-direction: column;
           border-right: 10px solid #222;
           position: relative;
           z-index: 2;
           /* 允許內容過多時顯示捲軸 */
           overflow-y: auto;
       }

       /* 客製化捲軸外觀 */
       .journal-side::-webkit-scrollbar {
           width: 8px;
       }
       .journal-side::-webkit-scrollbar-track {
           background: #eee;
       }
       .journal-side::-webkit-scrollbar-thumb {
           background: var(--leather-dark);
           border-radius: 4px;
       }

       .collage-stamp {
           position: absolute;
           top: 15px; right: 15px;
           width: 70px; height: 70px;
           background: var(--neon-pink);
           color: white;
           display: flex; align-items: center; justify-content: center;
           transform: rotate(15deg);
           font-weight: bold; border: 2px dashed white;
           font-size: 0.75rem; pointer-events: none;
           box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
       }

       .diary-area {
           flex: 1;
           margin: 1.5rem 0;
           background: transparent;
           border-top: 1px solid #ddd;
           padding-top: 1rem;
           line-height: 1.8;
           font-size: 1.1rem;
           min-height: 200px; /* 確保至少有輸入空間 */
       }

       textarea {
           width: 100%; height: 100%; border: none; background: transparent;
           resize: none; outline: none; font-family: inherit;
           color: #333;
       }

       .controls {
           display: grid;
           grid-template-columns: 1fr 1fr;
           gap: 12px;
           padding-top: 1rem;
           padding-bottom: 1rem;
       }

       /* 右側：台式彈珠區域 */
       .pinball-side {
           flex: 1.2;
           background: #000;
           position: relative;
           border-left: 2px solid var(--neon-blue);
           display: flex;
           flex-direction: column;
       }

       .neon-tube {
           position: absolute;
           top: 0; bottom: 0; left: 0; width: 4px;
           background: var(--neon-blue);
           box-shadow: 0 0 15px var(--neon-blue);
       }

       .pinball-stage {
           flex: 1;
           width: 100%;
           position: relative;
           overflow: hidden;
       }

       /* 彈珠台底部槽位 */
       .grid-container {
           position: absolute;
           bottom: 0; left: 0; right: 70px;
           height: 120px;
           display: grid;
           grid-template-columns: repeat(5, 1fr);
           gap: 5px;
           padding: 0 10px 10px 10px;
           background: rgba(255,255,255,0.03);
       }

       .grid-cell {
           border: 2px solid #333;
           border-radius: 8px 8px 0 0;
           display: flex;
           align-items: flex-end;
           justify-content: center;
           position: relative;
           background: linear-gradient(to bottom, rgba(50,50,50,0.5), transparent);
       }

       /* 彈珠材質 */
       .marble {
           width: 45px;
           height: 45px;
           border-radius: 50%;
           display: flex;
           align-items: center;
           justify-content: center;
           text-align: center;
           padding: 5px;
           font-size: 10px;
           color: white;
           font-weight: bold;
           cursor: grab;
           position: absolute;
           backdrop-filter: blur(4px);
           border: 1px solid rgba(255,255,255,0.3);
           box-shadow: inset 0 0 12px rgba(255,255,255,0.5);
           transition: transform 0.2s, border 0.3s;
           z-index: 10;
           user-select: none;
       }

       .marble:active { cursor: grabbing; }

       /* 發射動畫軌跡 */
       @keyframes launch {
           0% { transform: translate(0,0) scale(1); }
           5% { transform: translate(0, 30px) scale(0.95); }
           100% { transform: translate(50px, -900px) scale(0.4) rotate(1080deg); opacity: 0; }
       }
       .is-launching { animation: launch 0.9s cubic-bezier(0.15, 0.85, 0.35, 1) forwards; pointer-events: none; }

       /* 拉桿區塊 */
       .launcher {
           position: absolute;
           right: 0; bottom: 0;
           width: 70px; height: 280px;
           background: #1a1a1a;
           display: flex;
           flex-direction: column;
           align-items: center;
           padding-bottom: 30px;
           border-left: 1px solid #333;
       }

       .plunger-rod-container {
           width: 14px; flex: 1;
           background: #444;
           position: relative;
           border-radius: 7px;
           margin-top: 15px;
           box-shadow: inset 2px 0 5px rgba(0,0,0,0.5);
       }

       .plunger-head {
           width: 46px; height: 46px;
           background: radial-gradient(circle at 30% 30%, #ff4d4d, #800000);
           border-radius: 50%;
           position: absolute;
           top: 0; left: -16px;
           cursor: grab;
           box-shadow: 0 6px 15px rgba(0,0,0,0.6);
           z-index: 20;
           touch-action: none;
       }

       /* 收藏與分析 Overlay */
       .overlay {
           position: fixed; top:0; left:0; width:100%; height:100%;
           background: rgba(0,0,0,0.95);
           display: none; z-index: 1000;
           padding: 5vw;
           overflow-y: auto;
       }

       .archive-card {
           background: #fff; color: #333;
           border-radius: 12px; padding: 2.5rem;
           margin: 0 auto 2rem auto;
           max-width: 900px;
       }

       .year-title {
           font-size: 2.5rem; font-weight: 900; color: var(--neon-pink);
           border-bottom: 6px solid var(--neon-pink);
           margin-bottom: 1.5rem;
       }

       .month-title { font-size: 1.3rem; background: #f0f0f0; padding: 6px 18px; display: inline-block; margin-bottom: 1.2rem; border-left: 5px solid #333; }

       .archive-grid {
           display: grid;
           grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
           gap: 20px;
           margin-bottom: 3rem;
       }

       .archive-item {
           border: 1px solid #eee; padding: 20px; border-radius: 8px;
           background: #fafafa; transition: transform 0.2s;
       }
       .archive-item:hover { transform: translateY(-5px); }

       /* 響應式佈局 */
       @media (max-width: 900px) {
           .app-shell { flex-direction: column; height: 95vh; overflow-y: auto; }
           .journal-side { border-right: none; border-bottom: 10px solid #222; flex: none; height: 50%; overflow-y: auto; }
           .pinball-side { flex: none; height: 50%; border-left: none; }
           .launcher { height: 200px; }
       }

       button {
           padding: 12px; border: none; cursor: pointer; font-weight: bold;
           transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
           border-radius: 6px;
       }
       button:active { transform: scale(0.95); }

       .btn-main { background: var(--leather-dark); color: white; }
       .btn-sec { background: var(--neon-blue); color: black; box-shadow: 0 0 10px rgba(0,243,255,0.3); }
       .btn-sec:hover { box-shadow: 0 0 20px rgba(0,243,255,0.6); }
   </style>
</head>
<body>

<div class="app-shell">
   <!-- 左側日記 -->
   <div class="journal-side">
       <div class="collage-stamp">限時保存</div>
       <header>
           <h2 id="currentDate">2024-02-13</h2>
           <p style="color: #666; font-size: 0.9rem; margin-top: 5px;">將渴望化作彈珠，在命運中發射。</p>
       </header>
      
       <div class="diary-area">
           <textarea id="diaryInput" placeholder="在此寫下你的心情、願望或紀錄..."></textarea>
       </div>

       <div class="controls">
           <select id="categoryInput" style="padding:10px; border-radius:6px; border:1px solid #ccc;">
               <option value="career">💼 事業/目標</option>
               <option value="love">💕 情感/連結</option>
               <option value="life">🏠 生活/日常</option>
               <option value="growth">🌱 自我/提升</option>
           </select>
           <button class="btn-main" onclick="storeMarble()">存入彈珠</button>
           <button class="btn-sec" style="grid-column: span 2;" onclick="toggleArchive(true)">查看心靈紀錄庫</button>
       </div>
   </div>

   <!-- 右側彈珠台 -->
   <div class="pinball-side">
       <div class="neon-tube"></div>
       <div class="pinball-stage" id="stage">
           <div style="position:absolute; top:20px; right:85px; writing-mode: vertical-rl; color:rgba(255,255,255,0.15); font-size:2.2rem; font-weight:900; pointer-events:none; letter-spacing: 5px;">台式浪漫</div>
          
           <div class="grid-container" id="slots">
               <div class="grid-cell"></div>
               <div class="grid-cell"></div>
               <div class="grid-cell"></div>
               <div class="grid-cell"></div>
               <div class="grid-cell"></div>
           </div>

           <!-- 拉桿區 -->
           <div class="launcher">
               <div style="color:white; font-size:0.7rem; margin-bottom:8px; opacity:0.7;">PULL & FIRE</div>
               <div class="plunger-rod-container">
                   <div class="plunger-head" id="plunger"></div>
               </div>
           </div>
       </div>
   </div>
</div>

<!-- 收藏頁面 Overlay -->
<div class="overlay" id="archiveOverlay">
   <div style="text-align: right; margin-bottom: 20px; max-width:900px; margin: 0 auto 20px auto;">
       <button onclick="toggleArchive(false)" style="background:var(--neon-pink); color:white; padding:12px 35px; border-radius:30px;">關閉視窗</button>
   </div>
  
   <div class="archive-card">
       <h2 style="margin-bottom:25px; display:flex; align-items:center; gap:10px;">📊 渴望傾向分析</h2>
       <div id="statsDisplay" style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:45px;"></div>
      
       <div id="archiveContent"></div>
   </div>
</div>

<script>
   // 資料初始化
   let marbles = JSON.parse(localStorage.getItem('tw_pinball_v2')) || [];
   const stage = document.getElementById('stage');
   const plunger = document.getElementById('plunger');
   const categoryConfig = {
       career: { color: 'var(--glass-career)', label: '事業' },
       love: { color: 'var(--glass-love)', label: '情感' },
       life: { color: 'var(--glass-life)', label: '生活' },
       growth: { color: 'var(--glass-growth)', label: '成長' }
   };

   let isPlungerDragging = false;
   let power = 0;
   let selectedMarbleId = null;

   window.onload = () => {
       // 設定日期格式為阿拉伯數字
       const d = new Date();
       const year = d.getFullYear();
       const month = String(d.getMonth() + 1).padStart(2, '0');
       const day = String(d.getDate()).padStart(2, '0');
       document.getElementById('currentDate').innerText = `${year}-${month}-${day}`;
      
       renderStage();
       initPlungerInteraction();
      
       // 監聽視窗縮放
       window.addEventListener('resize', renderStage);
   };

   function save() {
       localStorage.setItem('tw_pinball_v2', JSON.stringify(marbles));
   }

   // 存入彈珠邏輯
   function storeMarble() {
       const text = document.getElementById('diaryInput').value.trim();
       const category = document.getElementById('categoryInput').value;
       if (!text) return;

       const newMarble = {
           id: Date.now(),
           text,
           category,
           completed: false,
           timestamp: Date.now(),
           slot: Math.floor(Math.random() * 5)
       };

       marbles.push(newMarble);
       save();
       document.getElementById('diaryInput').value = '';
       renderStage();
   }

   // 渲染彈珠台畫面
   function renderStage() {
       document.querySelectorAll('.marble').forEach(el => el.remove());
      
       const activeMarbles = marbles.filter(m => !m.completed);
       const slotCells = document.querySelectorAll('.grid-cell');
       const stageRect = stage.getBoundingClientRect();

       activeMarbles.forEach(m => {
           const el = document.createElement('div');
           el.className = 'marble';
           el.id = `marble-${m.id}`;
           el.style.backgroundColor = categoryConfig[m.category].color;
           el.innerText = m.text.substring(0, 8);
          
           el.addEventListener('mousedown', (e) => {
               e.stopPropagation();
               selectMarble(m.id);
           });

           const targetSlot = slotCells[m.slot];
           if (targetSlot) {
               const slotRect = targetSlot.getBoundingClientRect();
               el.style.left = (slotRect.left - stageRect.left + (slotRect.width / 2) - 22) + 'px';
               el.style.bottom = '20px';
           }

           makeDraggable(el, m.id);
           stage.appendChild(el);
       });

       if (selectedMarbleId) selectMarble(selectedMarbleId);
   }

   function selectMarble(id) {
       document.querySelectorAll('.marble').forEach(m => m.style.border = "1px solid rgba(255,255,255,0.3)");
       const el = document.getElementById(`marble-${id}`);
       if (el) {
           el.style.border = `3px solid var(--neon-green)`;
           el.style.boxShadow = `0 0 15px var(--neon-green)`;
           selectedMarbleId = id;
       } else {
           selectedMarbleId = null;
       }
   }

   // 拉桿蓄力與發射
   function initPlungerInteraction() {
       const startDrag = (e) => {
           isPlungerDragging = true;
           plunger.style.transition = 'none';
       };

       const onDrag = (e) => {
           if (!isPlungerDragging) return;
           const clientY = e.touches ? e.touches[0].clientY : e.clientY;
           const rodRect = plunger.parentElement.getBoundingClientRect();
           let y = clientY - rodRect.top;
          
           if (y < 0) y = 0;
           if (y > 180) y = 180;
          
           power = y;
           plunger.style.top = y + 'px';
       };

       const endDrag = () => {
           if (!isPlungerDragging) return;
           isPlungerDragging = false;
          
           if (power > 40 && selectedMarbleId) {
               launchMarble(selectedMarbleId, power);
           }
          
           plunger.style.transition = 'top 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
           plunger.style.top = '0px';
           power = 0;
       };

       plunger.addEventListener('mousedown', startDrag);
       window.addEventListener('mousemove', onDrag);
       window.addEventListener('mouseup', endDrag);
       plunger.addEventListener('touchstart', startDrag);
       window.addEventListener('touchmove', onDrag);
       window.addEventListener('touchend', endDrag);
   }

   function launchMarble(id, p) {
       const el = document.getElementById(`marble-${id}`);
       if (!el) return;
       el.classList.add('is-launching');
      
       setTimeout(() => {
           const m = marbles.find(item => item.id === id);
           if (m) {
               m.completed = true;
               m.completedTime = Date.now();
               save();
           }
           selectedMarbleId = null;
           renderStage();
       }, 900);
   }

   // 彈珠拖曳功能
   function makeDraggable(el, id) {
       let offsetX = 0, offsetY = 0;
       const onMouseDown = (e) => {
           e.preventDefault();
           const clientX = e.touches ? e.touches[0].clientX : e.clientX;
           const clientY = e.touches ? e.touches[0].clientY : e.clientY;
           offsetX = clientX - el.offsetLeft;
           offsetY = clientY - el.offsetTop;
          
           const onMouseMove = (e) => {
               const cX = e.touches ? e.touches[0].clientX : e.clientX;
               const cY = e.touches ? e.touches[0].clientY : e.clientY;
               el.style.left = (cX - offsetX) + 'px';
               el.style.top = (cY - offsetY) + 'px';
               el.style.bottom = 'auto';
           };

           const onMouseUp = () => {
               window.removeEventListener('mousemove', onMouseMove);
               window.removeEventListener('mouseup', onMouseUp);
               window.removeEventListener('touchmove', onMouseMove);
               window.removeEventListener('touchend', onMouseUp);
           };

           window.addEventListener('mousemove', onMouseMove);
           window.addEventListener('mouseup', onMouseUp);
           window.addEventListener('touchmove', onMouseMove, { passive: false });
           window.addEventListener('touchend', onMouseUp);
       };
       el.addEventListener('mousedown', onMouseDown);
       el.addEventListener('touchstart', onMouseDown, { passive: false });
   }

   function toggleArchive(show) {
       const overlay = document.getElementById('archiveOverlay');
       overlay.style.display = show ? 'block' : 'none';
       if (show) renderArchive();
   }

   function renderArchive() {
       const content = document.getElementById('archiveContent');
       const stats = document.getElementById('statsDisplay');
       content.innerHTML = '';
      
       const counts = { career: 0, love: 0, life: 0, growth: 0 };
       marbles.forEach(m => counts[m.category]++);
       stats.innerHTML = Object.keys(counts).map(k => `
           <div style="background:#f0f0f0; padding:10px 22px; border-radius:30px; border:1px solid #ddd; font-size:0.9rem;">
               <b style="color:${categoryConfig[k].color.replace('0.4','1')}">${categoryConfig[k].label}</b>: ${counts[k]}
           </div>
       `).join('');

       const groups = {};
       marbles.sort((a,b) => b.timestamp - a.timestamp).forEach(m => {
           const d = new Date(m.timestamp);
           const year = d.getFullYear() + "年";
           const month = (d.getMonth() + 1) + "月";
           if (!groups[year]) groups[year] = {};
           if (!groups[year][month]) groups[year][month] = [];
           groups[year][month].push(m);
       });

       for (const year in groups) {
           let yearHtml = `<div class="year-title">${year}</div>`;
           for (const month in groups[year]) {
               yearHtml += `<div class="month-section"><div class="month-title">${month}</div><div class="archive-grid">`;
               groups[year][month].forEach(item => {
                   yearHtml += `
                       <div class="archive-item">
                           <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                               <small style="color:#888;">${new Date(item.timestamp).toLocaleDateString()}</small>
                               <span style="font-size:0.75rem; font-weight:bold; color:${categoryConfig[item.category].color.replace('0.4','1')}">${categoryConfig[item.category].label}</span>
                           </div>
                           <p style="margin:10px 0; font-weight:bold; line-height:1.5;">${item.text}</p>
                           <div style="font-size:0.7rem; color:${item.completed ? '#28a745':'#999'}; display:flex; align-items:center; gap:5px;">
                               ${item.completed ? '● 已發射' : '○ 存放中'}
                           </div>
                       </div>
                   `;
               });
               yearHtml += `</div></div>`;
           }
           content.innerHTML += yearHtml;
       }
   }
</script>

</body>
</html>
