<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presence in Calmness | 靜謐空間</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #d4a373;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* 3D Canvas */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 啟動遮罩 (Start Overlay) */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .overlay-text {
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 300;
            animation: pulse 3s infinite ease-in-out;
        }

        .overlay-sub {
            margin-top: 15px;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 0.1em;
        }

        /* UI 控制面板 */
        #ui-layer {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            z-index: 10;
            opacity: 0;
            transition: all 1s ease 0.5s;
            pointer-events: none; /* 讓周圍區域可穿透 */
        }

        #ui-layer.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .control-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* 按鈕群組 */
        .btn-group {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .mode-btn.active {
            color: var(--bg-color);
            background: var(--text-color);
            font-weight: 600;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* 音量滑桿 */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 1px solid var(--glass-border);
            padding-left: 20px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 80px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-color);
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 啟動遮罩 -->
    <div id="overlay">
        <div class="overlay-text">Click to Enter</div>
        <div class="overlay-sub">建議佩戴耳機 · 沉浸體驗</div>
    </div>

    <!-- 3D 背景 -->
    <div id="canvas-container"></div>

    <!-- UI 控制區 -->
    <div id="ui-layer">
        <div class="control-panel">
            <div class="btn-group">
                <button class="mode-btn active" data-type="white">專注</button>
                <button class="mode-btn" data-type="pink">雨聲</button>
                <button class="mode-btn" data-type="brown">冥想</button>
            </div>
            
            <div class="volume-container">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
    </div>

    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * 聲音引擎 (Audio Engine)
         * 特點：即時生成、自動淡入、低通濾波讓聲音更圓潤
         */
        class SoundSystem {
            constructor() {
                this.ctx = null;
                this.mainGain = null;
                this.noiseSource = null;
                this.analyser = null;
                this.currentType = 'white';
                this.volume = 0.5;
                this.isPlaying = false;
            }

            init() {
                if (this.ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();

                // 主音量
                this.mainGain = this.ctx.createGain();
                this.mainGain.gain.value = 0; // 初始靜音
                this.mainGain.connect(this.ctx.destination);

                // 分析器 (用於視覺連動)
                this.analyser = this.ctx.createAnalyser();
                this.analyser.fftSize = 256; 
                this.analyser.smoothingTimeConstant = 0.9; // 讓數值變化非常平滑，不跳動
                this.analyser.connect(this.mainGain);
            }

            createBuffer(type) {
                const bufferSize = 2 * this.ctx.sampleRate;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                
                let lastOut = 0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    
                    if (type === 'white') {
                        data[i] = white;
                    } else if (type === 'pink') {
                        // 簡易粉紅噪音濾波
                        const b0 = 0.99886 * lastOut + white * 0.0555179;
                        data[i] = b0 * 3.5; // 補償增益
                        lastOut = b0;
                    } else if (type === 'brown') {
                        // 布朗噪音 (積分)
                        const b0 = (lastOut + (0.02 * white)) / 1.02;
                        data[i] = b0 * 3.5;
                        lastOut = b0;
                    }
                }
                return buffer;
            }

            play(type) {
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                // 如果正在播放，先停止舊的並淡出
                if (this.noiseSource) {
                    try { this.noiseSource.stop(); } catch(e){}
                }

                this.currentType = type;
                const buffer = this.createBuffer(type);
                this.noiseSource = this.ctx.createBufferSource();
                this.noiseSource.buffer = buffer;
                this.noiseSource.loop = true;

                // 聲音修飾：低通濾波器 (讓聲音不刺耳，產生「平靜感」)
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                // 根據不同噪音類型調整濾波頻率
                if (type === 'white') filter.frequency.value = 1500; // 削減高頻
                else if (type === 'pink') filter.frequency.value = 2500;
                else filter.frequency.value = 500; // 布朗噪音本來就很低

                // 連接路徑：Source -> Filter -> Analyser -> Gain -> Out
                this.noiseSource.connect(filter);
                filter.connect(this.analyser);

                this.noiseSource.start();
                this.isPlaying = true;

                // 淡入效果
                this.mainGain.gain.cancelScheduledValues(this.ctx.currentTime);
                this.mainGain.gain.setValueAtTime(this.mainGain.gain.value, this.ctx.currentTime);
                this.mainGain.gain.linearRampToValueAtTime(this.volume, this.ctx.currentTime + 2);
            }

            setVolume(val) {
                this.volume = val;
                if (this.mainGain) {
                    this.mainGain.gain.setTargetAtTime(val, this.ctx.currentTime, 0.1);
                }
            }

            // 獲取平滑後的音量值 (0.0 ~ 1.0) 供視覺使用
            getSmoothedVolume() {
                if (!this.analyser) return 0;
                const dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                this.analyser.getByteFrequencyData(dataArray);
                
                // 計算平均值
                let values = 0;
                const length = dataArray.length;
                for (let i = 0; i < length; i++) {
                    values += dataArray[i];
                }
                return (values / length) / 255;
            }
        }

        /**
         * 3D 場景控制 (Scene Controller)
         * 特點：包含視差互動、動態光影、呼吸球體
         */
        class Scene3D {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.sphere = null;
                this.plane = null;
                this.lights = [];
                
                // 滑鼠互動參數
                this.mouseX = 0;
                this.mouseY = 0;
                this.targetX = 0;
                this.targetY = 0;
            }

            init() {
                // 1. 場景設定 (含霧氣)
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color('#1a1a1a');
                this.scene.fog = new THREE.FogExp2('#1a1a1a', 0.025); // 霧氣增加深度

                // 2. 相機
                this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
                this.camera.position.set(0, 0, 8);

                // 3. 渲染器 (開啟陰影)
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 柔和陰影
                this.container.appendChild(this.renderer.domElement);

                // 4. 物體：核心球體
                const geometry = new THREE.IcosahedronGeometry(1.5, 15); // 高解析度
                const material = new THREE.MeshStandardMaterial({
                    color: 0x333333,
                    roughness: 0.7, // 粗糙消光質感
                    metalness: 0.2,
                    emissive: 0x000000,
                    flatShading: false
                });
                this.sphere = new THREE.Mesh(geometry, material);
                this.sphere.castShadow = true;
                this.sphere.receiveShadow = true;
                this.scene.add(this.sphere);

                // 5. 物體：地板 (接收影子)
                const planeGeo = new THREE.PlaneGeometry(100, 100);
                const planeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
                this.plane = new THREE.Mesh(planeGeo, planeMat);
                this.plane.rotation.x = -Math.PI / 2;
                this.plane.position.y = -3;
                this.plane.receiveShadow = true;
                this.scene.add(this.plane);

                // 6. 燈光系統
                const ambient = new THREE.AmbientLight(0x404040, 0.6);
                this.scene.add(ambient);

                // 光源 1: 暖光 (移動)
                const light1 = new THREE.PointLight(0xffaa77, 1.2, 20);
                light1.castShadow = true;
                light1.shadow.mapSize.width = 1024;
                light1.shadow.mapSize.height = 1024;
                this.scene.add(light1);
                this.lights.push(light1);

                // 光源 2: 冷光 (移動)
                const light2 = new THREE.PointLight(0x77aaff, 0.8, 20);
                this.scene.add(light2);
                this.lights.push(light2);

                // 7. 事件監聽
                window.addEventListener('resize', this.onResize.bind(this));
                document.addEventListener('mousemove', this.onMouseMove.bind(this));
            }

            onMouseMove(event) {
                // 正規化滑鼠位置 (-1 到 1)
                this.mouseX = (event.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
                this.mouseY = (event.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // 動畫迴圈
            render(audioVolume) {
                const time = performance.now() * 0.001;

                // --- A. 滑鼠視差 (Parallax) ---
                // 讓相機緩慢跟隨滑鼠，製造 3D 空間感
                const targetCamX = this.mouseX * 0.5;
                const targetCamY = this.mouseY * 0.5;
                
                this.camera.position.x += (targetCamX - this.camera.position.x) * 0.05;
                this.camera.position.y += (targetCamY - this.camera.position.y) * 0.05;
                this.camera.lookAt(this.scene.position);

                // --- B. 光影移動 ---
                // 光源繞著球體緩慢旋轉
                this.lights[0].position.x = Math.sin(time * 0.5) * 4;
                this.lights[0].position.z = Math.cos(time * 0.5) * 4;
                this.lights[0].position.y = 2 + Math.sin(time * 0.2);

                this.lights[1].position.x = Math.sin(time * 0.3 + 2) * 5;
                this.lights[1].position.z = Math.cos(time * 0.3 + 2) * 5;
                this.lights[1].position.y = -1;

                // --- C. 聲音互動 (Audio Reactivity) ---
                // 使用 Lerp 平滑過渡，避免跳動
                // 1. 呼吸縮放：聲音越大，球體微幅變大
                const targetScale = 1 + audioVolume * 0.3; 
                this.sphere.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.05);

                // 2. 自體發光：聲音越大，核心越亮
                const targetEmissive = audioVolume * 0.3;
                this.sphere.material.emissive.setScalar(targetEmissive);

                // 3. 基礎旋轉
                this.sphere.rotation.y += 0.002;
                this.sphere.rotation.x += 0.001;

                this.renderer.render(this.scene, this.camera);
            }
        }

        /**
         * 主程式邏輯 (Main)
         */
        const audio = new SoundSystem();
        const visual = new Scene3D();
        const overlay = document.getElementById('overlay');
        const uiLayer = document.getElementById('ui-layer');
        const btns = document.querySelectorAll('.mode-btn');
        const volSlider = document.getElementById('volume-slider');

        // 初始化視覺
        visual.init();

        // 動畫迴圈
        function animate() {
            requestAnimationFrame(animate);
            // 獲取當前音量強度 (0.0 ~ 1.0)
            const vol = audio.getSmoothedVolume();
            visual.render(vol);
        }
        animate();

        // 互動：點擊開始
        overlay.addEventListener('click', () => {
            overlay.style.opacity = 0;
            setTimeout(() => {
                overlay.style.display = 'none';
                uiLayer.classList.add('visible'); // 顯示 UI
            }, 1000);

            // 啟動聲音
            audio.play('white');
        });

        // 互動：切換模式
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                btns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                audio.play(e.target.dataset.type);
            });
        });

        // 互動：音量
        volSlider.addEventListener('input', (e) => {
            audio.setVolume(parseFloat(e.target.value));
        });

    </script>
</body>
</html>
