<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presence in Calmness | 平靜中的存在感</title>
    <style>
        /* 基礎設定 */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: rgba(240, 240, 240, 0.9);
            --text-sub: rgba(240, 240, 240, 0.5);
            --accent: #d4a373;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: var(--text-main);
        }

        /* 3D 畫布容器 */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI 介面層 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* 讓滑鼠可以穿透到背景互動(如果有需要) */
        }

        /* 玻璃擬態控制面板 */
        .control-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 320px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0; /* 初始隱藏 */
            transform: translateY(20px);
            animation: fadeIn Up 1s forwards 0.5s;
        }

        .control-panel:hover {
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 0.15em;
            margin-bottom: 30px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        /* 按鈕群組 */
        .sound-options {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .sound-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-sub);
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .sound-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .sound-btn.active {
            background: var(--text-main);
            color: #1a1a1a;
            border-color: var(--text-main);
            font-weight: 600;
        }

        /* 音量控制 */
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: var(--glass-border);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.5);
        }

        /* 主開關按鈕 */
        #main-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: transparent;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.4s ease;
        }

        #main-toggle:hover {
            background: var(--text-main);
            color: #1a1a1a;
            transform: scale(1.1);
        }

        /* 啟動遮罩 */
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        .start-text {
            font-weight: 300;
            letter-spacing: 0.2em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .status-indicator {
            margin-top: 15px;
            font-size: 0.7rem;
            color: var(--text-sub);
            height: 1em;
        }
    </style>
</head>
<body>

    <!-- 啟動頁面 (為了解決瀏覽器自動播放音效限制) -->
    <div id="start-overlay">
        <div class="start-text">點擊任意處進入寧靜</div>
    </div>

    <!-- 3D 背景 -->
    <div id="canvas-container"></div>

    <!-- UI 介面 -->
    <div id="ui-layer">
        <div class="control-panel">
            <h1>AMBIENCE</h1>
            
            <div class="sound-options">
                <button class="sound-btn active" data-type="white">專注</button>
                <button class="sound-btn" data-type="pink">雨聲</button>
                <button class="sound-btn" data-type="brown">深淵</button>
            </div>

            <div class="volume-control">
                <span style="font-size: 0.8rem; color: var(--text-sub)">-</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
                <span style="font-size: 0.8rem; color: var(--text-sub)">+</span>
            </div>

            <button id="main-toggle">
                <span id="icon-play">▶</span>
            </button>
            
            <div class="status-indicator" id="status-text">Ready</div>
        </div>
    </div>

    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * PART 1: AUDIO ENGINE (Web Audio API)
         * 使用程式碼生成噪音，不依賴外部檔案
         */
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.gainNode = null;
                this.sourceNode = null;
                this.isPlaying = false;
                this.currentType = 'white';
                this.volume = 0.5;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.gainNode = this.ctx.createGain();
                    this.gainNode.connect(this.ctx.destination);
                    this.gainNode.gain.value = this.volume;
                }
            }

            // 生成噪音緩衝區
            createNoiseBuffer() {
                const bufferSize = 2 * this.ctx.sampleRate; // 2秒的緩衝
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const output = buffer.getChannelData(0);

                for (let i = 0; i < bufferSize; i++) {
                    let white = Math.random() * 2 - 1;
                    
                    if (this.currentType === 'white') {
                        // 純白噪音
                        output[i] = white * 0.5; 
                    } else if (this.currentType === 'pink') {
                        // 簡易粉紅噪音演算法 (近似)
                        output[i] = (Math.random() * 2 - 1) * 0.5; 
                        // Note: 真實粉紅噪音需要複雜濾波，這裡用後製濾波器模擬
                    } else if (this.currentType === 'brown') {
                         // 簡易布朗噪音 (近似)
                         output[i] = (Math.random() * 2 - 1) * 0.5;
                    }
                }
                return buffer;
            }

            play() {
                this.init();
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }

                if (this.isPlaying) this.stop();

                // 建立噪音源
                const buffer = this.createNoiseBuffer();
                this.sourceNode = this.ctx.createBufferSource();
                this.sourceNode.buffer = buffer;
                this.sourceNode.loop = true;

                // 根據類型添加濾波器以塑造音色
                let lastNode = this.sourceNode;

                if (this.currentType === 'pink') {
                    // 粉紅噪音濾波 (模擬雨聲/自然聲)
                    const b0 = this.ctx.createBiquadFilter();
                    b0.type = 'lowshelf';
                    b0.frequency.value = 400;
                    b0.gain.value = -5;
                    lastNode.connect(b0);
                    lastNode = b0;
                } else if (this.currentType === 'brown') {
                    // 布朗噪音濾波 (模擬低頻/深海)
                    const b0 = this.ctx.createBiquadFilter();
                    b0.type = 'lowpass';
                    b0.frequency.value = 150; 
                    lastNode.connect(b0);
                    lastNode = b0;
                } else {
                    // 白噪音稍微削減高頻以免刺耳
                    const b0 = this.ctx.createBiquadFilter();
                    b0.type = 'lowpass';
                    b0.frequency.value = 10000;
                    lastNode.connect(b0);
                    lastNode = b0;
                }

                // 淡入效果
                this.gainNode.gain.setValueAtTime(0, this.ctx.currentTime);
                this.gainNode.gain.linearRampToValueAtTime(this.volume, this.ctx.currentTime + 1);

                lastNode.connect(this.gainNode);
                this.sourceNode.start();
                this.isPlaying = true;
            }

            stop() {
                if (this.sourceNode) {
                    // 淡出效果
                    this.gainNode.gain.cancelScheduledValues(this.ctx.currentTime);
                    this.gainNode.gain.setValueAtTime(this.gainNode.gain.value, this.ctx.currentTime);
                    this.gainNode.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
                    
                    const oldSource = this.sourceNode;
                    setTimeout(() => {
                        try { oldSource.stop(); } catch(e){}
                    }, 500);
                    
                    this.sourceNode = null;
                }
                this.isPlaying = false;
            }

            setVolume(val) {
                this.volume = val;
                if (this.gainNode) {
                    // 平滑過渡音量
                    this.gainNode.gain.setTargetAtTime(val, this.ctx.currentTime, 0.1);
                }
            }

            setType(type) {
                if (this.currentType === type) return;
                this.currentType = type;
                if (this.isPlaying) {
                    this.play(); // 重新播放以切換音色
                }
            }
        }

        const audio = new AudioEngine();

        /**
         * PART 2: 3D VISUALS (Three.js)
         * 創建一個寧靜、緩慢移動的光影空間
         */
        const init3D = () => {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            // 設置深色背景霧氣，增加空間深邃感
            scene.background = new THREE.Color('#121214');
            scene.fog = new THREE.FogExp2('#121214', 0.02);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // 開啟陰影映射
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // --- 幾何體：中央的核心球體 ---
            const geometry = new THREE.IcosahedronGeometry(1.5, 10); // 高細分球體
            const material = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.7, // 粗糙表面
                metalness: 0.1,
                flatShading: false
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.castShadow = true;
            sphere.receiveShadow = true;
            scene.add(sphere);

            // --- 背景平面 (接收影子) ---
            const planeGeometry = new THREE.PlaneGeometry(50, 50);
            const planeMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x121214,
                roughness: 0.9 
            });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.position.z = -2;
            plane.receiveShadow = true;
            scene.add(plane);

            // --- 燈光系統 ---
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5); // 柔和環境光
            scene.add(ambientLight);

            // 1. 主光源 (暖色)
            const light1 = new THREE.PointLight(0xd4a373, 1, 20);
            light1.position.set(2, 2, 2);
            light1.castShadow = true;
            light1.shadow.mapSize.width = 1024;
            light1.shadow.mapSize.height = 1024;
            scene.add(light1);

            // 2. 輔助光源 (冷色/藍色調，增加對比)
            const light2 = new THREE.PointLight(0x4a6fa5, 0.8, 20);
            light2.position.set(-2, -2, 2);
            scene.add(light2);

            // --- 動畫 ---
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);

                const time = clock.getElapsedTime();

                // 1. 球體緩慢旋轉
                sphere.rotation.x = time * 0.05;
                sphere.rotation.y = time * 0.07;

                // 2. 模擬呼吸效果 (輕微縮放)
                const scale = 1 + Math.sin(time * 0.5) * 0.02;
                sphere.scale.set(scale, scale, scale);

                // 3. 燈光軌道運動 (創造移動的影子)
                light1.position.x = Math.sin(time * 0.3) * 3;
                light1.position.y = Math.cos(time * 0.2) * 3;
                
                light2.position.x = Math.sin(time * 0.2 + 2) * 4;
                light2.position.y = Math.cos(time * 0.4 + 1) * 3;

                // 4. 與滑鼠的微弱互動 (視差)
                const parallaxX = (mouseX - window.innerWidth / 2) * 0.001;
                const parallaxY = (mouseY - window.innerHeight / 2) * 0.001;
                camera.position.x += (parallaxX - camera.position.x) * 0.05;
                camera.position.y += (parallaxY - camera.position.y) * 0.05;
                camera.lookAt(scene.position);

                renderer.render(scene, camera);
            }

            // 滑鼠跟蹤
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            // 視窗縮放處理
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        };

        /**
         * PART 3: UI & LOGIC
         * DOM 操作與事件綁定
         */
        document.addEventListener('DOMContentLoaded', () => {
            init3D();

            const overlay = document.getElementById('start-overlay');
            const mainToggle = document.getElementById('main-toggle');
            const iconPlay = document.getElementById('icon-play');
            const volumeSlider = document.getElementById('volume-slider');
            const soundBtns = document.querySelectorAll('.sound-btn');
            const statusText = document.getElementById('status-text');

            // 進入體驗 (點擊遮罩)
            overlay.addEventListener('click', () => {
                audio.init(); // 初始化 AudioContext
                overlay.style.opacity = 0;
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1000);
            });

            // 播放/暫停按鈕
            mainToggle.addEventListener('click', () => {
                if (audio.isPlaying) {
                    audio.stop();
                    iconPlay.innerHTML = "▶"; // Play icon
                    statusText.textContent = "Paused";
                } else {
                    audio.play();
                    iconPlay.innerHTML = "❚❚"; // Pause icon
                    statusText.textContent = "Playing: " + getTypeName(audio.currentType);
                }
            });

            // 音色切換
            soundBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // UI 更新
                    soundBtns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');

                    // 邏輯更新
                    const type = e.target.dataset.type;
                    audio.setType(type);
                    
                    if(audio.isPlaying) {
                         statusText.textContent = "Playing: " + getTypeName(type);
                    }
                });
            });

            // 音量控制
            volumeSlider.addEventListener('input', (e) => {
                audio.setVolume(parseFloat(e.target.value));
            });

            function getTypeName(type) {
                switch(type) {
                    case 'white': return 'Focus (White Noise)';
                    case 'pink': return 'Rain (Pink Noise)';
                    case 'brown': return 'Deep (Brown Noise)';
                    default: return '';
                }
            }
        });

    </script>
</body>
</html>
