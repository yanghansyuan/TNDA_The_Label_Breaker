<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Resonance | 最終章</title>
    <style>
        :root {
            --text-primary: #f0f0f0;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --glass-surface: rgba(15, 15, 15, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-danger: #ff5c5c;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #050505;
            color: var(--text-primary);
        }

        /* 層級 0: 動態背景畫布 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 層級 1: 3D 場景 (透明背景) */
        #three-canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* 讓滑鼠事件穿透到背景以便可能的互動 */
        }

        /* 層級 2: UI 與遮罩 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease;
            cursor: pointer;
        }

        .overlay-title {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 0.4em;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .overlay-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: pulse 3s infinite;
        }

        /* UI 面板 */
        #ui-layer {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            opacity: 0;
            transition: all 1s ease 0.5s;
        }

        #ui-layer.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .glass-panel {
            pointer-events: auto;
            background: var(--glass-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 模式按鈕 */
        .mode-selector {
            border-radius: 50px;
            padding: 5px;
            display: flex;
            gap: 5px;
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
        }

        .mode-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .mode-btn.active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .mode-btn[data-type="off"]:hover { color: var(--accent-danger); }
        .mode-btn[data-type="off"].active {
            background: rgba(255, 92, 92, 0.2);
            color: var(--accent-danger);
            border: 1px solid var(--accent-danger);
            box-shadow: none;
        }

        /* 調音台 */
        .tuner-panel {
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: transform 0.2s;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            background: #fff;
        }

        .divider {
            width: 1px;
            height: 25px;
            background: var(--glass-border);
        }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <!-- 層級 0: 背景視覺 -->
    <canvas id="bg-canvas"></canvas>

    <!-- 層級 1: 3D 場景 -->
    <div id="three-canvas-container"></div>

    <!-- 啟動遮罩 -->
    <div id="overlay">
        <div class="overlay-title">ETHEREAL</div>
        <div class="overlay-hint">Click to Immerse</div>
    </div>

    <!-- UI 層 -->
    <div id="ui-layer">
        <div class="glass-panel mode-selector">
            <button class="mode-btn active" data-type="focus">Focus</button>
            <button class="mode-btn" data-type="rain">Rain</button>
            <button class="mode-btn" data-type="deep">Deep</button>
            <button class="mode-btn" data-type="off">Mute</button>
        </div>

        <div class="glass-panel tuner-panel">
            <div class="control-group">
                <div class="control-label">Tone</div>
                <input type="range" id="tone" min="0" max="1" step="0.01" value="0.7">
            </div>
            <div class="divider"></div>
            <div class="control-group">
                <div class="control-label">Space</div>
                <input type="range" id="space" min="0" max="1" step="0.01" value="0.3">
            </div>
            <div class="divider"></div>
            <div class="control-group">
                <div class="control-label">Vol</div>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.6">
            </div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * PART 1: AUDIO ENGINE (V5 - Optimized)
         * 包含音色、空間感、以及有機雨聲 LFO
         */
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.master = null;
                this.source = null;
                this.toneFilter = null;
                this.delay = null;
                this.wet = null;
                this.analyser = null;
                this.lfoNodes = [];
                
                this.vol = 0.6;
                this.tone = 0.7;
                this.space = 0.3;
                this.isMuted = false;
            }

            init() {
                if (this.ctx) return;
                const AC = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AC();
                
                this.master = this.ctx.createGain();
                this.master.gain.value = 0;
                this.master.connect(this.ctx.destination);

                this.analyser = this.ctx.createAnalyser();
                this.analyser.fftSize = 256;
                this.analyser.smoothingTimeConstant = 0.8;
                this.analyser.connect(this.master);

                // Effects Chain
                this.toneFilter = this.ctx.createBiquadFilter();
                this.toneFilter.type = 'lowpass';
                this.updateTone();

                this.delay = this.ctx.createDelay();
                this.delay.delayTime.value = 0.4;
                const feedback = this.ctx.createGain();
                feedback.gain.value = 0.4;
                this.delay.connect(feedback);
                feedback.connect(this.delay);

                this.wet = this.ctx.createGain();
                this.updateSpace();
                
                this.delay.connect(this.wet);
                this.wet.connect(this.analyser); // Delay path
                this.toneFilter.connect(this.analyser); // Dry path
                this.toneFilter.connect(this.delay); // Send to delay
            }

            stop() {
                if(this.source) { try{this.source.stop();}catch(e){} }
                this.lfoNodes.forEach(n => { try{n.stop(); n.disconnect();}catch(e){} });
                this.lfoNodes = [];
            }

            createBuffer(type) {
                const b = this.ctx.createBuffer(1, 2*this.ctx.sampleRate, this.ctx.sampleRate);
                const d = b.getChannelData(0);
                for(let i=0; i<d.length; i++) d[i] = Math.random()*2 - 1;
                return b;
            }

            play(type) {
                this.init();
                if(this.ctx.state === 'suspended') this.ctx.resume();
                if(type === 'off') { this.mute(); return; }

                this.isMuted = false;
                this.stop();

                const buf = this.createBuffer(type);
                this.source = this.ctx.createBufferSource();
                this.source.buffer = buf;
                this.source.loop = true;

                let out = this.source;

                // Sound Sculpting
                if (type === 'focus') {
                    const hp = this.ctx.createBiquadFilter();
                    hp.type = 'highpass'; hp.frequency.value = 150;
                    this.source.connect(hp); out = hp;
                } else if (type === 'rain') {
                    // Rain Simulation with LFO
                    const pink = this.ctx.createBiquadFilter();
                    pink.type = 'lowshelf'; pink.frequency.value = 500; pink.gain.value = -12;
                    
                    const dynamic = this.ctx.createBiquadFilter();
                    dynamic.type = 'lowpass'; dynamic.frequency.value = 700;

                    const lfo = this.ctx.createOscillator();
                    lfo.frequency.value = 0.15; // Slow wave
                    const lfoG = this.ctx.createGain();
                    lfoG.gain.value = 500;
                    lfo.connect(lfoG);
                    lfoG.connect(dynamic.frequency);
                    lfo.start();
                    this.lfoNodes.push(lfo, lfoG);

                    this.source.connect(pink); pink.connect(dynamic); out = dynamic;
                } else if (type === 'deep') {
                    const lp = this.ctx.createBiquadFilter();
                    lp.type = 'lowpass'; lp.frequency.value = 250;
                    this.source.connect(lp); out = lp;
                }

                out.connect(this.toneFilter);
                this.source.start();

                // Fade In
                const t = this.ctx.currentTime;
                this.master.gain.cancelScheduledValues(t);
                this.master.gain.setValueAtTime(0, t);
                this.master.gain.linearRampToValueAtTime(this.vol, t+2);
            }

            mute() {
                if(!this.master) return;
                this.isMuted = true;
                const t = this.ctx.currentTime;
                this.master.gain.cancelScheduledValues(t);
                this.master.gain.setValueAtTime(this.master.gain.value, t);
                this.master.gain.exponentialRampToValueAtTime(0.001, t+1);
                setTimeout(() => { if(this.isMuted) this.stop(); }, 1200);
            }

            updateTone() {
                if(!this.toneFilter) return;
                // Log mapping: 200Hz -> 12000Hz
                const val = 200 * Math.pow(60, this.tone);
                this.toneFilter.frequency.setTargetAtTime(val, this.ctx.currentTime, 0.1);
            }

            updateSpace() {
                if(!this.wet) return;
                this.wet.gain.setTargetAtTime(this.space, this.ctx.currentTime, 0.1);
            }

            set(p, v) {
                if(p==='vol') { 
                    this.vol = v; 
                    if(!this.isMuted && this.master) this.master.gain.setTargetAtTime(v, this.ctx.currentTime, 0.1); 
                }
                else if(p==='tone') { this.tone = v; this.updateTone(); }
                else if(p==='space') { this.space = v; this.updateSpace(); }
            }

            getEnergy() {
                if(!this.analyser || this.isMuted) return 0;
                const d = new Uint8Array(this.analyser.frequencyBinCount);
                this.analyser.getByteFrequencyData(d);
                let s = 0; for(let i=0; i<d.length; i++) s+=d[i];
                return (s/d.length)/255;
            }
        }

        /**
         * PART 2: BACKGROUND ART (Canvas 2D)
         * 負責 Focus(波形), Rain(漣漪), Deep(漸層條紋)
         */
        class BackgroundArt {
            constructor() {
                this.canvas = document.getElementById('bg-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.mode = 'off';
                this.elements = []; // 儲存粒子/波形物件
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            setMode(m) {
                this.mode = m;
                this.elements = []; // 清除舊圖形
                // 根據模式預先生成一些物件，避免畫面空白
                if (m === 'deep') {
                    for(let i=0; i<15; i++) this.elements.push(this.createBar(true));
                }
            }

            createRipple() {
                return {
                    x: Math.random() * this.canvas.width,
                    y: Math.random() * this.canvas.height,
                    r: 0,
                    maxR: Math.random() * 100 + 50,
                    alpha: Math.random() * 0.5 + 0.2,
                    speed: Math.random() * 0.5 + 0.2
                };
            }

            createBar(randomY = false) {
                return {
                    y: randomY ? Math.random() * this.canvas.height : -50,
                    h: Math.random() * 40 + 10,
                    speed: Math.random() * 0.5 + 0.2,
                    alpha: 0
                };
            }

            render(energy) {
                const w = this.canvas.width;
                const h = this.canvas.height;
                const time = performance.now() * 0.001;

                // 清除畫面 (帶有拖尾效果)
                this.ctx.fillStyle = this.mode === 'off' ? 'rgba(5,5,5,0.1)' : 'rgba(5,5,5,0.2)';
                this.ctx.fillRect(0, 0, w, h);

                if (this.mode === 'focus') {
                    // --- FOCUS: 和緩的線條波形 ---
                    this.ctx.strokeStyle = `rgba(200, 200, 200, ${0.1 + energy * 0.2})`;
                    this.ctx.lineWidth = 1;
                    
                    // 繪製 3 條正弦波
                    for (let i = 0; i < 3; i++) {
                        this.ctx.beginPath();
                        const offset = i * 100;
                        const speed = time * (0.5 + i * 0.1);
                        for (let x = 0; x < w; x += 10) {
                            const y = h/2 + Math.sin(x * 0.005 + speed + offset) * (50 + energy * 100);
                            if (x === 0) this.ctx.moveTo(x, y);
                            else this.ctx.lineTo(x, y);
                        }
                        this.ctx.stroke();
                    }
                } 
                else if (this.mode === 'rain') {
                    // --- RAIN: 不規則漣漪圓圈 ---
                    // 隨機生成新漣漪
                    if (Math.random() < 0.05 + energy * 0.1) {
                        this.elements.push(this.createRipple());
                    }

                    // 更新與繪製
                    for (let i = this.elements.length - 1; i >= 0; i--) {
                        const p = this.elements[i];
                        p.r += p.speed;
                        p.alpha -= 0.005;
                        
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        this.ctx.strokeStyle = `rgba(100, 200, 255, ${p.alpha})`;
                        this.ctx.lineWidth = 1.5;
                        this.ctx.stroke();

                        if (p.alpha <= 0) this.elements.splice(i, 1);
                    }
                } 
                else if (this.mode === 'deep') {
                    // --- DEEP: 向下漸變的漸層條紋 ---
                    if (Math.random() < 0.02) this.elements.push(this.createBar());

                    for (let i = this.elements.length - 1; i >= 0; i--) {
                        const b = this.elements[i];
                        b.y += b.speed;
                        // 淡入淡出邏輯
                        if (b.y < h * 0.2) b.alpha = Math.min(b.alpha + 0.01, 0.3);
                        else if (b.y > h * 0.8) b.alpha -= 0.005;

                        // 繪製
                        const grad = this.ctx.createLinearGradient(0, b.y, 0, b.y + b.h);
                        grad.addColorStop(0, `rgba(255, 150, 50, 0)`);
                        grad.addColorStop(0.5, `rgba(255, 150, 50, ${b.alpha * (0.5 + energy)})`);
                        grad.addColorStop(1, `rgba(255, 150, 50, 0)`);
                        
                        this.ctx.fillStyle = grad;
                        this.ctx.fillRect(0, b.y, w, b.h);

                        if (b.y > h || b.alpha <= 0) this.elements.splice(i, 1);
                    }
                }
            }
        }

        /**
         * PART 3: 3D SYSTEM (Textures & Scene)
         */
        class TextureGen {
            createCanvas() {
                const c = document.createElement('canvas');
                c.width = 512; c.height = 512; return c;
            }
            // 拉絲金屬
            focusTex() {
                const c = this.createCanvas(); const ctx = c.getContext('2d');
                ctx.fillStyle = '#808080'; ctx.fillRect(0,0,512,512);
                for(let i=0;i<3000;i++) {
                    const g = Math.random()*255; ctx.fillStyle=`rgba(${g},${g},${g},0.1)`;
                    ctx.fillRect(Math.random()*512-50, Math.random()*512, Math.random()*200+50, 1);
                }
                return new THREE.CanvasTexture(c);
            }
            // 液態水痕
            rainTex() {
                const c = this.createCanvas(); const ctx = c.getContext('2d');
                ctx.fillStyle = '#808080'; ctx.fillRect(0,0,512,512);
                for(let i=0;i<80;i++) {
                    const x=Math.random()*512, y=Math.random()*512, r=Math.random()*50+10;
                    const g = ctx.createRadialGradient(x,y,0,x,y,r);
                    g.addColorStop(0,'rgba(255,255,255,0.3)'); g.addColorStop(1,'transparent');
                    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,6.28); ctx.fill();
                }
                return new THREE.CanvasTexture(c);
            }
            // 粗糙岩石
            deepTex() {
                const c = this.createCanvas(); const ctx = c.getContext('2d');
                const id = ctx.createImageData(512,512);
                for(let i=0;i<id.data.length;i+=4){
                    const v=Math.random()*255; 
                    id.data[i]=v; id.data[i+1]=v; id.data[i+2]=v; id.data[i+3]=255;
                }
                ctx.putImageData(id,0,0); return new THREE.CanvasTexture(c);
            }
        }

        class Scene3D {
            constructor() {
                this.con = document.getElementById('three-canvas-container');
                this.tg = new TextureGen();
                this.mats = {};
                this.mx=0; this.my=0;
            }

            init() {
                this.scene = new THREE.Scene();
                // 關鍵：不設背景色，或設為透明，讓 Canvas 背景顯示出來
                // this.scene.background = null; 

                this.cam = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
                this.cam.position.set(0,0,10);

                this.ren = new THREE.WebGLRenderer({ alpha: true, antialias: true }); // alpha: true 讓背景透明
                this.ren.setSize(window.innerWidth, window.innerHeight);
                this.ren.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.ren.shadowMap.enabled = true;
                this.ren.shadowMap.type = THREE.PCFSoftShadowMap;
                this.con.appendChild(this.ren.domElement);

                // 材質
                const t1 = this.tg.focusTex();
                const t2 = this.tg.rainTex();
                const t3 = this.tg.deepTex();

                this.mats.focus = new THREE.MeshStandardMaterial({
                    color: 0xffffff, roughness: 0.3, metalness: 0.9, bumpMap: t1, bumpScale: 0.05
                });
                this.mats.rain = new THREE.MeshStandardMaterial({
                    color: 0x4fc3f7, roughness: 0.1, metalness: 0.4, bumpMap: t2, bumpScale: 0.15,
                    transparent: true, opacity: 0.9
                });
                this.mats.deep = new THREE.MeshStandardMaterial({
                    color: 0x3e2723, roughness: 0.9, metalness: 0.1, bumpMap: t3, bumpScale: 0.4
                });
                this.mats.mute = new THREE.MeshBasicMaterial({
                    color: 0x444444, wireframe: true, transparent: true, opacity: 0.2
                });

                // 球體
                this.sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(1.5, 30), this.mats.focus);
                this.sphere.castShadow = true; this.sphere.receiveShadow = true;
                this.scene.add(this.sphere);

                // 地板 (Shadow Catcher)
                // 使用 ShadowMaterial 或極深色材質，確保不遮擋背景太多，只顯示影子
                const planeMat = new THREE.MeshStandardMaterial({ 
                    color: 0x050505, roughness: 1, metalness: 0,
                    transparent: true, opacity: 0.8 // 半透明地板，讓背景若隱若現
                });
                this.plane = new THREE.Mesh(new THREE.PlaneGeometry(60,60), planeMat);
                this.plane.rotation.x = -Math.PI/2;
                this.plane.position.y = -3;
                this.plane.receiveShadow = true;
                this.scene.add(this.plane);

                // 燈光
                this.l1 = new THREE.PointLight(0xffffff, 1.2, 30);
                this.l1.position.set(4,5,4); this.l1.castShadow = true;
                this.scene.add(this.l1);

                this.l2 = new THREE.PointLight(0x4466ff, 0.8, 30);
                this.l2.position.set(-4,-2,5);
                this.scene.add(this.l2);

                window.addEventListener('resize', ()=> {
                    this.cam.aspect = window.innerWidth/window.innerHeight;
                    this.cam.updateProjectionMatrix();
                    this.ren.setSize(window.innerWidth, window.innerHeight);
                });
                document.addEventListener('mousemove', e => {
                    this.mx = (e.clientX/window.innerWidth)*2-1;
                    this.my = -(e.clientY/window.innerHeight)*2+1;
                });
            }

            setMode(m) {
                const mat = (m==='off') ? this.mats.mute : (this.mats[m] || this.mats.focus);
                this.sphere.material = mat;

                if(m==='focus') { this.l1.color.setHex(0xffffff); this.l2.color.setHex(0xaaccff); }
                else if(m==='rain') { this.l1.color.setHex(0x81d4fa); this.l2.color.setHex(0x0288d1); }
                else if(m==='deep') { this.l1.color.setHex(0xffab91); this.l2.color.setHex(0x3e2723); }
                else { this.l1.color.setHex(0x555555); this.l2.color.setHex(0x222222); }
            }

            render(energy) {
                const t = performance.now()*0.001;
                
                // Cam
                const tx = Math.sin(this.mx*0.7)*11;
                const tz = Math.cos(this.mx*0.7)*11;
                const ty = this.my*4;
                this.cam.position.lerp(new THREE.Vector3(tx, ty, tz), 0.05);
                this.cam.lookAt(0,0,0);

                // Sphere
                const s = 1 + energy * 0.2;
                this.sphere.scale.lerp(new THREE.Vector3(s,s,s), 0.1);
                this.sphere.rotation.y += 0.003;
                this.sphere.rotation.x = Math.sin(t*0.2)*0.15;
                if(this.sphere.material.emissive) this.sphere.material.emissive.setScalar(energy*0.6);

                // Lights
                this.l1.position.x = Math.sin(t*0.4)*7;
                this.l1.position.z = Math.cos(t*0.4)*7;

                this.ren.render(this.scene, this.cam);
            }
        }

        /**
         * MAIN APP
         */
        const App = {
            audio: new AudioEngine(),
            bg: new BackgroundArt(),
            s3d: new Scene3D(),
            
            init() {
                this.s3d.init();
                
                const overlay = document.getElementById('overlay');
                const ui = document.getElementById('ui-layer');
                const btns = document.querySelectorAll('.mode-btn');

                // Enter
                overlay.addEventListener('click', () => {
                    this.audio.play('focus');
                    this.bg.setMode('focus');
                    overlay.style.opacity = 0;
                    setTimeout(()=>{ overlay.style.display='none'; ui.classList.add('visible'); }, 1000);
                });

                // Controls
                btns.forEach(b => b.addEventListener('click', e => {
                    btns.forEach(btn=>btn.classList.remove('active'));
                    e.target.classList.add('active');
                    const t = e.target.dataset.type;
                    this.audio.play(t);
                    this.s3d.setMode(t);
                    this.bg.setMode(t);
                }));

                const bind = (id, k) => {
                    document.getElementById(id).addEventListener('input', e => this.audio.set(k, parseFloat(e.target.value)));
                }
                bind('volume', 'vol'); bind('tone', 'tone'); bind('space', 'space');

                this.loop();
            },

            loop() {
                requestAnimationFrame(this.loop.bind(this));
                const e = this.audio.getEnergy();
                this.bg.render(e);
                this.s3d.render(e);
            }
        };

        App.init();

    </script>
</body>
</html>
